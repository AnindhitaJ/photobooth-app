<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Template Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      padding: 24px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header p { font-size: 13px; color: #a0a0b0; margin-top: 2px; }
    .btn {
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: #e94560; color: white; }
    .btn-primary:hover { background: #c73652; }
    .btn-secondary { background: transparent; color: #a0a0b0; border: 2px solid #a0a0b0; }
    .btn-secondary:hover { color: white; border-color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #219a52; }
    .btn-danger { background: transparent; color: #e94560; border: 2px solid #e94560; font-size: 12px; padding: 6px 14px; }
    .btn-danger:hover { background: #e94560; color: white; }
    .btn-sm { padding: 7px 14px; font-size: 12px; }

    .layout { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }

    /* Panel kiri */
    .editor-panel { flex: 1; min-width: 300px; }

    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 700; color: #a0a0b0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 2px solid #0f3460;
      background: #16213e;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    .form-input:focus { border-color: #e94560; }

    /* Kategori input dengan tambah */
    .category-row { display: flex; gap: 8px; }
    .category-row .form-input { flex: 1; }
    .category-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .category-tag {
      background: #0f3460;
      border-radius: 50px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
    }
    .category-tag:hover { border-color: #e94560; }
    .category-tag.active { background: #e94560; border-color: #e94560; }

    .upload-area {
      border: 2px dashed #0f3460;
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
      background: #16213e;
    }
    .upload-area:hover { border-color: #e94560; }
    .upload-area.dragover { border-color: #e94560; background: #1f1f4e; }
    .upload-area p { color: #a0a0b0; font-size: 13px; margin-top: 6px; }
    .upload-icon { font-size: 36px; }
    #fileInput { display: none; }

    .canvas-wrapper {
      position: relative;
      display: none;
      background: #16213e;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #0f3460;
      margin-bottom: 16px;
      user-select: none;
    }
    #editorCanvas { display: block; }
    .slot-overlay { position: absolute; inset: 0; pointer-events: none; }
    .slot-box {
      position: absolute;
      border: 2px solid #e94560;
      background: rgba(233,69,96,0.15);
      pointer-events: all;
      cursor: move;
      border-radius: 4px;
    }
    .slot-label {
      position: absolute;
      top: 4px; left: 6px;
      font-size: 11px; font-weight: 700;
      color: #e94560;
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .slot-delete {
      position: absolute;
      top: 4px; right: 4px;
      background: #e94560; color: white;
      border: none; border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .resize-handle {
      position: absolute;
      bottom: 0; right: 0;
      width: 14px; height: 14px;
      background: #e94560;
      cursor: se-resize;
      border-radius: 2px 0 4px 0;
    }

    .slot-info {
      background: #16213e;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      color: #a0a0b0;
      margin-bottom: 12px;
      display: none;
    }
    .slot-info span { color: white; font-weight: 600; }

    .editor-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

    /* Panel kanan */
    .templates-panel { width: 300px; flex-shrink: 0; }

    /* Kategori tabs di panel kanan */
    .cat-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .cat-tab {
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid #0f3460;
      background: transparent;
      color: #a0a0b0;
      transition: all 0.15s;
    }
    .cat-tab.active { background: #e94560; border-color: #e94560; color: white; }

    .template-item {
      background: #16213e;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      align-items: center;
      border: 2px solid #0f3460;
    }
    .template-thumb {
      width: 44px; height: 72px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: #0f3460;
    }
    .template-info { flex: 1; min-width: 0; }
    .template-info h4 { font-size: 13px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .template-info p { font-size: 11px; color: #a0a0b0; }
    .cat-badge {
      display: inline-block;
      background: #0f3460;
      color: #a0a0b0;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 50px;
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      color: #a0a0b0;
      font-size: 13px;
      padding: 28px 16px;
      border: 2px dashed #0f3460;
      border-radius: 12px;
    }

    .manage-cats {
      background: #16213e;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .manage-cats h4 { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
    .cat-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #0f3460;
      font-size: 13px;
    }
    .cat-list-item:last-child { border-bottom: none; }
    .btn-cat-del { background: transparent; border: none; color: #e94560; cursor: pointer; font-size: 16px; }

    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #27ae60;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px; font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>⚙️ Template Manager</h1>
    <p>Upload dan kelola template photobooth</p>
  </div>
  <button class="btn btn-secondary" onclick="window.location.href='template.html'">← Kembali ke App</button>
</div>

<div class="layout">

  <!-- Panel Kiri: Editor -->
  <div class="editor-panel">

    <div class="form-group">
      <label class="form-label">Nama Template</label>
      <input type="text" class="form-input" id="templateName" placeholder="contoh: Vintage Floral">
    </div>

    <div class="form-group">
      <label class="form-label">Kategori / Menu</label>
      <div class="category-row">
        <input type="text" class="form-input" id="newCatInput" placeholder="Nama kategori baru...">
        <button class="btn btn-primary btn-sm" onclick="tambahKategori()">+ Tambah</button>
      </div>
      <div class="category-tags" id="categoryTags"></div>
      <input type="hidden" id="selectedCategory">
    </div>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">🖼️</div>
      <strong>Klik atau drag & drop PNG template</strong>
      <p>Area slot foto: transparan atau hitam</p>
    </div>
    <input type="file" id="fileInput" accept="image/png">

    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="editorCanvas"></canvas>
      <div class="slot-overlay" id="slotOverlay"></div>
    </div>

    <div class="slot-info" id="slotInfo">
      <span id="slotCount">0</span> slot terdeteksi. Geser & resize untuk menyesuaikan.
    </div>

    <div class="editor-controls" id="editorControls" style="display:none">
      <button class="btn btn-secondary btn-sm" onclick="addSlotManual()">➕ Tambah Slot</button>
      <button class="btn btn-secondary btn-sm" onclick="autoDetect()">🔍 Auto Detect</button>
      <button class="btn btn-danger btn-sm" onclick="clearSlots()">🗑 Hapus Semua</button>
    </div>

    <button class="btn btn-success" id="btnSave" onclick="saveTemplate()" style="display:none;width:100%;margin-top:8px">
      💾 Simpan Template
    </button>

  </div>

  <!-- Panel Kanan -->
  <div class="templates-panel">

    <div class="manage-cats" id="manageCats" style="display:none">
      <h4>Kelola Kategori</h4>
      <div id="catListManage"></div>
    </div>

    <h3 style="font-size:16px;font-weight:700;margin-bottom:12px">Template Tersimpan</h3>

    <div class="cat-tabs" id="catTabs"></div>
    <div id="templateList"></div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const DISPLAY_MAX_W = 320;
  let templateImg = null, templateDataURL = null;
  let slots = [], scale = 1;
  let selectedCategory = '';
  let filterCategory = 'all';

  const canvas = document.getElementById('editorCanvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('slotOverlay');

  // ─── Kategori ───
  function getCategories() {
    return JSON.parse(localStorage.getItem('pb_categories') || '[]');
  }
  function saveCategories(cats) {
    localStorage.setItem('pb_categories', JSON.stringify(cats));
  }

  function tambahKategori() {
    const val = document.getElementById('newCatInput').value.trim();
    if (!val) return;
    const cats = getCategories();
    if (cats.includes(val)) { showToast('Kategori sudah ada', true); return; }
    cats.push(val);
    saveCategories(cats);
    document.getElementById('newCatInput').value = '';
    renderCategoryTags();
    renderCatTabs();
    renderManageCats();
    showToast(`Kategori "${val}" ditambahkan`);
  }

  function renderCategoryTags() {
    const cats = getCategories();
    const el = document.getElementById('categoryTags');
    el.innerHTML = cats.map(c => `
      <div class="category-tag ${selectedCategory === c ? 'active' : ''}"
           onclick="selectCategory('${c}')">
        ${c}
      </div>
    `).join('');
  }

  function selectCategory(cat) {
    selectedCategory = cat;
    document.getElementById('selectedCategory').value = cat;
    renderCategoryTags();
  }

  function renderCatTabs() {
    const cats = getCategories();
    const el = document.getElementById('catTabs');
    el.innerHTML = `<button class="cat-tab ${filterCategory==='all'?'active':''}" onclick="filterCat('all')">Semua</button>`;
    el.innerHTML += cats.map(c => `
      <button class="cat-tab ${filterCategory===c?'active':''}" onclick="filterCat('${c}')">${c}</button>
    `).join('');

    // Tampilkan manage cats kalau ada
    document.getElementById('manageCats').style.display = cats.length ? 'block' : 'none';
  }

  function filterCat(cat) {
    filterCategory = cat;
    renderCatTabs();
    renderTemplateList();
  }

  function renderManageCats() {
    const cats = getCategories();
    document.getElementById('catListManage').innerHTML = cats.length
      ? cats.map((c, i) => `
          <div class="cat-list-item">
            <span>${c}</span>
            <button class="btn-cat-del" onclick="hapusKategori(${i})">×</button>
          </div>`).join('')
      : '<p style="font-size:12px;color:#555">Belum ada kategori</p>';
  }

  function hapusKategori(idx) {
    const cats = getCategories();
    cats.splice(idx, 1);
    saveCategories(cats);
    renderCategoryTags();
    renderCatTabs();
    renderManageCats();
    renderTemplateList();
  }

  // ─── Upload ───
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) loadTemplate(e.target.files[0]);
  });
  const uploadArea = document.getElementById('uploadArea');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    if (e.dataTransfer.files[0]) loadTemplate(e.dataTransfer.files[0]);
  });

  function loadTemplate(file) {
    const reader = new FileReader();
    reader.onload = e => {
      templateDataURL = e.target.result;
      templateImg = new Image();
      templateImg.onload = () => {
        scale = Math.min(1, DISPLAY_MAX_W / templateImg.width);
        const dw = Math.round(templateImg.width * scale);
        const dh = Math.round(templateImg.height * scale);
        canvas.width = dw; canvas.height = dh;
        canvas.style.width = dw + 'px'; canvas.style.height = dh + 'px';
        overlay.style.width = dw + 'px'; overlay.style.height = dh + 'px';
        ctx.drawImage(templateImg, 0, 0, dw, dh);
        document.getElementById('canvasWrapper').style.display = 'block';
        document.getElementById('editorControls').style.display = 'flex';
        document.getElementById('btnSave').style.display = 'block';
        document.getElementById('slotInfo').style.display = 'block';
        slots = [];
        autoDetect();
      };
      templateImg.src = templateDataURL;
    };
    reader.readAsDataURL(file);
  }

  // ─── Auto Detect ───
  function autoDetect() {
    if (!templateImg) return;
    const W = canvas.width, H = canvas.height;
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const octx = off.getContext('2d');
    octx.drawImage(templateImg, 0, 0, W, H);
    const data = octx.getImageData(0, 0, W, H).data;

    const mask = new Uint8Array(W * H);
    for (let i = 0; i < W * H; i++) {
      const r = data[i*4], g = data[i*4+1], b = data[i*4+2], a = data[i*4+3];
      if (a < 30 || (r < 40 && g < 40 && b < 40 && a > 100)) mask[i] = 1;
    }

    const rowSums = new Array(H).fill(0);
    for (let y = 0; y < H; y++)
      for (let x = 0; x < W; x++)
        rowSums[y] += mask[y * W + x];

    const threshold = W * 0.15;
    let inBlock = false, blockStart = 0;
    const blocks = [];
    for (let y = 0; y < H; y++) {
      if (rowSums[y] > threshold && !inBlock) { inBlock = true; blockStart = y; }
      else if (rowSums[y] <= threshold && inBlock) {
        inBlock = false;
        if (y - blockStart > H * 0.04) blocks.push([blockStart, y - 1]);
      }
    }
    if (inBlock) blocks.push([blockStart, H - 1]);

    slots = [];
    for (const [y1, y2] of blocks) {
      const colSums = new Array(W).fill(0);
      for (let y = y1; y <= y2; y++)
        for (let x = 0; x < W; x++)
          colSums[x] += mask[y * W + x];
      const cThresh = (y2 - y1) * 0.1;
      const xCols = colSums.map((v,i) => v > cThresh ? i : -1).filter(v => v >= 0);
      if (!xCols.length) continue;
      const x1 = xCols[0], x2 = xCols[xCols.length-1];
      if ((x2-x1) < W*0.1 || (y2-y1) < H*0.02) continue;
      slots.push({ x: x1, y: y1, w: x2-x1, h: y2-y1 });
    }

    document.getElementById('slotCount').textContent = slots.length;
    renderSlots();
    showToast(`${slots.length} slot terdeteksi`);
  }

  function renderSlots() {
    overlay.innerHTML = '';
    slots.forEach((slot, idx) => {
      const box = document.createElement('div');
      box.className = 'slot-box';
      box.style.cssText = `left:${slot.x}px;top:${slot.y}px;width:${slot.w}px;height:${slot.h}px`;
      box.innerHTML = `
        <div class="slot-label">Foto ${idx+1}</div>
        <button class="slot-delete" onclick="deleteSlot(${idx})">×</button>
        <div class="resize-handle" data-idx="${idx}"></div>
      `;
      makeDraggable(box, idx);
      makeResizable(box.querySelector('.resize-handle'), box, idx);
      overlay.appendChild(box);
    });
  }

  function makeDraggable(box, idx) {
    let sx, sy, sl, st;
    box.addEventListener('mousedown', e => {
      if (e.target.classList.contains('resize-handle') || e.target.classList.contains('slot-delete')) return;
      e.preventDefault();
      sx = e.clientX; sy = e.clientY; sl = slots[idx].x; st = slots[idx].y;
      const mv = e => {
        slots[idx].x = Math.max(0, Math.min(canvas.width - slots[idx].w, sl + e.clientX - sx));
        slots[idx].y = Math.max(0, Math.min(canvas.height - slots[idx].h, st + e.clientY - sy));
        box.style.left = slots[idx].x + 'px'; box.style.top = slots[idx].y + 'px';
      };
      const up = () => { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
      document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up);
    });
  }

  function makeResizable(handle, box, idx) {
    handle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const sx = e.clientX, sy = e.clientY, sw = slots[idx].w, sh = slots[idx].h;
      const mv = e => {
        slots[idx].w = Math.max(40, Math.min(canvas.width - slots[idx].x, sw + e.clientX - sx));
        slots[idx].h = Math.max(30, Math.min(canvas.height - slots[idx].y, sh + e.clientY - sy));
        box.style.width = slots[idx].w + 'px'; box.style.height = slots[idx].h + 'px';
      };
      const up = () => { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
      document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up);
    });
  }

  function addSlotManual() {
    const W = canvas.width, H = canvas.height;
    slots.push({ x: Math.round(W*0.1), y: Math.round(H*0.05), w: Math.round(W*0.8), h: Math.round(H*0.18) });
    document.getElementById('slotCount').textContent = slots.length;
    renderSlots();
  }

  function deleteSlot(idx) {
    slots.splice(idx, 1);
    document.getElementById('slotCount').textContent = slots.length;
    renderSlots();
  }

  function clearSlots() {
    slots = [];
    document.getElementById('slotCount').textContent = 0;
    renderSlots();
  }

  // ─── Save ───
  function saveTemplate() {
    const name = document.getElementById('templateName').value.trim();
    if (!name) { showToast('Isi nama template dulu!', true); return; }
    if (!selectedCategory) { showToast('Pilih kategori dulu!', true); return; }
    if (!templateDataURL) { showToast('Upload PNG dulu!', true); return; }
    if (!slots.length) { showToast('Tambahkan minimal 1 slot!', true); return; }

    const realSlots = slots.map(s => ({
      x: Math.round(s.x / scale), y: Math.round(s.y / scale),
      w: Math.round(s.w / scale), h: Math.round(s.h / scale),
    }));

    const tmpl = {
      id: Date.now(),
      name,
      category: selectedCategory,
      src: templateDataURL,
      slots: realSlots,
      createdAt: new Date().toISOString()
    };

    const saved = getTemplates();
    saved.push(tmpl);
    localStorage.setItem('pb_templates', JSON.stringify(saved));
    showToast('Template tersimpan! ✓');
    renderTemplateList();

    // Reset
    document.getElementById('templateName').value = '';
    document.getElementById('canvasWrapper').style.display = 'none';
    document.getElementById('editorControls').style.display = 'none';
    document.getElementById('btnSave').style.display = 'none';
    document.getElementById('slotInfo').style.display = 'none';
    templateDataURL = null; templateImg = null; slots = [];
    document.getElementById('fileInput').value = '';
  }

  // ─── Template List ───
  function getTemplates() {
    try { return JSON.parse(localStorage.getItem('pb_templates') || '[]'); }
    catch { return []; }
  }

  function renderTemplateList() {
    const list = document.getElementById('templateList');
    const all = getTemplates();
    const filtered = filterCategory === 'all' ? all : all.filter(t => t.category === filterCategory);

    if (!filtered.length) {
      list.innerHTML = '<div class="empty-state">Belum ada template di kategori ini</div>';
      return;
    }

    list.innerHTML = filtered.map((t, i) => `
      <div class="template-item">
        <img class="template-thumb" src="${t.src}" alt="${t.name}">
        <div class="template-info">
          <h4>${t.name}</h4>
          <p>${t.slots.length} slot foto</p>
          <span class="cat-badge">${t.category}</span>
        </div>
        <button class="btn btn-danger" onclick="hapusTemplate('${t.id}')">Hapus</button>
      </div>
    `).join('');
  }

  function hapusTemplate(id) {
    const saved = getTemplates().filter(t => t.id != id);
    localStorage.setItem('pb_templates', JSON.stringify(saved));
    renderTemplateList();
    showToast('Template dihapus');
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isError ? '#e94560' : '#27ae60';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Init
  renderCategoryTags();
  renderCatTabs();
  renderManageCats();
  renderTemplateList();
</script>

</body>
</html>
