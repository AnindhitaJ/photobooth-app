
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Template Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      padding: 24px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header p { font-size: 13px; color: #a0a0b0; margin-top: 2px; }
    .btn {
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: #e94560; color: white; }
    .btn-primary:hover { background: #c73652; }
    .btn-secondary { background: transparent; color: #a0a0b0; border: 2px solid #a0a0b0; }
    .btn-secondary:hover { color: white; border-color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #219a52; }
    .btn-danger { background: transparent; color: #e94560; border: 2px solid #e94560; font-size: 12px; padding: 6px 14px; }
    .btn-danger:hover { background: #e94560; color: white; }
    .btn-sm { padding: 7px 14px; font-size: 12px; }

    .layout { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
    .editor-panel { flex: 1; min-width: 300px; }

    .debug-panel {
      background: #0d0d1a;
      border: 1px solid #e94560;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      font-family: monospace;
      font-size: 12px;
      max-height: 180px;
      overflow-y: auto;
    }
    .debug-panel h4 { color: #e94560; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .debug-line { color: #a0a0b0; margin: 3px 0; }
    .debug-line.ok { color: #27ae60; }
    .debug-line.err { color: #e94560; }
    .debug-line.warn { color: #f5a623; }

    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 700; color: #a0a0b0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 2px solid #0f3460;
      background: #16213e;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    .form-input:focus { border-color: #e94560; }

    .category-row { display: flex; gap: 8px; }
    .category-row .form-input { flex: 1; }
    .category-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .category-tag {
      background: #0f3460;
      border-radius: 50px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
    }
    .category-tag:hover { border-color: #e94560; }
    .category-tag.active { background: #e94560; border-color: #e94560; }

    .upload-label {
      display: block;
      border: 2px dashed #0f3460;
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
      background: #16213e;
    }
    .upload-label:hover { border-color: #e94560; background: #1a1a3e; }
    .upload-label.dragover { border-color: #e94560; background: #1f1f4e; }
    .upload-label p { color: #a0a0b0; font-size: 13px; margin-top: 6px; }
    .upload-icon { font-size: 36px; }

    .canvas-wrapper {
      position: relative;
      display: none;
      background: #16213e;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #0f3460;
      margin-bottom: 16px;
      user-select: none;
    }
    #editorCanvas { display: block; }
    .slot-overlay { position: absolute; inset: 0; pointer-events: none; }
    .slot-box {
      position: absolute;
      border: 2px solid #e94560;
      background: rgba(233,69,96,0.15);
      pointer-events: all;
      cursor: move;
      border-radius: 4px;
    }
    .slot-label {
      position: absolute;
      top: 4px; left: 6px;
      font-size: 11px; font-weight: 700;
      color: #e94560;
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
    }
    .slot-delete {
      position: absolute;
      top: 4px; right: 4px;
      background: #e94560; color: white;
      border: none; border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .resize-handle {
      position: absolute;
      bottom: 0; right: 0;
      width: 14px; height: 14px;
      background: #e94560;
      cursor: se-resize;
      border-radius: 2px 0 4px 0;
    }

    .slot-info {
      background: #16213e;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      color: #a0a0b0;
      margin-bottom: 12px;
      display: none;
    }
    .slot-info span { color: white; font-weight: 600; }
    .editor-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

    .templates-panel { width: 300px; flex-shrink: 0; }
    .cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .cat-tab {
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      border: 2px solid #0f3460;
      background: transparent;
      color: #a0a0b0;
      transition: all 0.15s;
    }
    .cat-tab.active { background: #e94560; border-color: #e94560; color: white; }

    .template-item {
      background: #16213e;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      align-items: center;
      border: 2px solid #0f3460;
    }
    .template-thumb {
      width: 44px; height: 72px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: #0f3460;
    }
    .template-info { flex: 1; min-width: 0; }
    .template-info h4 { font-size: 13px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .template-info p { font-size: 11px; color: #a0a0b0; }
    .cat-badge {
      display: inline-block;
      background: #0f3460;
      color: #a0a0b0;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 50px;
      margin-top: 4px;
    }
    .empty-state {
      text-align: center;
      color: #a0a0b0;
      font-size: 13px;
      padding: 28px 16px;
      border: 2px dashed #0f3460;
      border-radius: 12px;
    }
    .manage-cats {
      background: #16213e;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .manage-cats h4 { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
    .cat-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #0f3460;
      font-size: 13px;
    }
    .cat-list-item:last-child { border-bottom: none; }
    .btn-cat-del { background: transparent; border: none; color: #e94560; cursor: pointer; font-size: 16px; }

    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #27ae60;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px; font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>⚙️ Template Manager</h1>
    <p>Upload dan kelola template photobooth</p>
  </div>
  <button class="btn btn-secondary" onclick="window.location.href='template.html'">← Kembali ke App</button>
</div>

<div class="layout">
  <div class="editor-panel">

    <div class="debug-panel">
      <h4>🔍 Debug Info</h4>
      <div id="debugLines"><div class="debug-line">Siap...</div></div>
    </div>

    <div class="form-group">
      <label class="form-label">Nama Template</label>
      <input type="text" class="form-input" id="templateName" placeholder="contoh: Vintage Floral">
    </div>

    <div class="form-group">
      <label class="form-label">Kategori / Menu</label>
      <div class="category-row">
        <input type="text" class="form-input" id="newCatInput" placeholder="Nama kategori baru..."
          onkeydown="if(event.key==='Enter') tambahKategori()">
        <button class="btn btn-primary btn-sm" onclick="tambahKategori()">+ Tambah</button>
      </div>
      <div class="category-tags" id="categoryTags">
        <div style="font-size:12px;color:#555;margin-top:4px">Belum ada kategori</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Upload Template PNG</label>
      <label class="upload-label" id="uploadLabel">
        <input type="file" id="fileInput" accept="image/png,image/jpeg" style="display:none">
        <div class="upload-icon">🖼️</div>
        <strong>Klik di sini untuk pilih file</strong>
        <p>Format PNG transparan atau dengan area hitam</p>
      </label>
    </div>

    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="editorCanvas"></canvas>
      <div class="slot-overlay" id="slotOverlay"></div>
    </div>

    <div class="slot-info" id="slotInfo">
      <span id="slotCount">0</span> slot terdeteksi. Geser & resize untuk menyesuaikan.
    </div>

    <div class="editor-controls" id="editorControls" style="display:none">
      <button class="btn btn-secondary btn-sm" onclick="addSlotManual()">➕ Tambah Slot</button>
      <button class="btn btn-secondary btn-sm" onclick="autoDetect()">🔍 Auto Detect</button>
      <button class="btn btn-danger btn-sm" onclick="clearSlots()">🗑 Hapus Semua</button>
    </div>

    <button class="btn btn-success" id="btnSave" onclick="saveTemplate()"
      style="display:none;width:100%;margin-top:8px;padding:14px;font-size:16px">
      💾 Simpan Template
    </button>

  </div>

  <div class="templates-panel">
    <div class="manage-cats" id="manageCats" style="display:none">
      <h4>Kelola Kategori</h4>
      <div id="catListManage"></div>
    </div>
    <h3 style="font-size:16px;font-weight:700;margin-bottom:12px">Template Tersimpan</h3>
    <div class="cat-tabs" id="catTabs"></div>
    <div id="templateList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const DISPLAY_MAX_W = 320;
  let templateImg = null, templateDataURL = null;
  let slots = [], scale = 1;
  let selectedCategory = '';
  let filterCategory = 'all';

  const canvas = document.getElementById('editorCanvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('slotOverlay');

  // ─── Debug ───
  function debug(msg, type = '') {
    const el = document.getElementById('debugLines');
    const line = document.createElement('div');
    line.className = 'debug-line ' + type;
    const t = new Date().toLocaleTimeString('id-ID');
    line.textContent = `[${t}] ${msg}`;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
    if (el.children.length > 30) el.removeChild(el.firstChild);
  }

  // ─── Init check ───
  debug('Panel loaded ✓', 'ok');
  try {
    localStorage.setItem('_test', '1');
    localStorage.removeItem('_test');
    debug('localStorage OK ✓', 'ok');
  } catch(e) {
    debug('localStorage ERROR: ' + e.message, 'err');
  }

  // ─── File Input ───
  const fileInput = document.getElementById('fileInput');

  fileInput.addEventListener('change', function() {
    debug('fileInput change event fired ✓', 'ok');
    if (this.files && this.files[0]) {
      const f = this.files[0];
      debug(`File: ${f.name} | ${Math.round(f.size/1024)} KB | ${f.type}`, 'ok');
      loadTemplate(f);
    } else {
      debug('Tidak ada file dipilih', 'warn');
    }
  });

  // Drag & drop
  const uploadLabel = document.getElementById('uploadLabel');
  uploadLabel.addEventListener('dragover', e => {
    e.preventDefault();
    uploadLabel.classList.add('dragover');
  });
  uploadLabel.addEventListener('dragleave', () => {
    uploadLabel.classList.remove('dragover');
  });
  uploadLabel.addEventListener('drop', e => {
    e.preventDefault();
    uploadLabel.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f) {
      debug(`Drop: ${f.name} | ${Math.round(f.size/1024)} KB`, 'ok');
      loadTemplate(f);
    }
  });

  // ─── Load Template ───
  function loadTemplate(file) {
    debug('Membaca file dengan FileReader...', 'warn');
    const reader = new FileReader();

    reader.onload = function(e) {
      debug('FileReader onload fired ✓', 'ok');
      const dataURL = e.target.result;
      const sizeKB = Math.round(dataURL.length / 1024);
      debug(`Data URL: ${sizeKB} KB`, sizeKB > 3000 ? 'warn' : 'ok');

      if (sizeKB > 3500) {
        debug('File besar, kompres dulu...', 'warn');
        kompresGambar(dataURL, sizeKB);
      } else {
        templateDataURL = dataURL;
        tampilkanDiCanvas(dataURL);
      }
    };

    reader.onerror = function() {
      debug('FileReader ERROR!', 'err');
      showToast('Gagal baca file!', true);
    };

    reader.readAsDataURL(file);
    debug('readAsDataURL dipanggil...', 'warn');
  }

  function kompresGambar(dataURL, originalKB) {
    const img = new Image();
    img.onload = () => {
      const maxW = 800;
      const s = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * s);
      const h = Math.round(img.height * s);
      const off = document.createElement('canvas');
      off.width = w; off.height = h;
      off.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = off.toDataURL('image/jpeg', 0.7);
      const newKB = Math.round(compressed.length / 1024);
      debug(`Kompres: ${originalKB}KB → ${newKB}KB (${w}x${h})`, 'ok');
      templateDataURL = compressed;
      tampilkanDiCanvas(compressed);
    };
    img.src = dataURL;
  }

  function tampilkanDiCanvas(dataURL) {
    debug('Load ke canvas...', 'warn');
    templateImg = new Image();

    templateImg.onload = () => {
      debug(`Gambar: ${templateImg.width}x${templateImg.height}px ✓`, 'ok');
      scale = Math.min(1, DISPLAY_MAX_W / templateImg.width);
      const dw = Math.round(templateImg.width * scale);
      const dh = Math.round(templateImg.height * scale);
      debug(`Canvas: ${dw}x${dh}px (scale ${scale.toFixed(2)})`);

      canvas.width = dw; canvas.height = dh;
      canvas.style.width = dw + 'px';
      canvas.style.height = dh + 'px';
      overlay.style.width = dw + 'px';
      overlay.style.height = dh + 'px';

      ctx.clearRect(0, 0, dw, dh);
      ctx.drawImage(templateImg, 0, 0, dw, dh);
      debug('Canvas rendered ✓', 'ok');

      document.getElementById('canvasWrapper').style.display = 'block';
      document.getElementById('editorControls').style.display = 'flex';
      document.getElementById('btnSave').style.display = 'block';
      document.getElementById('slotInfo').style.display = 'block';

      slots = [];
      autoDetect();
    };

    templateImg.onerror = () => {
      debug('ERROR load image ke canvas!', 'err');
      showToast('Gagal tampilkan gambar!', true);
    };

    templateImg.src = dataURL;
  }

  // ─── Auto Detect Slot ───
  function autoDetect() {
    if (!templateImg) { debug('autoDetect: templateImg null!', 'err'); return; }
    debug('Deteksi slot...', 'warn');

    const W = canvas.width, H = canvas.height;
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const octx = off.getContext('2d');
    octx.drawImage(templateImg, 0, 0, W, H);
    const data = octx.getImageData(0, 0, W, H).data;

    const mask = new Uint8Array(W * H);
    let maskCount = 0;
    for (let i = 0; i < W * H; i++) {
      const r = data[i*4], g = data[i*4+1], b = data[i*4+2], a = data[i*4+3];
      if (a < 30 || (r < 40 && g < 40 && b < 40 && a > 100)) {
        mask[i] = 1; maskCount++;
      }
    }
    debug(`Pixel slot: ${maskCount} dari ${W*H} (${Math.round(maskCount/W/H*100)}%)`, maskCount > 100 ? 'ok' : 'warn');

    const rowSums = new Array(H).fill(0);
    for (let y = 0; y < H; y++)
      for (let x = 0; x < W; x++)
        rowSums[y] += mask[y * W + x];

    const threshold = W * 0.15;
    let inBlock = false, blockStart = 0;
    const blocks = [];
    for (let y = 0; y < H; y++) {
      if (rowSums[y] > threshold && !inBlock) { inBlock = true; blockStart = y; }
      else if (rowSums[y] <= threshold && inBlock) {
        inBlock = false;
        if (y - blockStart > H * 0.04) blocks.push([blockStart, y - 1]);
      }
    }
    if (inBlock) blocks.push([blockStart, H - 1]);
    debug(`Blok row: ${blocks.length}`);

    slots = [];
    for (const [y1, y2] of blocks) {
      const colSums = new Array(W).fill(0);
      for (let y = y1; y <= y2; y++)
        for (let x = 0; x < W; x++)
          colSums[x] += mask[y * W + x];
      const cThresh = (y2 - y1) * 0.1;
      const xCols = colSums.map((v,i) => v > cThresh ? i : -1).filter(v => v >= 0);
      if (!xCols.length) continue;
      const x1 = xCols[0], x2 = xCols[xCols.length-1];
      if ((x2-x1) < W*0.1 || (y2-y1) < H*0.02) continue;
      slots.push({ x: x1, y: y1, w: x2-x1, h: y2-y1 });
    }

    debug(`Slot valid: ${slots.length}`, slots.length > 0 ? 'ok' : 'warn');
    if (slots.length === 0) debug('Coba tambah slot manual pakai tombol ➕', 'warn');
    document.getElementById('slotCount').textContent = slots.length;
    renderSlots();
    showToast(slots.length > 0 ? `${slots.length} slot terdeteksi ✓` : 'Tidak ada slot — tambah manual');
  }

  // ─── Render Slots ───
  function renderSlots() {
    overlay.innerHTML = '';
    slots.forEach((slot, idx) => {
      const box = document.createElement('div');
      box.className = 'slot-box';
      box.style.left = slot.x + 'px';
      box.style.top = slot.y + 'px';
      box.style.width = slot.w + 'px';
      box.style.height = slot.h + 'px';

      const label = document.createElement('div');
      label.className = 'slot-label';
      label.textContent = `Foto ${idx+1}`;

      const del = document.createElement('button');
      del.className = 'slot-delete';
      del.textContent = '×';
      del.onclick = (e) => { e.stopPropagation(); deleteSlot(idx); };

      const resize = document.createElement('div');
      resize.className = 'resize-handle';

      box.appendChild(label);
      box.appendChild(del);
      box.appendChild(resize);

      makeDraggable(box, idx);
      makeResizable(resize, box, idx);
      overlay.appendChild(box);
    });
  }

  function makeDraggable(box, idx) {
    let sx, sy, sl, st, dragging = false;

    box.addEventListener('mousedown', e => {
      if (e.target.classList.contains('resize-handle') || e.target.classList.contains('slot-delete')) return;
      e.preventDefault();
      dragging = true;
      sx = e.clientX; sy = e.clientY;
      sl = slots[idx].x; st = slots[idx].y;
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      slots[idx].x = Math.max(0, Math.min(canvas.width - slots[idx].w, sl + e.clientX - sx));
      slots[idx].y = Math.max(0, Math.min(canvas.height - slots[idx].h, st + e.clientY - sy));
      box.style.left = slots[idx].x + 'px';
      box.style.top = slots[idx].y + 'px';
    });

    document.addEventListener('mouseup', () => { dragging = false; });
  }

  function makeResizable(handle, box, idx) {
    let sx, sy, sw, sh, resizing = false;

    handle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
