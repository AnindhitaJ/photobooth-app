<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Template Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      padding: 24px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header p { font-size: 13px; color: #a0a0b0; margin-top: 2px; }
    .btn {
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: #e94560; color: white; }
    .btn-primary:hover { background: #c73652; }
    .btn-secondary { background: transparent; color: #a0a0b0; border: 2px solid #a0a0b0; }
    .btn-secondary:hover { color: white; border-color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #219a52; }
    .btn-danger { background: transparent; color: #e94560; border: 2px solid #e94560; font-size: 12px; padding: 6px 14px; }
    .btn-danger:hover { background: #e94560; color: white; }
    .btn-sm { padding: 7px 14px; font-size: 12px; }

    .layout { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
    .editor-panel { flex: 1; min-width: 300px; }

    /* Debug panel */
    .debug-panel {
      background: #0d0d1a;
      border: 1px solid #e94560;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      font-family: monospace;
      font-size: 12px;
    }
    .debug-panel h4 { color: #e94560; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .debug-line { color: #a0a0b0; margin: 3px 0; }
    .debug-line.ok { color: #27ae60; }
    .debug-line.err { color: #e94560; }
    .debug-line.warn { color: #f5a623; }

    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 700; color: #a0a0b0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 2px solid #0f3460;
      background: #16213e;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    .form-input:focus { border-color: #e94560; }

    .category-row { display: flex; gap: 8px; }
    .category-row .form-input { flex: 1; }
    .category-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .category-tag {
      background: #0f3460;
      border-radius: 50px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
    }
    .category-tag:hover { border-color: #e94560; }
    .category-tag.active { background: #e94560; border-color: #e94560; }

    .upload-area {
      border: 2px dashed #0f3460;
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
      background: #16213e;
    }
    .upload-area:hover { border-color: #e94560; }
    .upload-area.dragover { border-color: #e94560; background: #1f1f4e; }
    .upload-area p { color: #a0a0b0; font-size: 13px; margin-top: 6px; }
    .upload-icon { font-size: 36px; }
    #fileInput { display: none; }

    .canvas-wrapper {
      position: relative;
      display: none;
      background: #16213e;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #0f3460;
      margin-bottom: 16px;
      user-select: none;
    }
    #editorCanvas { display: block; }
    .slot-overlay { position: absolute; inset: 0; pointer-events: none; }
    .slot-box {
      position: absolute;
      border: 2px solid #e94560;
      background: rgba(233,69,96,0.15);
      pointer-events: all;
      cursor: move;
      border-radius: 4px;
    }
    .slot-label {
      position: absolute;
      top: 4px; left: 6px;
      font-size: 11px; font-weight: 700;
      color: #e94560;
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .slot-delete {
      position: absolute;
      top: 4px; right: 4px;
      background: #e94560; color: white;
      border: none; border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .resize-handle {
      position: absolute;
      bottom: 0; right: 0;
      width: 14px; height: 14px;
      background: #e94560;
      cursor: se-resize;
      border-radius: 2px 0 4px 0;
    }

    .slot-info {
      background: #16213e;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      color: #a0a0b0;
      margin-bottom: 12px;
      display: none;
    }
    .slot-info span { color: white; font-weight: 600; }
    .editor-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

    .templates-panel { width: 300px; flex-shrink: 0; }
    .cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .cat-tab {
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      border: 2px solid #0f3460;
      background: transparent;
      color: #a0a0b0;
      transition: all 0.15s;
    }
    .cat-tab.active { background: #e94560; border-color: #e94560; color: white; }

    .template-item {
      background: #16213e;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      align-items: center;
      border: 2px solid #0f3460;
    }
    .template-thumb {
      width: 44px; height: 72px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: #0f3460;
    }
    .template-info { flex: 1; min-width: 0; }
    .template-info h4 { font-size: 13px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .template-info p { font-size: 11px; color: #a0a0b0; }
    .cat-badge {
      display: inline-block;
      background: #0f3460;
      color: #a0a0b0;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 50px;
      margin-top: 4px;
    }
    .empty-state {
      text-align: center;
      color: #a0a0b0;
      font-size: 13px;
      padding: 28px 16px;
      border: 2px dashed #0f3460;
      border-radius: 12px;
    }
    .manage-cats {
      background: #16213e;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .manage-cats h4 { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
    .cat-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #0f3460;
      font-size: 13px;
    }
    .cat-list-item:last-child { border-bottom: none; }
    .btn-cat-del { background: transparent; border: none; color: #e94560; cursor: pointer; font-size: 16px; }

    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #27ae60;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px; font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>⚙️ Template Manager</h1>
    <p>Upload dan kelola template photobooth</p>
  </div>
  <button class="btn btn-secondary" onclick="window.location.href='template.html'">← Kembali ke App</button>
</div>

<div class="layout">
  <div class="editor-panel">

    <!-- DEBUG PANEL -->
    <div class="debug-panel">
      <h4>🔍 Debug Info</h4>
      <div id="debugLines">
        <div class="debug-line">Menunggu aksi...</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Nama Template</label>
      <input type="text" class="form-input" id="templateName" placeholder="contoh: Vintage Floral">
    </div>

    <div class="form-group">
      <label class="form-label">Kategori / Menu</label>
      <div class="category-row">
        <input type="text" class="form-input" id="newCatInput" placeholder="Nama kategori baru..."
          onkeydown="if(event.key==='Enter') tambahKategori()">
        <button class="btn btn-primary btn-sm" onclick="tambahKategori()">+ Tambah</button>
      </div>
      <div class="category-tags" id="categoryTags">
        <div style="font-size:12px;color:#555;margin-top:4px">Belum ada kategori — tambah dulu</div>
      </div>
      <input type="hidden" id="selectedCategory">
    </div>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">🖼️</div>
      <strong>Klik atau drag & drop PNG template</strong>
      <p>Area slot foto: transparan atau hitam</p>
    </div>
    <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">

    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="editorCanvas"></canvas>
      <div class="slot-overlay" id="slotOverlay"></div>
    </div>

    <div class="slot-info" id="slotInfo">
      <span id="slotCount">0</span> slot terdeteksi. Geser & resize untuk menyesuaikan.
    </div>

    <div class="editor-controls" id="editorControls" style="display:none">
      <button class="btn btn-secondary btn-sm" onclick="addSlotManual()">➕ Tambah Slot</button>
      <button class="btn btn-secondary btn-sm" onclick="autoDetect()">🔍 Auto Detect</button>
      <button class="btn btn-danger btn-sm" onclick="clearSlots()">🗑 Hapus Semua</button>
    </div>

    <button class="btn btn-success" id="btnSave" onclick="saveTemplate()"
      style="display:none;width:100%;margin-top:8px;padding:14px">
      💾 Simpan Template
    </button>

  </div>

  <!-- Panel Kanan -->
  <div class="templates-panel">
    <div class="manage-cats" id="manageCats" style="display:none">
      <h4>Kelola Kategori</h4>
      <div id="catListManage"></div>
    </div>
    <h3 style="font-size:16px;font-weight:700;margin-bottom:12px">Template Tersimpan</h3>
    <div class="cat-tabs" id="catTabs"></div>
    <div id="templateList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const DISPLAY_MAX_W = 320;
  let templateImg = null, templateDataURL = null;
  let slots = [], scale = 1;
  let selectedCategory = '';
  let filterCategory = 'all';

  const canvas = document.getElementById('editorCanvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('slotOverlay');

  // ─── Debug ───
  function debug(msg, type = '') {
    const el = document.getElementById('debugLines');
    const line = document.createElement('div');
    line.className = 'debug-line ' + type;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
    if (el.children.length > 20) el.removeChild(el.firstChild);
  }

  // ─── Kategori ───
  function getCategories() {
    try { return JSON.parse(localStorage.getItem('pb_categories') || '[]'); }
    catch { return []; }
  }
  function saveCategories(cats) {
    localStorage.setItem('pb_categories', JSON.stringify(cats));
  }

  function tambahKategori() {
    const val = document.getElementById('newCatInput').value.trim();
    if (!val) { showToast('Isi nama kategori dulu!', true); return; }
    const cats = getCategories();
    if (cats.includes(val)) { showToast('Kategori sudah ada', true); return; }
    cats.push(val);
    saveCategories(cats);
    document.getElementById('newCatInput').value = '';
    debug(`Kategori "${val}" ditambahkan`, 'ok');
    renderCategoryTags();
    renderCatTabs();
    renderManageCats();
    showToast(`Kategori "${val}" ditambahkan`);
  }

  function renderCategoryTags() {
    const cats = getCategories();
    const el = document.getElementById('categoryTags');
    if (!cats.length) {
      el.innerHTML = '<div style="font-size:12px;color:#555;margin-top:4px">Belum ada kategori — tambah dulu</div>';
      return;
    }
    el.innerHTML = cats.map(c => `
      <div class="category-tag ${selectedCategory === c ? 'active' : ''}"
           onclick="selectCategory('${c}')">
        ${c}
      </div>
    `).join('');
  }

  function selectCategory(cat) {
    selectedCategory = cat;
    document.getElementById('selectedCategory').value = cat;
    debug(`Kategori dipilih: "${cat}"`, 'ok');
    renderCategoryTags();
  }

  function renderCatTabs() {
    const cats = getCategories();
    const el = document.getElementById('catTabs');
    el.innerHTML = `<button class="cat-tab ${filterCategory==='all'?'active':''}" onclick="filterCat('all')">Semua</button>`;
    el.innerHTML += cats.map(c => `
      <button class="cat-tab ${filterCategory===c?'active':''}" onclick="filterCat('${c}')">${c}</button>
    `).join('');
    document.getElementById('manageCats').style.display = cats.length ? 'block' : 'none';
  }

  function filterCat(cat) {
    filterCategory = cat;
    renderCatTabs();
    renderTemplateList();
  }

  function renderManageCats() {
    const cats = getCategories();
    document.getElementById('catListManage').innerHTML = cats.length
      ? cats.map((c, i) => `
          <div class="cat-list-item">
            <span>${c}</span>
            <button class="btn-cat-del" onclick="hapusKategori(${i})">×</button>
          </div>`).join('')
      : '<p style="font-size:12px;color:#555">Belum ada kategori</p>';
  }

  function hapusKategori(idx) {
    const cats = getCategories();
    cats.splice(idx, 1);
    saveCategories(cats);
    renderCategoryTags();
    renderCatTabs();
    renderManageCats();
    renderTemplateList();
  }

  // ─── Upload ───
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) {
      debug(`File dipilih: ${e.target.files[0].name} (${Math.round(e.target.files[0].size/1024)} KB)`);
      loadTemplate(e.target.files[0]);
    }
  });

  const uploadArea = document.getElementById('uploadArea');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    if (e.dataTransfer.files[0]) {
      debug(`File di-drop: ${e.dataTransfer.files[0].name} (${Math.round(e.dataTransfer.files[0].size/1024)} KB)`);
      loadTemplate(e.dataTransfer.files[0]);
    }
  });

  function loadTemplate(file) {
    debug('Membaca file...', 'warn');
    const reader = new FileReader();

    reader.onprogress = e => {
      if (e.lengthComputable) {
        debug(`Loading: ${Math.round(e.loaded/e.total*100)}%`);
      }
    };

    reader.onload = e => {
      debug('File berhasil dibaca', 'ok');
      templateDataURL = e.target.result;
      const sizeKB = Math.round(templateDataURL.length / 1024);
      debug(`Ukuran data URL: ${sizeKB} KB`, sizeKB > 3000 ? 'warn' : 'ok');

      if (sizeKB > 4000) {
        debug('⚠️ File terlalu besar! Akan dikompres...', 'warn');
        kompresTemplate(templateDataURL, file.type);
        return;
      }

      loadImageToCanvas(templateDataURL);
    };

    reader.onerror = e => {
      debug(`Error baca file: ${e.target.error}`, 'err');
      showToast('Gagal membaca file!', true);
    };

    reader.readAsDataURL(file);
  }

  function kompresTemplate(dataURL, type) {
    const img = new Image();
    img.onload = () => {
      debug(`Ukuran asli: ${img.width}x${img.height}px`, 'warn');

      // Kompres ke max 1000px lebar
      const maxW = 1000;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);

      const off = document.createElement('canvas');
      off.width = w; off.height = h;
      const octx = off.getContext('2d');
      octx.drawImage(img, 0, 0, w, h);

      templateDataURL = off.toDataURL('image/jpeg', 0.75);
      const newSize = Math.round(templateDataURL.length / 1024);
      debug(`Setelah kompres: ${w}x${h}px, ${newSize} KB`, 'ok');

      loadImageToCanvas(templateDataURL);
    };
    img.src = dataURL;
  }

  function loadImageToCanvas(dataURL) {
    debug('Memuat ke canvas...', 'warn');
    templateImg = new Image();

    templateImg.onload = () => {
      debug(`Gambar loaded: ${templateImg.width}x${templateImg.height}px`, 'ok');

      scale = Math.min(1, DISPLAY_MAX_W / templateImg.width);
      const dw = Math.round(templateImg.width * scale);
      const dh = Math.round(templateImg.height * scale);

      debug(`Display size: ${dw}x${dh}px (scale: ${scale.toFixed(2)})`);

      canvas.width = dw; canvas.height = dh;
      canvas.style.width = dw + 'px'; canvas.style.height = dh + 'px';
      overlay.style.width = dw + 'px'; overlay.style.height = dh + 'px';

      ctx.clearRect(0, 0, dw, dh);
      ctx.drawImage(templateImg, 0, 0, dw, dh);

      debug('Canvas berhasil dirender', 'ok');

      document.getElementById('canvasWrapper').style.display = 'block';
      document.getElementById('editorControls').style.display = 'flex';
      document.getElementById('btnSave').style.display = 'block';
      document.getElementById('slotInfo').style.display = 'block';

      slots = [];
      autoDetect();
    };

    templateImg.onerror = () => {
      debug('ERROR: Gagal load gambar ke canvas!', 'err');
      showToast('Gagal memuat gambar!', true);
    };

    templateImg.src = dataURL;
  }

  // ─── Auto Detect ───
  function autoDetect() {
    if (!templateImg) { debug('autoDetect: templateImg null!', 'err'); return; }
    debug('Mendeteksi slot...', 'warn');

    const W = canvas.width, H = canvas.height;
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const octx = off.getContext('2d');
    octx.drawImage(templateImg, 0, 0, W, H);
    const data = octx.getImageData(0, 0, W, H).data;

    const mask = new Uint8Array(W * H);
    for (let i = 0; i < W * H; i++) {
      const r = data[i*4], g = data[i*4+1], b = data[i*4+2], a = data[i*4+3];
      if (a < 30 || (r < 40 && g < 40 && b < 40 && a > 100)) mask[i] = 1;
    }

    const totalMask = mask.reduce((a,b) => a+b, 0);
    debug(`Pixel slot (transparan/hitam): ${totalMask} dari ${W*H}`);

    const rowSums = new Array(H).fill(0);
    for (let y = 0; y < H; y++)
      for (let x = 0; x < W; x++)
        rowSums[y] += mask[y * W + x];

    const threshold = W * 0.15;
    let inBlock = false, blockStart = 0;
    const blocks = [];
    for (let y = 0; y < H; y++) {
      if (rowSums[y] > threshold && !inBlock) { inBlock = true; blockStart = y; }
      else if (rowSums[y] <= threshold && inBlock) {
        inBlock = false;
        if (y - blockStart > H * 0.04) blocks.push([blockStart, y - 1]);
      }
    }
    if (inBlock) blocks.push([blockStart, H - 1]);

    debug(`Blok terdeteksi: ${blocks.length}`);

    slots = [];
    for (const [y1, y2] of blocks) {
      const colSums = new Array(W).fill(0);
      for (let y = y1; y <= y2; y++)
        for (let x = 0; x < W; x++)
          colSums[x] += mask[y * W + x];
      const cThresh = (y2 - y1) * 0.1;
      const xCols = colSums.map((v,i) => v > cThresh ? i : -1).filter(v => v >= 0);
      if (!xCols.length) continue;
      const x1 = xCols[0], x2 = xCols[xCols.length-1];
      if ((x2-x1) < W*0.1 || (y2-y1) < H*0.02) continue;
      slots.push({ x: x1, y: y1
