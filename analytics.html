<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Analytics - LUX</title><script src="/config.js"></script>
  <script src="/auth.js"></script><style>
:root{--orange:#D84B7E;--yellow:#E5B842;--navy:#1D3557;--bg:#FFF8FC;--card:#fff;--border:#fad0e4;--text:#1D3557;--text2:#6b7fa3;--green:#10b981;--red:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:22px}body:before{content:'';position:fixed;inset:0;z-index:-1;background-image:radial-gradient(circle,rgba(216,75,126,.09) 1px,transparent 1px);background-size:28px 28px}
.wrap{max-width:1180px;margin:0 auto}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}h1{font-size:28px;font-weight:950;letter-spacing:-.8px}.sub{color:var(--text2);font-size:14px;font-weight:700;margin-top:4px}
.btn{border:0;border-radius:999px;padding:10px 16px;font:inherit;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--orange),var(--yellow));color:white;box-shadow:0 8px 22px rgba(216,75,126,.18);text-decoration:none;display:inline-flex;gap:7px;align-items:center;justify-content:center}.btn.secondary{background:white;color:var(--text);border:2px solid var(--border);box-shadow:none}.btn.red{background:var(--red)}
.card{background:white;border:2px solid var(--border);border-radius:22px;padding:18px;box-shadow:0 8px 24px rgba(29,53,87,.06);margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.stat{background:#fff8fc;border:2px solid var(--border);border-radius:18px;padding:16px}.stat .label{font-size:11px;color:var(--text2);font-weight:900;text-transform:uppercase;letter-spacing:.7px}.stat .value{font-size:28px;font-weight:950;margin-top:5px}
label{display:block;font-size:12px;font-weight:900;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}input,textarea,select{width:100%;border:2px solid var(--border);border-radius:14px;background:#fff8fc;padding:11px 13px;font:inherit;color:var(--text);outline:none}textarea{min-height:88px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.table-wrap{overflow:auto;border:2px solid var(--border);border-radius:18px;background:white}table{width:100%;border-collapse:collapse;min-width:760px}th,td{text-align:left;padding:12px;border-bottom:1px solid #f6d5e5;font-size:13px}th{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);background:#fff8fc}.pill{display:inline-flex;border-radius:999px;padding:4px 9px;font-weight:900;font-size:11px}.pill.ok{background:#dcfce7;color:#15803d}.pill.no{background:#fee2e2;color:#b91c1c}
.filters{display:flex;gap:8px;flex-wrap:wrap}.bar{height:12px;background:#f8c9df;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(135deg,var(--orange),var(--yellow));border-radius:999px}.list{display:grid;gap:10px}.list-item{display:grid;grid-template-columns:1fr 80px;gap:10px;align-items:center}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--navy);color:white;border-radius:999px;padding:12px 18px;font-weight:900;opacity:0;transition:.2s}.toast.show{opacity:1}@media(max-width:820px){.grid{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}}@media(max-width:520px){.grid{grid-template-columns:1fr}body{padding:14px}}
</style>
<script>
(function(){
  if (new URLSearchParams(location.search).get('embedded') === '1') {
    document.documentElement.classList.add('embedded-mode');
  }
})();
</script>


<style>
  html.embedded-mode body { padding: 16px !important; }
  html.embedded-mode .top a[href="/admin"],
  html.embedded-mode .top a[href="/"],
  html.embedded-mode .top a[href="/analytics"],
  html.embedded-mode .top a[href="/content-sharing"],
  html.embedded-mode .top .btn.secondary { display: none !important; }
</style>

</head><body><div class="wrap">
<div class="top"><div><h1>📊 Business Analytics</h1><div class="sub">Ringkasan performa bisnis photobooth berdasarkan sesi, event, template, dan consent.</div></div><div class="filters"><a class="btn secondary" href="/admin">← Admin</a><a class="btn secondary" href="/content-sharing">🤍 Content Sharing</a><button class="btn" onclick="exportAnalytics()">Export CSV</button></div></div>
<div class="card"><div class="filters"><select id="range" onchange="render()"><option value="all">Semua</option><option value="today">Hari ini</option><option value="week">7 hari</option><option value="month">30 hari</option></select><select id="eventFilter" onchange="render()"><option value="all">Semua Event</option></select></div></div>
<div class="grid"><div class="stat"><div class="label">Total Session</div><div class="value" id="totalSession">0</div></div><div class="stat"><div class="label">Total Foto</div><div class="value" id="totalPhoto">0</div></div><div class="stat"><div class="label">Peak Hours</div><div class="value" id="peakHour">-</div></div><div class="stat"><div class="label">Consent Rate</div><div class="value" id="consentRate">0%</div></div></div>
<div class="row" style="margin-top:16px"><div class="card"><h2 style="font-size:18px;margin-bottom:12px">Auto Insight</h2><div class="list" id="insights"></div></div><div class="card"><h2 style="font-size:18px;margin-bottom:12px">Template Terpopuler</h2><div class="list" id="templateRank"></div></div></div>
<div class="row"><div class="card"><h2 style="font-size:18px;margin-bottom:12px">Peak Days</h2><div class="list" id="dayRank"></div></div><div class="card"><h2 style="font-size:18px;margin-bottom:12px">Kategori Template</h2><div class="list" id="catRank"></div></div></div>
</div><div class="toast" id="toast"></div><script>
if(!Auth.getSession()) location.href='/login';
let sessions=[]; let consents=[]; let events=[];
async function api(path){const token=Auth.getToken();const r=await fetch(SUPABASE_URL+path,{headers:{apikey:SUPABASE_ANON,Authorization:'Bearer '+token}}); if(!r.ok) throw new Error(await r.text()); return r.json();}
async function load(){sessions=(await api('/rest/v1/analytics_sessions_view?select=*&order=created_at.desc')).filter(s=>{
  const fp=String(s.file_path||'');
  if(!fp) return true;
  return fp.endsWith('strip.jpg') || fp.includes('_strip.jpg');
});consents=await api('/rest/v1/photo_consents?select=*&order=created_at.desc').catch(()=>[]);events=await api('/rest/v1/lux_events?select=id,name').catch(()=>[]);eventFilter.innerHTML='<option value="all">Semua Event</option>'+events.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');render();}
function inRange(d){const v=range.value;const t=new Date(d).getTime();const now=Date.now();if(v==='today')return new Date(d).toDateString()===new Date().toDateString();if(v==='week')return now-t<=7*864e5;if(v==='month')return now-t<=30*864e5;return true;}
function filtered(){return sessions.filter(s=>inRange(s.created_at)&&(eventFilter.value==='all'||String(s.event_id)===eventFilter.value));}
function countBy(arr,fn){const m={};arr.forEach(x=>{const k=fn(x)||'-';m[k]=(m[k]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1]);}
function rank(el,data,total){el.innerHTML=data.length?data.slice(0,6).map(([k,v])=>`<div class="list-item"><div><b>${k}</b><div class="bar"><span style="width:${Math.max(8,Math.round(v/Math.max(1,total)*100))}%"></span></div></div><b>${v}</b></div>`).join(''):'<div class="sub">Belum ada data</div>';}
function render(){const data=filtered();const total=data.length;const photo=data.reduce((s,x)=>s+(Number(x.photo_count)||1),0);const byHour=countBy(data,x=>new Date(x.created_at).getHours()+':00');const byDay=countBy(data,x=>new Date(x.created_at).toLocaleDateString('id-ID',{weekday:'long'}));const byTpl=countBy(data,x=>x.template_name);const byCat=countBy(data,x=>x.template_category);const relevantCons=consents.filter(c=>inRange(c.created_at));totalSession.textContent=total;totalPhoto.textContent=photo;peakHour.textContent=byHour[0]?.[0]||'-';consentRate.textContent=relevantCons.length?Math.round(relevantCons.filter(c=>c.publish_consent).length/relevantCons.length*100)+'%':'0%';rank(templateRank,byTpl,total);rank(dayRank,byDay,total);rank(catRank,byCat,total);const ins=[];if(byHour[0])ins.push('Jam tersibuk berada pada pukul '+byHour[0][0]+'.');if(byTpl[0])ins.push('Template '+byTpl[0][0]+' menjadi template paling populer.');if(byDay[0])ins.push('Hari '+byDay[0][0]+' memiliki jumlah sesi terbanyak.');if(relevantCons.length)ins.push('Consent rate publikasi saat ini '+consentRate.textContent+'.');insights.innerHTML=ins.length?ins.map(x=>'<div class="stat"><div style="font-weight:850">'+x+'</div></div>').join(''):'<div class="sub">Insight akan muncul setelah ada data sesi.</div>';}
function exportAnalytics(){const data=filtered();const head=['Tanggal','Event','Template','Kategori','Product Type','Photo Count'];const lines=[head,...data.map(x=>[x.created_at,x.event_name||'',x.template_name||'',x.template_category||'',x.product_type||'',x.photo_count||1])];const csv=lines.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='lux-analytics-export.csv';a.click();}
load().catch(e=>{insights.innerHTML='<div class="sub">Error: '+e.message+'</div>'});
</script></body></html>
