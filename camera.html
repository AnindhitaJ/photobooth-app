<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kamera - LUX Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }

    /* ── Video fullscreen ── */
    #video {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 1;
    }
    #canvas { display: none; }

    /* ── Overlays ── */
    #flash {
      position: fixed; inset: 0; background: white;
      opacity: 0; pointer-events: none; transition: opacity 0.08s; z-index: 60;
    }
    #flash.show { opacity: 1; }

    #countdown {
      position: fixed; inset: 0; z-index: 40; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      font-size: min(38vw, 38vh); font-weight: 900; color: white;
      text-shadow: 0 0 60px rgba(216,75,126,0.9), 0 0 120px rgba(216,75,126,0.4);
      opacity: 0; transition: opacity 0.2s;
    }
    #countdown.show { opacity: 1; }

    /* Frame guide */
    #frameGuide {
      position: fixed; pointer-events: none; z-index: 15;
      border: 2.5px solid rgba(216,75,126,0.85);
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.32);
      transition: all 0.35s ease;
    }
    #frameGuide::before, #frameGuide::after {
      content: ''; position: absolute;
      width: 20px; height: 20px; border-color: #E5B842; border-style: solid;
    }
    #frameGuide::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    #frameGuide::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* REC indicator */
    #recIndicator {
      position: fixed; top: max(14px, env(safe-area-inset-top, 14px)); right: 16px;
      display: none; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
      padding: 5px 12px; border-radius: 50px;
      font-size: 11px; font-weight: 700; z-index: 20; pointer-events: none;
    }
    #recIndicator.show { display: flex; }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #D84B7E; animation: blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── TOP HUD ── */
    #topHud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20; pointer-events: none;
      padding: max(12px, env(safe-area-inset-top, 12px)) 20px 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .hud-logo {
      font-size: 13px; font-weight: 900;
      background: linear-gradient(135deg, #D84B7E, #E5B842);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      flex-shrink: 0;
    }
    #titleText { font-size: 15px; font-weight: 700; text-align: center; flex: 1; }
    #subText { font-size: 11px; color: rgba(255,255,255,0.65); flex-shrink: 0; text-align: right; }

    /* Slot dots row */
    #slotIndicator {
      position: fixed; z-index: 20; pointer-events: all;
      top: max(52px, calc(env(safe-area-inset-top, 12px) + 42px));
      left: 0; right: 0;
      display: flex; gap: 8px; justify-content: center;
    }
    .slot-dot {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25); background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.45);
      cursor: default; transition: all 0.25s;
    }
    .slot-dot.done  { background: #E5B842; border-color: #E5B842; color: white; cursor: pointer; }
    .slot-dot.active { background: #D84B7E; border-color: #E5B842; color: white; transform: scale(1.25); box-shadow: 0 0 14px rgba(216,75,126,0.6); }

    /* ── Photo strip — left side, stacked vertically ── */
    #photosStrip {
      position: fixed; left: 16px;
      bottom: max(110px, calc(env(safe-area-inset-bottom, 16px) + 100px));
      z-index: 25; pointer-events: all;
      display: flex; flex-direction: column; gap: 8px;
    }
    .photo-item { position: relative; }
    .photo-thumb {
      width: 72px; height: 72px; border-radius: 10px;
      object-fit: cover; border: 2px solid #E5B842;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6); display: block;
    }
    .photo-thumb-empty {
      width: 72px; height: 72px; border-radius: 10px;
      border: 2px dashed rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.3); font-size: 22px; font-weight: 700;
    }
    .btn-retake {
      position: absolute; top: -8px; right: -8px;
      background: #e94560; color: white; border: 2px solid rgba(0,0,0,0.3);
      border-radius: 50%; width: 26px; height: 26px;
      font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5); transition: all 0.15s; z-index: 3;
    }
    .btn-retake:hover { background: #c0392b; transform: scale(1.15); }



    /* ── BOTTOM BAR ── */
    #bottomBar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
      padding: 12px 20px max(18px, env(safe-area-inset-bottom, 18px));
      background: linear-gradient(to top, rgba(0,0,0,0.88) 60%, transparent 100%);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    #statusMsg {
      position: absolute; top: -22px; left: 0; right: 0;
      font-size: 12px; color: rgba(255,255,255,0.65); text-align: center;
    }

    /* Bottom buttons: Back | [Shutter] | Next */
    .btn-side {
      flex-shrink: 0; padding: 12px 20px; border-radius: 50px;
      font-size: 14px; font-weight: 700; cursor: pointer; border: none;
      backdrop-filter: blur(8px); transition: all 0.2s;
      background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.8);
      border: 1.5px solid rgba(255,255,255,0.2); min-width: 90px;
      text-align: center;
    }
    .btn-side:hover { background: rgba(255,255,255,0.22); color: white; }

    #btnAmbil {
      flex: 1; max-width: 220px;
      background: linear-gradient(135deg, #D84B7E, #E5B842);
      color: white; border: none; padding: 16px 28px;
      font-size: 17px; font-weight: 800; border-radius: 50px;
      cursor: pointer; box-shadow: 0 4px 22px rgba(216,75,126,0.55);
      transition: all 0.2s;
    }
    #btnAmbil:hover { transform: scale(1.04); box-shadow: 0 8px 30px rgba(216,75,126,0.65); }
    #btnAmbil:disabled { opacity: 0.38; pointer-events: none; }

    #btnLanjut {
      flex: 1; max-width: 220px;
      background: linear-gradient(135deg, #E5B842, #c9972a);
      color: white; border: none; padding: 16px 28px;
      font-size: 17px; font-weight: 800; border-radius: 50px;
      cursor: pointer; box-shadow: 0 4px 22px rgba(229,184,66,0.5);
      transition: all 0.2s; display: none;
    }
    #btnLanjut:hover { transform: scale(1.04); box-shadow: 0 8px 30px rgba(229,184,66,0.65); }

    /* ── Mode Modal ── */
    #modeModal {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
    }
    .mode-card {
      background: #1D3557; border-radius: 22px; padding: 28px 24px;
      width: 88%; max-width: 380px; border: 2px solid rgba(216,75,126,0.4);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .mode-card h2 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .mode-card p  { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 20px; }
    .mode-btn {
      display: flex; align-items: center; gap: 14px;
      width: 100%; padding: 14px 16px; margin-bottom: 10px;
      border-radius: 14px; border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06); color: white;
      cursor: pointer; text-align: left; transition: all 0.18s; font-family: inherit;
    }
    .mode-btn:hover:not(:disabled) { border-color: #D84B7E; background: rgba(216,75,126,0.12); }
    .mode-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .mode-icon { font-size: 30px; flex-shrink: 0; }
    .mode-text h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .mode-text p  { font-size: 12px; color: rgba(255,255,255,0.55); margin: 0; }
    .timer-row { display: flex; gap: 8px; margin-top: 6px; }
    .timer-opt {
      flex: 1; padding: 9px; border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .timer-opt.sel { border-color: #D84B7E; background: rgba(216,75,126,0.18); color: white; }
    .timer-hint { font-size: 11px; color: #D84B7E; text-align: center; margin-top: 8px; min-height: 16px; }

    /* ── Photo Preview Panel ── */
    #previewPanel {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.94); backdrop-filter: blur(10px);
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; padding: 24px;
    }
    #previewPanel.show { display: flex; }
    #previewBig {
      max-width: min(70vw, 380px); max-height: 58vh;
      border-radius: 14px; object-fit: contain;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
      border: 2px solid rgba(255,255,255,0.08); transition: opacity 0.2s;
    }
    #previewThumbs {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    }
    .prev-thumb {
      width: 60px; height: 60px; border-radius: 9px; object-fit: cover;
      cursor: pointer; border: 2.5px solid rgba(255,255,255,0.18);
      opacity: 0.6; transition: all 0.15s;
    }
    .prev-thumb.active { border-color: #E5B842; opacity: 1; transform: scale(1.1); box-shadow: 0 4px 14px rgba(229,184,66,0.5); }
    #previewActions {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    }
    .prev-btn {
      padding: 13px 26px; border-radius: 50px;
      font-size: 15px; font-weight: 700; cursor: pointer; border: none;
      transition: all 0.2s; font-family: inherit;
    }
    .prev-btn-back { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); border: 1.5px solid rgba(255,255,255,0.2); }
    .prev-btn-back:hover { background: rgba(255,255,255,0.2); color: white; }
    .prev-btn-go { background: linear-gradient(135deg, #E5B842, #c9972a); color: white; box-shadow: 0 6px 20px rgba(229,184,66,0.4); }
    .prev-btn-go:hover { transform: scale(1.03); }

    /* Landscape tweaks */
    @media (orientation: landscape) {
      #photosStrip { bottom: max(88px, calc(env(safe-area-inset-bottom,8px) + 78px)); }
      #bottomBar { padding: 10px 24px max(10px, env(safe-area-inset-bottom, 10px)); }
      .photo-thumb, .photo-thumb-empty { width: 56px; height: 56px; }
      #btnAmbil, #btnLanjut { font-size: 15px; padding: 13px 22px; }
    }
  </style>
</head>
<body>

<!-- Photo Preview Panel -->
<div id="previewPanel">
  <img id="previewBig" src="" alt="Preview">
  <div id="previewThumbs"></div>
  <div id="previewActions">
    <button class="prev-btn prev-btn-back" onclick="closePreview()">← Edit Ulang</button>
    <button class="prev-btn prev-btn-go"   onclick="lanjutFilter()">Lanjut ke Filter →</button>
  </div>
</div>

<!-- Mode Modal -->
<div id="modeModal">
  <div class="mode-card">
    <h2>📸 Pilih Mode</h2>
    <p>Pilih timer dulu, lalu pilih cara foto.</p>

    <div class="timer-row">
      <button class="timer-opt" id="t3"  onclick="setTimer(3)">3 dtk</button>
      <button class="timer-opt" id="t5"  onclick="setTimer(5)">5 dtk</button>
      <button class="timer-opt" id="t10" onclick="setTimer(10)">10 dtk</button>
    </div>
    <p class="timer-hint" id="timerHint">← Pilih timer dulu</p>

    <button class="mode-btn" id="modeAuto"   onclick="setMode('auto')"   disabled>
      <div class="mode-icon">⚡</div>
      <div class="mode-text"><h3>Otomatis</h3><p>Foto jalan sendiri satu per satu</p></div>
    </button>
    <button class="mode-btn" id="modeManual" onclick="setMode('manual')" disabled>
      <div class="mode-icon">🖐️</div>
      <div class="mode-text"><h3>Manual</h3><p>Klik tombol sendiri tiap mau foto</p></div>
    </button>
  </div>
</div>

<!-- Camera -->
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="flash"></div>
<div id="countdown"></div>
<div id="frameGuide"></div>
<div id="recIndicator"><div class="rec-dot"></div> REC</div>

<!-- TOP HUD -->
<div id="topHud">
  <div class="hud-logo" style="display:flex;align-items:center;gap:6px;"><img src="/logo.png" alt="LUX" style="height:22px;width:22px;border-radius:50%;object-fit:cover;">LUX</div>
  <div id="titleText"></div>
  <div id="subText"></div>
</div>
<div id="slotIndicator"></div>

<!-- Strip -->
<div id="photosStrip"></div>

<!-- BOTTOM BAR: Back | Shutter | Next -->
<div id="bottomBar">
  <div id="statusMsg"></div>
  <button class="btn-side" onclick="kembali()">← Balik</button>
  <button id="btnAmbil"  onclick="mulaiCountdown()">📷 Ambil</button>
  <button id="btnLanjut" onclick="lanjutFilter()">Lanjut →</button>
  <button class="btn-side" id="btnSkip" style="visibility:hidden">skip</button>
</div>

<!-- CONFIRM QUIT MODAL -->
<div id="confirmQuitModal" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:24px;">
  <div style="background:#1D3557;border-radius:22px;padding:28px 24px;max-width:320px;width:100%;text-align:center;border:1.5px solid rgba(255,255,255,0.12);box-shadow:0 20px 60px rgba(0,0,0,0.6);">
    <div style="font-size:48px;margin-bottom:12px;">⚠️</div>
    <div style="font-size:18px;font-weight:900;color:white;margin-bottom:8px;">Batalkan Sesi?</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:24px;line-height:1.5;">Foto yang sudah diambil akan hilang.<br>Yakin ingin keluar?</div>
    <div style="display:flex;gap:10px;">
      <button onclick="batalKeluar()" style="flex:1;padding:13px;border-radius:50px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:white;font-size:14px;font-weight:700;cursor:pointer;">Lanjut Foto</button>
      <button onclick="konfirmasiKeluar()" style="flex:1;padding:13px;border-radius:50px;border:none;background:linear-gradient(135deg,#e94560,#c0392b);color:white;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(233,69,96,0.4);">Ya, Keluar</button>
    </div>
  </div>
</div>

<script>
  const slotCount    = parseInt(localStorage.getItem('slotCount') || '1');
  const templateName = localStorage.getItem('templateName') || 'Template';
  document.getElementById('subText').textContent = templateName + ' · ' + slotCount + ' foto';

  const video        = document.getElementById('video');
  const canvas       = document.getElementById('canvas');
  const countdownEl  = document.getElementById('countdown');
  const flashEl      = document.getElementById('flash');
  const btnAmbil     = document.getElementById('btnAmbil');
  const btnLanjut    = document.getElementById('btnLanjut');
  const statusMsg    = document.getElementById('statusMsg');
  const recIndicator = document.getElementById('recIndicator');

  let photos         = new Array(slotCount).fill(null);
  let liveVideos     = new Array(slotCount).fill(null);
  let currentSlot    = 0;
  let isCountingDown = false;
  let stream         = null;
  let mediaRecorder  = null;
  let recordedChunks = [];
  let captureMode    = null;
  let countdownSec   = 5;

  // Pan/Zoom
  const zoom = 1.0, panX = 0, panY = 0;

  function updateVideoTransform() {
    video.style.transform = 'scaleX(-1)';
    updateFrameGuide();
  }

  function updateFrameGuide() {
    const guide = document.getElementById('frameGuide');
    const slots = JSON.parse(localStorage.getItem('templateSlots') || '[]');
    if (!slots.length) { guide.style.opacity = '0'; return; }
    const slot = slots[currentSlot] || slots[0];

    const slotAspect = slot.w / slot.h;

    // Dimensi capture canvas (landscape selalu)
    const CAP_W = 1280, CAP_H = 960;

    // Dimensi video asli dari kamera
    const rawW = video.videoWidth  || 1280;
    const rawH = video.videoHeight || 720;

    // Layar user
    const scrW = window.innerWidth;
    const scrH = window.innerHeight;

    // ── Step 1: video (rawW×rawH) → canvas capture (CAP_W×CAP_H) ──
    // ambilFoto() pakai cover-fit: scale = Math.max(CAP_W/rawW, CAP_H/rawH)
    // → area video yang masuk ke capture (center-crop):
    const capScale = Math.max(CAP_W / rawW, CAP_H / rawH);
    const capSrcW  = CAP_W / capScale;   // lebar area video → capture
    const capSrcH  = CAP_H / capScale;   // tinggi area video → capture

    // ── Step 2: video (rawW×rawH) → layar (scrW×scrH) via object-fit:cover ──
    // scale agar video cover layar:
    const dispScale = Math.max(scrW / rawW, scrH / rawH);
    // area video yang visible di layar (center-crop):
    const visSrcW = scrW / dispScale;    // lebar area video yang keliatan
    const visSrcH = scrH / dispScale;    // tinggi area video yang keliatan

    // ── Step 3: irisan capture ∩ visible ──
    // Keduanya center-crop dari video asli
    // Irisan = min dari keduanya di tiap dimensi:
    const interSrcW = Math.min(capSrcW, visSrcW);
    const interSrcH = Math.min(capSrcH, visSrcH);

    // Ukuran irisan di layar (px):
    const interScrW = interSrcW * dispScale;
    const interScrH = interSrcH * dispScale;

    // ── Step 4: dalam irisan (= area capture yang terlihat di layar),
    // composite cover-fit ke slot aspect ratio ──
    // Rasio irisan terhadap capture:
    const interCapW = interSrcW / capSrcW;   // fraksi lebar capture yang visible
    const interCapH = interSrcH / capSrcH;   // fraksi tinggi capture yang visible
    // Ukuran irisan dalam px capture:
    const interCapPxW = interCapW * CAP_W;
    const interCapPxH = interCapH * CAP_H;
    // Cover-fit slot ke irisan capture:
    const slotScale = Math.max(slot.w / interCapPxW, slot.h / interCapPxH);
    const usedCapW  = slot.w / slotScale;
    const usedCapH  = slot.h / slotScale;
    // Rasio area yang dipakai terhadap irisan:
    const useRatioW = usedCapW / interCapPxW;
    const useRatioH = usedCapH / interCapPxH;

    // ── Step 5: guide di layar ──
    const guideW = interScrW * useRatioW;
    const guideH = interScrH * useRatioH;

    guide.style.left   = (scrW / 2 - guideW / 2) + 'px';
    guide.style.top    = (scrH / 2 - guideH / 2) + 'px';
    guide.style.width  = guideW + 'px';
    guide.style.height = guideH + 'px';
    guide.style.opacity = '1';
  }


  // ── Indicators & Strip ──
  function renderIndicators() {
    const ind = document.getElementById('slotIndicator');
    ind.innerHTML = '';
    for (let i = 0; i < slotCount; i++) {
      const dot = document.createElement('div');
      if (photos[i]) {
        dot.className = 'slot-dot done';
        dot.onclick = () => retakePhoto(i);
        dot.title = 'Foto ' + (i+1) + ' — klik retake';
      } else {
        dot.className = 'slot-dot' + (i === currentSlot ? ' active' : '');
      }
      dot.textContent = i + 1;
      ind.appendChild(dot);
    }
  }

  function renderStrip() {
    const strip = document.getElementById('photosStrip');
    strip.innerHTML = '';
    for (let i = 0; i < slotCount; i++) {
      const item = document.createElement('div');
      item.className = 'photo-item';
      if (photos[i]) {
        const img = document.createElement('img');
        img.className = 'photo-thumb';
        img.src = photos[i];
        item.appendChild(img);
        const btn = document.createElement('button');
        btn.className = 'btn-retake';
        btn.textContent = '↺';
        btn.onclick = () => retakePhoto(i);
        item.appendChild(btn);
      } else {
        const empty = document.createElement('div');
        empty.className = 'photo-thumb-empty';
        empty.textContent = i + 1;
        item.appendChild(empty);
      }
      strip.appendChild(item);
    }
  }

  function updateTitle() {
    const allDone = photos.every(p => p !== null);
    if (!allDone) {
      const next = photos.findIndex(p => p === null);
      document.getElementById('titleText').textContent = 'Foto ' + (next+1) + '/' + slotCount;
      btnAmbil.style.display = '';
      btnLanjut.style.display = 'none';
      document.getElementById('btnSkip').style.visibility = 'hidden';
    } else {
      document.getElementById('titleText').textContent = 'Semua selesai ✓';
      btnAmbil.style.display = 'none';
      btnLanjut.style.display = '';
      document.getElementById('btnSkip').style.visibility = 'hidden';
    }
  }

  function retakePhoto(idx) {
    if (isCountingDown) return;
    photos[idx] = null; liveVideos[idx] = null;
    currentSlot = idx;
    renderStrip(); renderIndicators(); updateTitle();
    statusMsg.textContent = 'Siap ambil ulang foto ' + (idx+1);
    btnAmbil.disabled = false;
    updateFrameGuide();
    if (!stream || !stream.active) startCamera();
  }

  // ── Camera ──
  async function startCamera() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      video.srcObject = stream;
      video.play().catch(() => {});
    } catch(e) {
      statusMsg.textContent = 'Kamera tidak bisa diakses.';
      btnAmbil.disabled = true;
    }
  }

  // ── Live recording ──
  function startLiveRecording(idx) {
    if (!stream || !window.MediaRecorder) return;
    recordedChunks = [];
    const mime = ['video/webm;codecs=vp8','video/webm','video/mp4']
      .find(m => { try { return MediaRecorder.isTypeSupported(m); } catch(e) { return false; } }) || '';
    if (!mime) return;
    try {
      mediaRecorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 1500000 });
      mediaRecorder.ondataavailable = e => { if (e.data?.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: mime });
        const reader = new FileReader();
        reader.onload = ev => { liveVideos[idx] = ev.target.result; };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start(100);
      recIndicator.classList.add('show');
    } catch(e) { console.warn('MediaRecorder:', e); }
  }

  function stopLiveRecording() {
    recIndicator.classList.remove('show');
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    mediaRecorder = null;
  }

  // ── Timer & Mode selection ──
  function setTimer(sec) {
    countdownSec = sec;
    [3,5,10].forEach(s => document.getElementById('t'+s).classList.toggle('sel', s === sec));
    document.getElementById('timerHint').textContent = '';
    document.getElementById('modeAuto').disabled   = false;
    document.getElementById('modeManual').disabled = false;
  }

  function setMode(mode) {
    captureMode = mode;
    document.getElementById('modeModal').style.display = 'none';
    // Start camera now that modal is closed
    startCamera().then(() => {
      setTimeout(updateFrameGuide, 600);
      if (mode === 'auto') {
        btnAmbil.style.display = 'none';
        setTimeout(() => mulaiCountdown(), 800);
      } else {
        btnAmbil.style.display = '';
        btnAmbil.disabled = false;
      }
    });
  }

  // ── Countdown & Capture ──
  function mulaiCountdown() {
    if (isCountingDown) return;
    isCountingDown = true;
    btnAmbil.disabled = true;
    currentSlot = photos.findIndex(p => p === null);
    if (currentSlot === -1) { isCountingDown = false; return; }
    renderIndicators();

    let angka = countdownSec;
    let liveStarted = false;
    countdownEl.textContent = angka;
    countdownEl.classList.add('show');

    const iv = setInterval(() => {
      angka--;
      if (angka === 2 && !liveStarted) { liveStarted = true; startLiveRecording(currentSlot); }
      if (angka > 0) {
        countdownEl.textContent = angka;
      } else {
        clearInterval(iv);
        countdownEl.classList.remove('show');
        ambilFoto();
      }
    }, 1000);
  }

  function ambilFoto() {
    flashEl.classList.add('show');
    setTimeout(() => flashEl.classList.remove('show'), 180);

    const W = 1280, H = 960;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    const vW = video.videoWidth || W, vH = video.videoHeight || H;
    const scale = Math.max(W/vW, H/vH);
    const drawW = vW * scale, drawH = vH * scale;
    const drawX = (W - drawW) / 2;
    const drawY = (H - drawH) / 2;
    ctx.save(); ctx.translate(W, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, vW, vH, drawX, drawY, drawW, drawH);
    ctx.restore();

    photos[currentSlot] = canvas.toDataURL('image/jpeg', 0.85);
    setTimeout(() => stopLiveRecording(), 800);
    isCountingDown = false;

    renderStrip(); renderIndicators(); updateTitle(); updateFrameGuide();

    const nextEmpty = photos.findIndex(p => p === null);
    if (nextEmpty !== -1) {
      currentSlot = nextEmpty;
      statusMsg.textContent = 'Bagus! Sekarang foto ' + (nextEmpty+1);
      if (captureMode === 'auto') {
        setTimeout(() => { statusMsg.textContent = ''; mulaiCountdown(); }, 1200);
      } else {
        setTimeout(() => { statusMsg.textContent = ''; btnAmbil.disabled = false; }, 1200);
      }
    } else {
      statusMsg.textContent = 'Semua foto selesai! ✓';
      if (stream) stream.getTracks().forEach(t => t.stop());
      setTimeout(() => showPreview(), 700);
    }
  }

  // ── Preview Panel ──
  function showPreview() {
    const panel = document.getElementById('previewPanel');
    const big   = document.getElementById('previewBig');
    const thumbs = document.getElementById('previewThumbs');
    thumbs.innerHTML = '';
    const valid = photos.filter(Boolean);
    big.src = valid[0] || '';
    valid.forEach((src, i) => {
      const img = document.createElement('img');
      img.className = 'prev-thumb' + (i === 0 ? ' active' : '');
      img.src = src;
      img.onclick = () => {
        document.querySelectorAll('.prev-thumb').forEach(t => t.classList.remove('active'));
        img.classList.add('active');
        big.style.opacity = '0';
        setTimeout(() => { big.src = src; big.style.opacity = '1'; }, 150);
      };
      thumbs.appendChild(img);
    });
    panel.classList.add('show');
  }

  function closePreview() {
    document.getElementById('previewPanel').classList.remove('show');
    btnAmbil.style.display = captureMode === 'manual' ? '' : 'none';
    if (!stream || !stream.active) startCamera();
  }

  function lanjutFilter() {
    try {
      localStorage.removeItem('photos');
      localStorage.removeItem('filteredPhotos');
      localStorage.removeItem('livePhotos');
      localStorage.setItem('photos', JSON.stringify(photos));
      setTimeout(() => {
        const validLive = liveVideos.filter(Boolean);
        if (validLive.length > 0) {
          try { localStorage.setItem('livePhotos', JSON.stringify(liveVideos)); } catch(e) {}
        }
        window.location.href = 'filter.html';
      }, 500);
    } catch(e) {
      alert('Storage penuh. Hapus template lama di Admin lalu coba lagi.');
    }
  }

  function kembali() {
    // Cek apakah sudah ada foto yang diambil
    const sudahAda = photos.some(Boolean);
    if (sudahAda) {
      document.getElementById('confirmQuitModal').style.display = 'flex';
    } else {
      if (stream) stream.getTracks().forEach(t => t.stop());
      window.location.href = 'template.html';
    }
  }
  function konfirmasiKeluar() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    ['photos','filteredPhotos','finalPhoto','finalPhotoThumb','livePhotos'].forEach(k => localStorage.removeItem(k));
    window.location.href = 'template.html';
  }
  function batalKeluar() {
    document.getElementById('confirmQuitModal').style.display = 'none';
  }

  // ── Pan/Zoom wiring ──


  // Init
  renderIndicators(); renderStrip(); updateTitle(); updateVideoTransform();
  window.addEventListener('resize', updateFrameGuide);
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }
</script>
