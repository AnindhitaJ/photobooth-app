<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamera - LUX Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e; color: white;
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 20px; text-align: center;
    }
    .logo-text {
      font-size: 15px; font-weight: 800;
      background: linear-gradient(135deg, #e94560, #f5a623);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    h2 { font-size: 20px; font-weight: 700; margin: 6px 0 2px; }
    .sub-text { font-size: 13px; color: #a0a0b0; }
    .slot-indicator {
      display: flex; gap: 8px; justify-content: center;
      margin: 10px 0; flex-wrap: wrap;
    }
    .slot-dot {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid #0f3460; background: transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #a0a0b0;
      cursor: default; transition: all 0.3s;
    }
    .slot-dot.done { background: #27ae60; border-color: #27ae60; color: white; cursor: pointer; }
    .slot-dot.active { background: #e94560; border-color: #e94560; color: white; transform: scale(1.2); }
    .slot-dot.uploading { background: #f5a623; border-color: #f5a623; color: white; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .camera-wrapper {
      position: relative; width: 100%; max-width: 440px;
      border-radius: 20px; overflow: hidden;
      background: #000; aspect-ratio: 4/3; margin: 8px 0;
    }
    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #canvas { display: none; position: absolute; left: -9999px; }
    .countdown-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 96px; font-weight: 900; color: white;
      text-shadow: 0 0 40px rgba(233,69,96,0.8);
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .countdown-overlay.show { opacity: 1; }
    .flash-overlay {
      position: absolute; inset: 0; background: white;
      opacity: 0; pointer-events: none; transition: opacity 0.1s;
    }
    .flash-overlay.show { opacity: 1; }
    .rec-indicator {
      position: absolute; top: 10px; right: 12px;
      display: none; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.6); padding: 4px 10px;
      border-radius: 50px; font-size: 11px; font-weight: 700; color: white;
    }
    .rec-indicator.show { display: flex; }
    .rec-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #e94560; animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .photos-strip {
      display: flex; gap: 8px; justify-content: center;
      margin: 8px 0; flex-wrap: wrap;
    }
    .photo-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .photo-thumb {
      width: 64px; height: 64px; border-radius: 8px;
      object-fit: cover; border: 2px solid #27ae60;
    }
    .photo-thumb-uploading {
      width: 64px; height: 64px; border-radius: 8px;
      border: 2px solid #f5a623; background: #16213e;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #f5a623; font-weight: 700;
    }
    .photo-thumb-empty {
      width: 64px; height: 64px; border-radius: 8px;
      border: 2px dashed #0f3460;
      display: flex; align-items: center; justify-content: center;
      color: #0f3460; font-size: 20px;
    }
    .btn-retake {
      background: #e94560; color: white; border: none;
      border-radius: 50px; font-size: 10px; font-weight: 700;
      padding: 3px 8px; cursor: pointer; transition: all 0.15s;
    }
    .btn-retake:hover { background: #c73652; }
    .controls {
      display: flex; gap: 12px; align-items: center;
      justify-content: center; flex-wrap: wrap; margin-top: 8px;
    }
    .btn {
      padding: 12px 24px; border-radius: 50px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-primary { background: #e94560; color: white; padding: 16px 36px; font-size: 17px; }
    .btn-primary:hover { background: #c73652; transform: scale(1.04); }
    .btn-primary:disabled { opacity: 0.4; pointer-events: none; }
    .btn-secondary { background: transparent; color: #a0a0b0; border: 2px solid #a0a0b0; }
    .btn-secondary:hover { color: white; border-color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #219a52; }
    .btn-success:disabled { opacity: 0.4; pointer-events: none; }
    #statusMsg { font-size: 13px; color: #a0a0b0; margin-top: 10px; min-height: 20px; }
  </style>
</head>
<body>

  <div class="logo-text">📸 LUX PHOTOBOOTH</div>
  <h2 id="titleText">Ambil Foto</h2>
  <p class="sub-text" id="subText"></p>
  <div class="slot-indicator" id="slotIndicator"></div>
  <canvas id="canvas"></canvas>

  <div class="camera-wrapper">
    <video id="video" autoplay playsinline></video>
    <div class="countdown-overlay" id="countdown"></div>
    <div class="flash-overlay" id="flash"></div>
    <div class="rec-indicator" id="recIndicator">
      <div class="rec-dot"></div> REC
    </div>
  </div>

  <div class="photos-strip" id="photosStrip"></div>

  <div class="controls">
    <button class="btn btn-secondary" onclick="kembali()">← Balik</button>
    <button class="btn btn-primary" id="btnAmbil" onclick="mulaiCountdown()">📷 Ambil Foto</button>
    <button class="btn btn-success" id="btnLanjut" onclick="lanjutFilter()" style="display:none" disabled>Lanjut ke Filter →</button>
  </div>
  <p id="statusMsg"></p>

<script>
  // ─── Supabase ───
  const SUPABASE_URL  = 'https://eguiubpsijwjwxaxvkhi.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVndWl1YnBzaWp3and4YXh2a2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMTM4NTcsImV4cCI6MjA5NDg4OTg1N30.jwFtqnsbWlhSEtEeF-ZTEBq63CUQpN4jHPRmFpY827o';
  const BUCKET = 'photobooth';

  async function uploadToSupabase(blob, filename) {
    const path = `sessions/${sessionId}/${filename}`;
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${SUPABASE_ANON}`,
        'Content-Type': blob.type,
        'x-upsert': 'true',
      },
      body: blob,
    });
    if (!res.ok) throw new Error(`Upload gagal: ${await res.text()}`);
    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
  }

  function dataURLtoBlob(dataURL) {
    const arr = dataURL.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    const u8 = new Uint8Array(bstr.length);
    for (let i = 0; i < bstr.length; i++) u8[i] = bstr.charCodeAt(i);
    return new Blob([u8], { type: mime });
  }

  // ─── State ───
  const slotCount    = parseInt(localStorage.getItem('slotCount') || '1');
  const templateName = localStorage.getItem('templateName') || 'Template';
  const sessionId    = Date.now(); // unique per sesi foto

  document.getElementById('subText').textContent = `${templateName} · ${slotCount} foto`;

  const video        = document.getElementById('video');
  const canvas       = document.getElementById('canvas');
  const countdownEl  = document.getElementById('countdown');
  const flashEl      = document.getElementById('flash');
  const btnAmbil     = document.getElementById('btnAmbil');
  const btnLanjut    = document.getElementById('btnLanjut');
  const statusMsg    = document.getElementById('statusMsg');
  const recIndicator = document.getElementById('recIndicator');

  // photos[i] = Supabase public URL (bukan base64)
  let photos        = new Array(slotCount).fill(null);
  let uploadPending = new Array(slotCount).fill(false); // sedang upload
  let liveVideos    = new Array(slotCount).fill(null);
  let currentSlot   = 0;
  let isCountingDown = false;
  let stream        = null;
  let mediaRecorder = null;
  let recordedChunks = [];

  // ─── Indicators ───
  function renderIndicators() {
    const ind = document.getElementById('slotIndicator');
    ind.innerHTML = '';
    for (let i = 0; i < slotCount; i++) {
      const dot = document.createElement('div');
      if (uploadPending[i]) {
        dot.className = 'slot-dot uploading';
        dot.title = `Foto ${i+1} — mengupload...`;
      } else if (photos[i]) {
        dot.className = 'slot-dot done';
        dot.title = `Foto ${i+1} — klik untuk retake`;
        dot.onclick = () => retakePhoto(i);
      } else if (i === currentSlot) {
        dot.className = 'slot-dot active';
      } else {
        dot.className = 'slot-dot';
      }
      dot.textContent = i + 1;
      ind.appendChild(dot);
    }
  }

  function renderStrip() {
    const strip = document.getElementById('photosStrip');
    strip.innerHTML = '';
    for (let i = 0; i < slotCount; i++) {
      const item = document.createElement('div');
      item.className = 'photo-item';

      if (uploadPending[i]) {
        const uploading = document.createElement('div');
        uploading.className = 'photo-thumb-uploading';
        uploading.textContent = '⏫';
        item.appendChild(uploading);
      } else if (photos[i]) {
        const img = document.createElement('img');
        img.className = 'photo-thumb';
        img.src = photos[i]; // Supabase URL langsung
        img.crossOrigin = 'anonymous';
        item.appendChild(img);
        const btn = document.createElement('button');
        btn.className = 'btn-retake';
        btn.textContent = '↺ Retake';
        btn.onclick = () => retakePhoto(i);
        item.appendChild(btn);
      } else {
        const empty = document.createElement('div');
        empty.className = 'photo-thumb-empty';
        empty.textContent = i + 1;
        item.appendChild(empty);
      }
      strip.appendChild(item);
    }
  }

  function updateTitle() {
    const allDone = photos.every(p => p !== null);
    const anyUploading = uploadPending.some(Boolean);

    if (anyUploading) {
      document.getElementById('titleText').textContent = 'Mengupload foto...';
      btnAmbil.style.display = '';
      btnLanjut.style.display = 'none';
      return;
    }

    if (!allDone) {
      const next = photos.findIndex(p => p === null);
      document.getElementById('titleText').textContent = `Foto ${next + 1} dari ${slotCount}`;
      btnAmbil.style.display = '';
      btnLanjut.style.display = 'none';
    } else {
      document.getElementById('titleText').textContent = 'Semua foto siap! ✓';
      btnAmbil.style.display = 'none';
      btnLanjut.style.display = '';
      btnLanjut.disabled = false;
    }
  }

  function checkAllUploaded() {
    const allDone    = photos.every(p => p !== null);
    const noneWaiting = !uploadPending.some(Boolean);
    if (allDone && noneWaiting) {
      updateTitle();
    }
  }

  function retakePhoto(idx) {
    if (isCountingDown || uploadPending[idx]) return;
    photos[idx]        = null;
    liveVideos[idx]    = null;
    uploadPending[idx] = false;
    currentSlot        = idx;
    renderStrip();
    renderIndicators();
    updateTitle();
    statusMsg.textContent = `Siap ambil ulang foto ${idx + 1}`;
    btnAmbil.disabled = false;
    if (!video.srcObject || !video.srcObject.active) startCamera();
  }

  // ─── Camera ───
  async function startCamera() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 960 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
    } catch(err) {
      statusMsg.textContent = 'Kamera tidak bisa diakses.';
      btnAmbil.disabled = true;
    }
  }

  // ─── Live recording ───
  function startLiveRecording(slotIdx) {
    if (!stream || !window.MediaRecorder) return;
    recordedChunks = [];
    const mimeType = ['video/webm;codecs=vp8','video/webm','video/mp4']
      .find(m => { try { return MediaRecorder.isTypeSupported(m); } catch(e) { return false; } }) || '';
    if (!mimeType) return;
    try {
      mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 1500000 });
      mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        const blob = new Blob(recordedChunks, { type: mimeType });
        try {
          const url = await uploadToSupabase(blob, `live-${slotIdx}.webm`);
          liveVideos[slotIdx] = url;
        } catch(e) {
          console.warn('Live video upload failed:', e);
        }
      };
      mediaRecorder.start(100);
      recIndicator.classList.add('show');
    } catch(e) {
      console.warn('MediaRecorder error:', e);
    }
  }

  function stopLiveRecording() {
    recIndicator.classList.remove('show');
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    mediaRecorder = null;
  }

  // ─── Countdown ───
  function mulaiCountdown() {
    if (isCountingDown) return;
    isCountingDown = true;
    btnAmbil.disabled = true;
    currentSlot = photos.findIndex(p => p === null);
    if (currentSlot === -1) return;

    let angka = 5, liveStarted = false;
    countdownEl.textContent = angka;
    countdownEl.classList.add('show');

    const interval = setInterval(() => {
      angka--;
      if (angka === 2 && !liveStarted) {
        liveStarted = true;
        startLiveRecording(currentSlot);
      }
      if (angka > 0) {
        countdownEl.textContent = angka;
      } else {
        clearInterval(interval);
        countdownEl.classList.remove('show');
        ambilFoto();
      }
    }, 1000);
  }

  async function ambilFoto() {
    flashEl.classList.add('show');
    setTimeout(() => flashEl.classList.remove('show'), 200);

    const W = 960, H = 720;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.save();
    ctx.translate(W, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, video.videoWidth || W, video.videoHeight || H, 0, 0, W, H);
    ctx.restore();

    const dataURL = canvas.toDataURL('image/jpeg', 0.88);
    setTimeout(() => stopLiveRecording(), 800);
    isCountingDown = false;

    // Upload ke Supabase
    const slot = currentSlot;
    uploadPending[slot] = true;
    renderStrip();
    renderIndicators();
    statusMsg.textContent = `Foto ${slot + 1} diambil, mengupload...`;

    try {
      const blob = dataURLtoBlob(dataURL);
      const url  = await uploadToSupabase(blob, `photo-${slot}.jpg`);
      photos[slot]        = url;
      uploadPending[slot] = false;
      statusMsg.textContent = `Foto ${slot + 1} siap ✓`;
      setTimeout(() => { statusMsg.textContent = ''; }, 1500);
    } catch(e) {
      // Fallback: simpan base64 ke sessionStorage kalau Supabase gagal
      console.warn('Upload gagal, fallback ke sessionStorage:', e);
      try {
        sessionStorage.setItem(`photo_${slot}`, dataURL);
        photos[slot] = `__session__${slot}`; // marker
      } catch(e2) {
        statusMsg.textContent = `Foto ${slot + 1} gagal disimpan: ${e.message}`;
      }
      uploadPending[slot] = false;
    }

    renderStrip();
    renderIndicators();
    checkAllUploaded();

    const nextEmpty = photos.findIndex(p => p === null);
    if (nextEmpty !== -1) {
      currentSlot = nextEmpty;
      setTimeout(() => { btnAmbil.disabled = false; }, 500);
    } else {
      if (stream && !uploadPending.some(Boolean)) {
        stream.getTracks().forEach(t => t.stop());
      }
    }
  }

  function lanjutFilter() {
    if (uploadPending.some(Boolean)) {
      statusMsg.textContent = 'Tunggu upload selesai dulu...';
      return;
    }

    // Simpan URLs ke localStorage (bukan base64, jadi aman)
    localStorage.removeItem('photos');
    localStorage.removeItem('filteredPhotos');
    localStorage.removeItem('livePhotos');
    localStorage.setItem('photos', JSON.stringify(photos));
    localStorage.setItem('sessionId', String(sessionId));

    // Live videos (URL Supabase)
    const validLive = liveVideos.filter(Boolean);
    if (validLive.length > 0) {
      localStorage.setItem('livePhotos', JSON.stringify(liveVideos));
    }

    window.location.href = 'filter.html';
  }

  function kembali() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    window.location.href = 'template.html';
  }

  renderIndicators();
  renderStrip();
  updateTitle();
  startCamera();
</script>
</body>
</html>
