<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LUX Photo">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Kamera - LUX Photobooth</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI', system-ui, sans-serif; color:white; }
    #video { position:fixed; inset:0; width:100vw; height:100vh; object-fit:cover; transform:scaleX(-1); transform-origin:center center; z-index:1; }
    #canvas { display:none; position:absolute; left:-9999px; }
    .overlay { position:fixed; z-index:10; pointer-events:none; }
    #flash { inset:0; background:white; opacity:0; transition:opacity 0.1s; z-index:50; pointer-events:none; position:fixed; }
    #flash.show { opacity:1; }
    #countdown {
      inset:0; display:flex; align-items:center; justify-content:center;
      font-size:min(40vw,40vh); font-weight:900; color:white;
      text-shadow: 0 0 60px rgba(255,107,53,0.9), 0 0 120px rgba(255,107,53,0.5);
      opacity:0; transition:opacity 0.2s; position:fixed; pointer-events:none; z-index:30;
    }
    #countdown.show { opacity:1; }
    #recIndicator {
      position:fixed; top:max(14px,env(safe-area-inset-top,14px)); right:16px;
      display:none; align-items:center; gap:6px;
      background:rgba(0,0,0,0.65); backdrop-filter:blur(6px);
      padding:5px 12px; border-radius:50px; font-size:11px; font-weight:700; color:white;
      z-index:20; pointer-events:none;
    }
    #recIndicator.show { display:flex; }
    .rec-dot { width:8px; height:8px; border-radius:50%; background:#ff6b35; animation:blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    #frameGuide {
      position:fixed; pointer-events:none; z-index:15;
      border:2px solid rgba(255,107,53,0.8); border-radius:8px;
      box-shadow:0 0 0 9999px rgba(0,0,0,0.30); transition:all 0.3s;
    }
    #frameGuide::before, #frameGuide::after {
      content:''; position:absolute; width:22px; height:22px;
      border-color:rgba(255,210,63,0.9); border-style:solid;
    }
    #frameGuide::before { top:-2px; left:-2px; border-width:3px 0 0 3px; border-radius:6px 0 0 0; }
    #frameGuide::after { bottom:-2px; right:-2px; border-width:0 3px 3px 0; border-radius:0 0 6px 0; }
    #filmStrip {
      position:fixed; left:0; top:50%; transform:translateY(-50%);
      display:flex; flex-direction:column; gap:6px; padding:10px 8px;
      z-index:20; pointer-events:none;
    }
    .strip-slot {
      width:52px; height:52px; border-radius:10px; overflow:hidden;
      border:2px solid rgba(255,107,53,0.5); background:rgba(0,0,0,0.5);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .strip-slot.active { border-color:rgba(255,210,63,0.9); box-shadow:0 0 12px rgba(255,210,63,0.5); }
    .strip-slot.done { border-color:rgba(6,214,160,0.8); }
    .strip-slot img { width:100%; height:100%; object-fit:cover; }
    .slot-num { color:rgba(255,255,255,0.4); font-size:13px; font-weight:700; }
    #progressBar {
      position:fixed; top:0; left:0; right:0; height:4px;
      background:rgba(255,255,255,0.1); z-index:25; pointer-events:none;
    }
    #progressFill {
      height:100%; background:linear-gradient(90deg,#ff6b35,#ffd23f);
      width:0%; transition:width 0.4s; border-radius:0 2px 2px 0;
    }
    #bottomBar {
      position:fixed; bottom:0; left:0; right:0; z-index:20;
      padding:16px 20px max(20px,env(safe-area-inset-bottom,20px));
      background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 100%);
      display:flex; flex-direction:column; gap:12px; pointer-events:auto;
    }
    #statusMsg {
      text-align:center; font-size:14px; font-weight:700; color:rgba(255,255,255,0.9);
      min-height:20px; text-shadow:0 1px 4px rgba(0,0,0,0.5);
    }
    .controls-row { display:flex; align-items:center; justify-content:center; gap:20px; }
    #btnBack {
      width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.15);
      backdrop-filter:blur(8px); border:2px solid rgba(255,255,255,0.25);
      color:white; font-size:18px; cursor:pointer; display:flex;
      align-items:center; justify-content:center; transition:all 0.2s;
    }
    #btnBack:hover { background:rgba(255,255,255,0.25); }
    #btnShutter {
      width:76px; height:76px; border-radius:50%; border:4px solid white; cursor:pointer;
      background:transparent; display:flex; align-items:center; justify-content:center;
      transition:all 0.15s; position:relative; flex-shrink:0;
    }
    #btnShutter::before {
      content:''; width:58px; height:58px; border-radius:50%;
      background:linear-gradient(135deg,#ff6b35,#ffd23f);
      transition:all 0.15s;
    }
    #btnShutter:active::before { width:52px; height:52px; }
    #btnShutter:disabled::before { background:#555; }
    #btnFlip {
      width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.15);
      backdrop-filter:blur(8px); border:2px solid rgba(255,255,255,0.25);
      color:white; font-size:18px; cursor:pointer; display:flex;
      align-items:center; justify-content:center; transition:all 0.2s;
    }
    #btnFlip:hover { background:rgba(255,255,255,0.25); }
    #delaySelector {
      display:flex; gap:6px; justify-content:center; align-items:center; flex-wrap:wrap;
    }
    .delay-label { font-size:11px; font-weight:700; color:rgba(255,255,255,0.6); letter-spacing:1px; text-transform:uppercase; }
    .delay-btn {
      padding:5px 14px; border-radius:50px; font-size:12px; font-weight:700;
      border:2px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1);
      color:rgba(255,255,255,0.7); cursor:pointer; transition:all 0.15s; backdrop-filter:blur(4px);
    }
    .delay-btn.active { background:rgba(255,107,53,0.8); border-color:#ff6b35; color:white; }
    #topBar {
      position:fixed; top:0; left:0; right:0; z-index:20;
      padding:max(14px,env(safe-area-inset-top,14px)) 16px 10px;
      display:flex; align-items:center; justify-content:space-between;
      background:linear-gradient(to bottom,rgba(0,0,0,0.7) 0%,transparent 100%);
      pointer-events:auto;
    }
    .top-left { display:flex; align-items:center; gap:8px; }
    #slotProgress {
      font-size:13px; font-weight:800; color:rgba(255,255,255,0.85);
      background:rgba(0,0,0,0.5); backdrop-filter:blur(6px);
      padding:5px 12px; border-radius:50px; border:1px solid rgba(255,255,255,0.15);
    }
    #templateName {
      font-size:12px; font-weight:700; color:rgba(255,255,255,0.7);
      background:rgba(0,0,0,0.5); backdrop-filter:blur(6px);
      padding:4px 10px; border-radius:50px; max-width:120px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    #liveToggle {
      display:flex; align-items:center; gap:6px;
      background:rgba(0,0,0,0.5); backdrop-filter:blur(6px);
      padding:5px 12px; border-radius:50px; border:1px solid rgba(255,255,255,0.15);
      color:rgba(255,255,255,0.85); font-size:12px; font-weight:700;
      cursor:pointer; transition:all 0.2s;
    }
    #liveToggle.on { border-color:rgba(255,107,53,0.7); background:rgba(255,107,53,0.3); }
    .live-dot { width:7px; height:7px; border-radius:50%; background:#ff6b35; }
    #liveToggle.on .live-dot { animation:blink 1s ease-in-out infinite; }
  </style>
</head>
<body>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="flash"></div>
  <div id="countdown"></div>
  <div id="frameGuide"></div>
  <div id="recIndicator"><div class="rec-dot"></div> REC</div>

  <!-- TOP HUD -->
  <div id="topHud">
    <div class="hud-logo">📸 LUX</div>
    <div id="titleText" style="font-size:14px;font-weight:700"></div>
    <div class="hud-sub" id="subText"></div>
  </div>
  <div id="slotIndicator"></div>

  <!-- BOTTOM PANEL -->
  <div id="bottomPanel">
    <div id="photosStrip"></div>
    <div id="panControls">
      <button class="pan-btn" id="btnZoomOut" title="Zoom out">−</button>
      <span class="zoom-label" id="zoomLabel">1.0×</span>
      <button class="pan-btn" id="btnZoomIn" title="Zoom in">+</button>
      <span style="width:4px"></span>
      <button class="pan-btn" id="btnPanUp">↑</button>
      <button class="pan-btn" id="btnPanLeft">←</button>
      <button class="pan-btn" id="btnPanDown">↓</button>
      <button class="pan-btn" id="btnPanRight">→</button>
      <button class="btn-reset-pan" id="btnResetPan">Reset</button>
    </div>
    <div id="actionRow">
      <button class="btn btn-back" onclick="kembali()">← Balik</button>
      <button class="btn btn-primary" id="btnAmbil" onclick="mulaiCountdown()">📷 Ambil</button>
      <button class="btn btn-success" id="btnLanjut" onclick="lanjutFilter()" style="display:none">Lanjut →</button>
    </div>
    <p id="statusMsg"></p>
  </div>

<script>
  const slotCount    = parseInt(localStorage.getItem('slotCount') || '1');
  const templateName = localStorage.getItem('templateName') || 'Template';

  document.getElementById('subText').textContent = `${templateName} · ${slotCount} foto`;

  const video        = document.getElementById('video');
  const canvas       = document.getElementById('canvas');
  const countdownEl  = document.getElementById('countdown');
  const flashEl      = document.getElementById('flash');
  const btnAmbil     = document.getElementById('btnAmbil');
  const btnLanjut    = document.getElementById('btnLanjut');
  const statusMsg    = document.getElementById('statusMsg');
  const recIndicator = document.getElementById('recIndicator');

  let photos      = new Array(slotCount).fill(null);
  let liveVideos  = new Array(slotCount).fill(null);
  let currentSlot = 0;
  let isCountingDown = false;
  let stream      = null;
  let mediaRecorder   = null;
  let recordedChunks  = [];

  // Pan/Zoom state
  let panX = 0, panY = 0, zoom = 1.0;
  const PAN_STEP  = 0.05;
  const ZOOM_STEP = 0.1;
  const ZOOM_MAX  = 2.5;
  const ZOOM_MIN  = 1.0;

  function updateVideoTransform() {
    const vW = window.innerWidth, vH = window.innerHeight;
    const tx = -panX * vW;
    const ty =  panY * vH;
    video.style.transform = `scaleX(-1) scale(${zoom}) translate(${tx / zoom}px, ${ty / zoom}px)`;
    document.getElementById('zoomLabel').textContent = zoom.toFixed(1) + '×';
    syncPanBtns();
  }

  function syncPanBtns() {
    const disabled = zoom <= ZOOM_MIN;
    ['btnPanUp','btnPanDown','btnPanLeft','btnPanRight'].forEach(id => {
      const el = document.getElementById(id);
      el.style.opacity = disabled ? '0.3' : '1';
      el.style.pointerEvents = disabled ? 'none' : 'auto';
    });
  }

  function updateFrameGuide() {
    const guide = document.getElementById('frameGuide');
    const vW = window.innerWidth, vH = window.innerHeight;
    const slots = JSON.parse(localStorage.getItem('templateSlots') || '[]');
    if (slots.length === 0) { guide.style.opacity = '0'; return; }
    const slot = slots[currentSlot] || slots[0];
    const slotAspect = slot.w / slot.h;
    const wrapAspect = vW / vH;
    let gW, gH;
    if (slotAspect > wrapAspect) {
      gW = vW * 0.85; gH = gW / slotAspect;
    } else {
      gH = vH * 0.85; gW = gH * slotAspect;
    }
    guide.style.left   = ((vW - gW) / 2) + 'px';
    guide.style.top    = ((vH - gH) / 2) + 'px';
    guide.style.width  = gW + 'px';
    guide.style.height = gH + 'px';
    guide.style.opacity = '1';
  }

  function renderIndicators() {
    const ind = document.getElementById('slotIndicator');
    ind.innerHTML = '';
    for (let i = 0; i < slotCount; i++) {
      const dot = document.createElement('div');
      if (photos[i]) {
        dot.className = 'slot-dot done';
        dot.title = `Foto ${i+1} — klik untuk retake`;
        dot.onclick = () => retakePhoto(i);
      } else if (i === currentSlot) {
        dot.className = 'slot-dot active';
      } else {
        dot.className = 'slot-dot';
      }
      dot.textContent = i + 1;
      ind.appendChild(dot);
    }
  }

  function renderStrip() {
    const strip = document.getElementById('photosStrip');
    strip.innerHTML = '';
    for (let i = 0; i < slotCount; i++) {
      const item = document.createElement('div');
      item.className = 'photo-item';
      if (photos[i]) {
        const img = document.createElement('img');
        img.className = 'photo-thumb';
        img.src = photos[i];
        item.appendChild(img);
        const btn = document.createElement('button');
        btn.className = 'btn-retake';
        btn.textContent = '↺';
        btn.onclick = () => retakePhoto(i);
        item.appendChild(btn);
      } else {
        const empty = document.createElement('div');
        empty.className = 'photo-thumb-empty';
        empty.textContent = i + 1;
        item.appendChild(empty);
      }
      strip.appendChild(item);
    }
  }

  function updateTitle() {
    const allDone = photos.every(p => p !== null);
    if (!allDone) {
      const next = photos.findIndex(p => p === null);
      document.getElementById('titleText').textContent = `Foto ${next + 1}/${slotCount}`;
      btnAmbil.style.display = '';
      btnLanjut.style.display = 'none';
    } else {
      document.getElementById('titleText').textContent = 'Selesai! ✓';
      btnAmbil.style.display = 'none';
      btnLanjut.style.display = '';
    }
  }

  function retakePhoto(idx) {
    if (isCountingDown) return;
    photos[idx] = null; liveVideos[idx] = null;
    currentSlot = idx;
    renderStrip(); renderIndicators(); updateTitle();
    statusMsg.textContent = `Siap ambil ulang foto ${idx + 1}`;
    btnAmbil.disabled = false;
    if (!video.srcObject || !video.srcObject.active) startCamera();
    updateFrameGuide();
  }

  async function startCamera() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
    } catch(err) {
      statusMsg.textContent = 'Kamera tidak bisa diakses.';
      btnAmbil.disabled = true;
    }
  }

  function startLiveRecording(slotIdx) {
    if (!stream || !window.MediaRecorder) return;
    recordedChunks = [];
    const mimeType = ['video/webm;codecs=vp8','video/webm','video/mp4']
      .find(m => { try { return MediaRecorder.isTypeSupported(m); } catch(e) { return false; } }) || '';
    if (!mimeType) return;
    try {
      mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 1500000 });
      mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: mimeType });
        const reader = new FileReader();
        reader.onload = ev => { liveVideos[slotIdx] = ev.target.result; };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start(100);
      recIndicator.classList.add('show');
    } catch(e) { console.warn('MediaRecorder error:', e); }
  }

  function stopLiveRecording() {
    recIndicator.classList.remove('show');
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    mediaRecorder = null;
  }

  function mulaiCountdown() {
    if (isCountingDown) return;
    isCountingDown = true;
    btnAmbil.disabled = true;
    currentSlot = photos.findIndex(p => p === null);
    if (currentSlot === -1) return;

    let angka = 5;
    let liveStarted = false;
    countdownEl.textContent = angka;
    countdownEl.classList.add('show');

    const interval = setInterval(() => {
      angka--;
      if (angka === 2 && !liveStarted) { liveStarted = true; startLiveRecording(currentSlot); }
      if (angka > 0) {
        countdownEl.textContent = angka;
      } else {
        clearInterval(interval);
        countdownEl.classList.remove('show');
        ambilFoto();
      }
    }, 1000);
  }

  function ambilFoto() {
    flashEl.classList.add('show');
    setTimeout(() => flashEl.classList.remove('show'), 200);

    const W = 720, H = 540;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    const vW = video.videoWidth || W;
    const vH = video.videoHeight || H;
    const baseScale = Math.max(W / vW, H / vH);
    const totalScale = baseScale * zoom;
    const drawW = vW * totalScale, drawH = vH * totalScale;
    const drawX = (W - drawW) / 2 - panX * drawW;
    const drawY = (H - drawH) / 2 + panY * drawH;
    ctx.save();
    ctx.translate(W, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, vW, vH, drawX, drawY, drawW, drawH);
    ctx.restore();
    photos[currentSlot] = canvas.toDataURL('image/jpeg', 0.85);

    setTimeout(() => stopLiveRecording(), 800);
    isCountingDown = false;

    const nextEmpty = photos.findIndex(p => p === null);
    if (nextEmpty !== -1) {
      currentSlot = nextEmpty;
      statusMsg.textContent = `Bagus! Sekarang foto ${nextEmpty + 1}`;
      setTimeout(() => { statusMsg.textContent = ''; btnAmbil.disabled = false; }, 1200);
    } else {
      statusMsg.textContent = 'Semua foto selesai! ✓';
      if (stream) stream.getTracks().forEach(t => t.stop());
    }
    renderStrip(); renderIndicators(); updateTitle(); updateFrameGuide();
  }

  function lanjutFilter() {
    try {
      localStorage.removeItem('photos'); localStorage.removeItem('filteredPhotos'); localStorage.removeItem('livePhotos');
      localStorage.setItem('photos', JSON.stringify(photos));
      setTimeout(() => {
        const validLive = liveVideos.filter(Boolean);
        if (validLive.length > 0) {
          try { localStorage.setItem('livePhotos', JSON.stringify(liveVideos)); } catch(e) { console.warn('livePhotos too large:', e); }
        }
        window.location.href = 'filter.html';
      }, 600);
    } catch(err) {
      alert('Storage penuh. Hapus beberapa template lama di Admin, lalu coba lagi.');
    }
  }

  function kembali() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    window.location.href = 'template.html';
  }

  // Pan/Zoom buttons
  document.getElementById('btnZoomIn').onclick  = () => { zoom = Math.min(ZOOM_MAX, +(zoom+ZOOM_STEP).toFixed(1)); updateVideoTransform(); };
  document.getElementById('btnZoomOut').onclick = () => { zoom = Math.max(ZOOM_MIN, +(zoom-ZOOM_STEP).toFixed(1)); if(zoom===1){panX=0;panY=0;} updateVideoTransform(); };
  document.getElementById('btnPanUp').onclick    = () => { panY = Math.max(-0.4, panY - PAN_STEP); updateVideoTransform(); };
  document.getElementById('btnPanDown').onclick  = () => { panY = Math.min(0.4, panY + PAN_STEP); updateVideoTransform(); };
  document.getElementById('btnPanLeft').onclick  = () => { panX = Math.min(0.4, panX + PAN_STEP); updateVideoTransform(); };
  document.getElementById('btnPanRight').onclick = () => { panX = Math.max(-0.4, panX - PAN_STEP); updateVideoTransform(); };
  document.getElementById('btnResetPan').onclick = () => { panX = 0; panY = 0; zoom = 1.0; updateVideoTransform(); };

  syncPanBtns();
  renderIndicators(); renderStrip(); updateTitle();
  startCamera();
  setTimeout(updateFrameGuide, 800);
  window.addEventListener('resize', updateFrameGuide);
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }
</script>
</body>
</html>
