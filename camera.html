<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LUX Photo">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Kamera - LUX Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    #video {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      transform-origin: center center;
      z-index: 1;
    }
    #canvas { display: none; position: absolute; left: -9999px; }
    .overlay { position: fixed; z-index: 10; pointer-events: none; }
    #flash {
      inset: 0; background: white;
      opacity: 0; transition: opacity 0.1s;
      z-index: 50; pointer-events: none; position: fixed;
    }
    #flash.show { opacity: 1; }
    #countdown {
      inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: min(40vw, 40vh); font-weight: 900; color: white;
      text-shadow: 0 0 60px rgba(255,107,53,0.9), 0 0 120px rgba(255,107,53,0.5);
      opacity: 0; transition: opacity 0.2s; position: fixed;
      pointer-events: none; z-index: 30;
    }
    #countdown.show { opacity: 1; }
    #recIndicator {
      position: fixed; top: max(14px, env(safe-area-inset-top, 14px)); right: 16px;
      display: none; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
      padding: 5px 12px; border-radius: 50px;
      font-size: 11px; font-weight: 700; color: white;
      z-index: 20; pointer-events: none;
    }
    #recIndicator.show { display: flex; }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff6b35; animation: blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    #frameGuide {
      position: fixed; pointer-events: none; z-index: 15;
      border: 2px solid rgba(255,107,53,0.8);
      border-radius: 6px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.30);
      transition: all 0.3s;
    }
    #frameGuide::before, #frameGuide::after {
      content: ''; position: absolute;
      width: 22px; height: 22px;
      border-color: #ffd23f; border-style: solid;
    }
    #frameGuide::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    #frameGuide::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    /* TOP HUD */
    #topHud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      padding: max(10px, env(safe-area-inset-top, 10px)) 16px 10px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
      pointer-events: none;
    }
    .hud-logo {
      font-size: 13px; font-weight: 800;
      background: linear-gradient(135deg, #ff6b35, #ffd23f);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #titleText { font-size: 14px; font-weight: 700; }
    .hud-sub { font-size: 11px; color: rgba(255,255,255,0.7); }
    #slotIndicator {
      position: fixed; top: max(48px, calc(env(safe-area-inset-top, 10px) + 38px)); left: 0; right: 0;
      display: flex; gap: 8px; justify-content: center; z-index: 20; pointer-events: all;
    }
    .slot-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5);
      cursor: default; transition: all 0.3s;
    }
    .slot-dot.done { background: #06d6a0; border-color: #06d6a0; color: white; cursor: pointer; }
    .slot-dot.active { background: #ff6b35; border-color: #ffd23f; color: white; transform: scale(1.25); box-shadow: 0 0 12px rgba(255,107,53,0.7); }
    /* BOTTOM PANEL */
    #bottomPanel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      padding: 12px 16px max(16px, env(safe-area-inset-bottom, 16px));
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
      display: flex; flex-direction: row; gap: 12px;
      align-items: flex-end; justify-content: center;
    }
    /* Photo strip overlaid bottom-left on video */
    #photosStrip {
      position: fixed;
      bottom: max(90px, calc(env(safe-area-inset-bottom,16px) + 80px));
      left: 16px;
      display: flex; flex-direction: column; gap: 6px;
      z-index: 25; pointer-events: all;
    }
    .photo-item {
      position: relative; display: block;
    }
    .photo-thumb {
      width: 80px; height: 80px; border-radius: 10px;
      object-fit: cover;
      border: 2px solid #06d6a0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      display: block;
    }
    .photo-thumb-empty {
      width: 80px; height: 80px; border-radius: 10px;
      border: 2px dashed rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.35); font-size: 24px; font-weight: 700;
    }
    .btn-retake {
      position: absolute; top: 4px; right: 4px;
      background: rgba(233,69,96,0.9); color: white; border: none;
      border-radius: 50%; width: 24px; height: 24px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      transition: all 0.15s;
    }
    .btn-retake:hover { background: #e94560; transform: scale(1.15); }
    #panControls {
      display: flex; align-items: center; gap: 5px; flex-wrap: wrap; justify-content: center;
    }
    .pan-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25); background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px); color: rgba(255,255,255,0.8);
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; user-select: none;
    }
    .pan-btn:hover { border-color: #ff6b35; color: white; }
    .pan-btn:active { background: #ff6b35; border-color: #ff6b35; color: white; }
    .zoom-label { font-size: 10px; color: rgba(255,255,255,0.6); min-width: 30px; text-align: center; }
    .btn-reset-pan {
      padding: 4px 10px; border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      color: rgba(255,255,255,0.5); font-size: 10px; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-reset-pan:hover { color: white; border-color: rgba(255,255,255,0.6); }
    #actionRow {
      display: flex; gap: 12px; align-items: center; justify-content: center;
    }
    .btn {
      padding: 11px 22px; border-radius: 50px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; border: none; transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    .btn-back {
      background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8);
      border: 1.5px solid rgba(255,255,255,0.2);
    }
    .btn-back:hover { background: rgba(255,255,255,0.2); color: white; }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b35, #ffd23f);
      color: white; padding: 14px 32px; font-size: 16px;
      box-shadow: 0 4px 20px rgba(255,107,53,0.55);
    }
    .btn-primary:hover { transform: scale(1.04); box-shadow: 0 8px 28px rgba(255,107,53,0.65); }
    .btn-primary:disabled { opacity: 0.4; pointer-events: none; }
    .btn-success {
      background: linear-gradient(135deg, #06d6a0, #04b589);
      color: white; box-shadow: 0 4px 20px rgba(6,214,160,0.45);
    }
    .btn-success:hover { transform: scale(1.04); }
    #statusMsg {
      font-size: 12px; color: rgba(255,255,255,0.6);
      text-align: center; min-height: 16px;
    }
    @media (orientation: landscape) {
      #bottomPanel {
        flex-direction: row; align-items: flex-end;
        flex-wrap: nowrap; gap: 8px;
        padding: 8px 24px max(8px, env(safe-area-inset-bottom, 8px));
        right: max(0px, env(safe-area-inset-right, 0px));
        left: max(0px, env(safe-area-inset-left, 0px));
        justify-content: center;
      }
      #photosStrip {
        bottom: max(80px, calc(env(safe-area-inset-bottom,8px) + 70px));
        left: 12px; flex-direction: column; gap: 5px;
      }
      .photo-thumb, .photo-thumb-empty { width: 60px; height: 60px; }
      .btn-retake { width: 20px; height: 20px; font-size: 11px; }
      #panControls { flex-direction: column; gap: 4px; }
      #actionRow { flex-direction: column; }
      .btn-primary { padding: 11px 22px; font-size: 14px; }
      #slotIndicator {
        top: max(10px, env(safe-area-inset-top, 10px));
        flex-direction: column;
        left: auto; right: 8px; width: auto;
      }
      #topHud { padding: max(8px, env(safe-area-inset-top, 8px)) 12px 8px; }
    }
  
  /* ─── Mode Selection Modal ─── */
  .mode-modal-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .mode-modal {
    background: #1a1a2e; border-radius: 20px;
    padding: 32px 28px; width: 88%; max-width: 380px;
    border: 2px solid #e94560; text-align: center;
  }
  .mode-modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 6px; color: white; }
  .mode-modal p { font-size: 13px; color: #a0a0b0; margin-bottom: 24px; }
  .mode-btn {
    display: flex; align-items: center; gap: 14px;
    width: 100%; padding: 16px 18px; margin-bottom: 12px;
    border-radius: 14px; border: 2px solid #0f3460;
    background: #16213e; color: white;
    cursor: pointer; text-align: left; transition: all 0.2s;
  }
  .mode-btn:hover:not(:disabled) { border-color: #e94560; background: #0f3460; transform: scale(1.02); }
  .mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .mode-btn .mode-icon { font-size: 32px; flex-shrink: 0; }
  .mode-btn .mode-text h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .mode-btn .mode-text p { font-size: 12px; color: #a0a0b0; margin: 0; }
  .mode-timer-row { display: flex; gap: 8px; margin-top: 4px; }
  .mode-timer-opt {
    flex: 1; padding: 8px; border-radius: 10px;
    border: 2px solid #0f3460; background: #0f3460;
    color: white; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .mode-timer-opt.selected { border-color: #e94560; background: #e94560; }

  /* ─── Photo Preview Panel (muncul setelah selesai) ─── */
  #photoPreviewPanel {
    position: fixed; inset: 0; z-index: 28;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
  }
  #photoPreviewPanel.show { display: flex; }
  #previewBigImg {
    max-width: 70vw; max-height: 65vh;
    border-radius: 14px; object-fit: contain;
    box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    border: 2px solid rgba(255,255,255,0.1);
    transition: opacity 0.2s;
  }
  #previewThumbs {
    display: flex; gap: 10px; margin-top: 16px;
    justify-content: center; flex-wrap: wrap;
  }
  .preview-thumb {
    width: 64px; height: 64px; border-radius: 10px;
    object-fit: cover; cursor: pointer;
    border: 2px solid rgba(255,255,255,0.2);
    transition: all 0.15s; opacity: 0.6;
  }
  .preview-thumb.active {
    border-color: #06d6a0; opacity: 1;
    transform: scale(1.1);
    box-shadow: 0 4px 16px rgba(6,214,160,0.5);
  }
  #previewActions {
    display: flex; gap: 12px; margin-top: 20px;
  }
</style>
</head>
<body>

  <!-- Photo Preview Panel -->
  <div id="photoPreviewPanel">
    <img id="previewBigImg" src="" alt="Preview" />
    <div id="previewThumbs"></div>
    <div id="previewActions">
      <button class="btn btn-back" onclick="closePreview()">← Edit Ulang</button>
      <button class="btn btn-success" onclick="lanjutFilter()">Lanjut ke Filter →</button>
    </div>
  </div>

  <!-- Mode Selection Modal -->
  <div class="mode-modal-overlay" id="modeModal">
    <div class="mode-modal">
      <h2>📸 Pilih Mode Foto</h2>
      <p>Bagaimana kamu mau ambil foto?</p>

      <button class="mode-btn" onclick="setMode('auto')" disabled>
        <div class="mode-icon">⚡</div>
        <div class="mode-text">
          <h3>Otomatis</h3>
          <p>Foto jalan sendiri satu per satu</p>
        </div>
      </button>

      <button class="mode-btn" onclick="setMode('manual')" disabled>
        <div class="mode-icon">🖐️</div>
        <div class="mode-text">
          <h3>Manual</h3>
          <p>Klik tombol sendiri tiap mau foto</p>
        </div>
      </button>

      <div style="margin-top:8px">
        <p style="font-size:12px;color:#a0a0b0;margin-bottom:8px">⏱ Pilih timer dulu:</p>
        <div class="mode-timer-row">
          <button class="mode-timer-opt" id="timer3" onclick="setTimer(3)">3 detik</button>
          <button class="mode-timer-opt" id="timer5" onclick="setTimer(5)">5 detik</button>
          <button class="mode-timer-opt" id="timer10" onclick="setTimer(10)">10 detik</button>
        </div>
        <p id="modeHint" style="font-size:11px;color:#e94560;margin-top:8px;text-align:center">
          ← Pilih timer dulu, baru pilih mode
        </p>
      </div>
    </div>
  </div>


  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="flash"></div>
  <div id="countdown"></div>
  <div id="frameGuide"></div>
  <div id="recIndicator"><div class="rec-dot"></div> REC</div>

  <!-- TOP HUD -->
  <div id="topHud">
    <div class="hud-logo">📸 LUX</div>
    <div id="titleText" style="font-size:14px;font-weight:700"></div>
    <div class="hud-sub" id="subText"></div>
  </div>
  <div id="slotIndicator"></div>

  <!-- BOTTOM PANEL -->
  <div id="bottomPanel">
    <div id="photosStrip"></div>
    <div id="panControls">
      <button class="pan-btn" id="btnZoomOut" title="Zoom out">−</button>
      <span class="zoom-label" id="zoomLabel">1.0×</span>
      <button class="pan-btn" id="btnZoomIn" title="Zoom in">+</button>
      <span style="width:4px"></span>
      <button class="pan-btn" id="btnPanUp">↑</button>
      <button class="pan-btn" id="btnPanLeft">←</button>
      <button class="pan-btn" id="btnPanDown">↓</button>
      <button class="pan-btn" id="btnPanRight">→</button>
      <button class="btn-reset-pan" id="btnResetPan">Reset</button>
    </div>
    <div id="actionRow">
      <button class="btn btn-back" onclick="kembali()">← Balik</button>
      <button class="btn btn-primary" id="btnAmbil" onclick="mulaiCountdown()">📷 Ambil</button>
      <button class="btn btn-success" id="btnLanjut" onclick="lanjutFilter()" style="display:none">Lanjut →</button>
    </div>
    <p id="statusMsg"></p>
  </div>

<script>
  const slotCount    = parseInt(localStorage.getItem('slotCount') || '1');
  const templateName = localStorage.getItem('templateName') || 'Template';

  document.getElementById('subText').textContent = `${templateName} · ${slotCount} foto`;

  const video        = document.getElementById('video');
  const canvas       = document.getElementById('canvas');
  const countdownEl  = document.getElementById('countdown');
  const flashEl      = document.getElementById('flash');
  const btnAmbil     = document.getElementById('btnAmbil');
  let captureMode = null; // 'auto' or 'manual'
  let countdownSeconds = null; // harus dipilih dulu
  const btnLanjut    = document.getElementById('btnLanjut');
  const statusMsg    = document.getElementById('statusMsg');
  const recIndicator = document.getElementById('recIndicator');

  let photos      = new Array(slotCount).fill(null);
  let liveVideos  = new Array(slotCount).fill(null);
  let currentSlot = 0;
  let isCountingDown = false;
  let stream      = null;
  let mediaRecorder   = null;
  let recordedChunks  = [];

  // Pan/Zoom state
  let panX = 0, panY = 0, zoom = 1.0;
  const PAN_STEP  = 0.05;
  const ZOOM_STEP = 0.1;
  const ZOOM_MAX  = 2.5;
  const ZOOM_MIN  = 1.0;

  function updateVideoTransform() {
    const vW = window.innerWidth, vH = window.innerHeight;
    const tx = -panX * vW;
    const ty =  panY * vH;
    video.style.transform = `scaleX(-1) scale(${zoom}) translate(${tx / zoom}px, ${ty / zoom}px)`;
    document.getElementById('zoomLabel').textContent = zoom.toFixed(1) + '×';
    syncPanBtns();
  }

  function syncPanBtns() {
    const disabled = zoom <= ZOOM_MIN;
    ['btnPanUp','btnPanDown','btnPanLeft','btnPanRight'].forEach(id => {
      const el = document.getElementById(id);
      el.style.opacity = disabled ? '0.3' : '1';
      el.style.pointerEvents = disabled ? 'none' : 'auto';
    });
  }

  function updateFrameGuide() {
    const guide = document.getElementById('frameGuide');
    const vW = window.innerWidth, vH = window.innerHeight;
    const slots = JSON.parse(localStorage.getItem('templateSlots') || '[]');
    if (slots.length === 0) { guide.style.opacity = '0'; return; }
    const slot = slots[currentSlot] || slots[0];
    const slotAspect = slot.w / slot.h;
    const wrapAspect = vW / vH;
    let gW, gH;
    if (slotAspect > wrapAspect) {
      gW = vW * 0.92; gH = gW / slotAspect;
    } else {
      gH = vH * 0.92; gW = gH * slotAspect;
    }
    guide.style.left   = ((vW - gW) / 2) + 'px';
    guide.style.top    = ((vH - gH) / 2) + 'px';
    guide.style.width  = gW + 'px';
    guide.style.height = gH + 'px';
    guide.style.opacity = '1';
  }

  function renderIndicators() {
    const ind = document.getElementById('slotIndicator');
    ind.innerHTML = '';
    for (let i = 0; i < slotCount; i++) {
      const dot = document.createElement('div');
      if (photos[i]) {
        dot.className = 'slot-dot done';
        dot.title = `Foto ${i+1} — klik untuk retake`;
        dot.onclick = () => retakePhoto(i);
      } else if (i === currentSlot) {
        dot.className = 'slot-dot active';
      } else {
        dot.className = 'slot-dot';
      }
      dot.textContent = i + 1;
      ind.appendChild(dot);
    }
  }

  function renderStrip() {
    const strip = document.getElementById('photosStrip');
    strip.innerHTML = '';
    for (let i = 0; i < slotCount; i++) {
      const item = document.createElement('div');
      item.className = 'photo-item';
      if (photos[i]) {
        const img = document.createElement('img');
        img.className = 'photo-thumb';
        img.src = photos[i];
        item.appendChild(img);
        const btn = document.createElement('button');
        btn.className = 'btn-retake';
        btn.textContent = '↺';
        btn.onclick = () => retakePhoto(i);
        item.appendChild(btn);
      } else {
        const empty = document.createElement('div');
        empty.className = 'photo-thumb-empty';
        empty.textContent = i + 1;
        item.appendChild(empty);
      }
      strip.appendChild(item);
    }
  }

  function updateTitle() {
    const allDone = photos.every(p => p !== null);
    if (!allDone) {
      const next = photos.findIndex(p => p === null);
      document.getElementById('titleText').textContent = `Foto ${next + 1}/${slotCount}`;
      btnAmbil.style.display = '';
      btnLanjut.style.display = 'none';
    } else {
      document.getElementById('titleText').textContent = 'Selesai! ✓';
      btnAmbil.style.display = 'none';
      btnLanjut.style.display = '';
    }
  }

  function retakePhoto(idx) {
    if (isCountingDown) return;
    photos[idx] = null; liveVideos[idx] = null;
    currentSlot = idx;
    renderStrip(); renderIndicators(); updateTitle();
    statusMsg.textContent = `Siap ambil ulang foto ${idx + 1}`;
    btnAmbil.disabled = false;
    if (!video.srcObject || !video.srcObject.active) startCamera();
    updateFrameGuide();
  }

  async function startCamera() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
    } catch(err) {
      statusMsg.textContent = 'Kamera tidak bisa diakses.';
      btnAmbil.disabled = true;
    }
  }

  function startLiveRecording(slotIdx) {
    if (!stream || !window.MediaRecorder) return;
    recordedChunks = [];
    const mimeType = ['video/webm;codecs=vp8','video/webm','video/mp4']
      .find(m => { try { return MediaRecorder.isTypeSupported(m); } catch(e) { return false; } }) || '';
    if (!mimeType) return;
    try {
      mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 1500000 });
      mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: mimeType });
        const reader = new FileReader();
        reader.onload = ev => { liveVideos[slotIdx] = ev.target.result; };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start(100);
      recIndicator.classList.add('show');
    } catch(e) { console.warn('MediaRecorder error:', e); }
  }

  function stopLiveRecording() {
    recIndicator.classList.remove('show');
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    mediaRecorder = null;
  }

  function setTimer(sec) {
    countdownSeconds = sec;
    [3, 5, 10].forEach(s => {
      const el = document.getElementById('timer' + s);
      if (el) el.classList.toggle('selected', s === sec);
    });
    // Enable mode buttons setelah timer dipilih
    document.querySelectorAll('.mode-btn').forEach(b => b.disabled = false);
    document.getElementById('modeHint').style.display = 'none';
  }

  function setMode(mode) {
    captureMode = mode;
    document.getElementById('modeModal').style.display = 'none';
    if (mode === 'manual') {
      btnAmbil.style.display = '';
      btnAmbil.disabled = false;
    } else {
      // Auto mode: hide manual button, start automatically
      btnAmbil.style.display = 'none';
      setTimeout(() => mulaiCountdown(), 800);
    }
  }

  function mulaiCountdown() {
    if (isCountingDown) return;
    isCountingDown = true;
    btnAmbil.disabled = true;
    currentSlot = photos.findIndex(p => p === null);
    if (currentSlot === -1) return;

    let angka = countdownSeconds || 3;
    let liveStarted = false;
    countdownEl.textContent = angka;
    countdownEl.classList.add('show');

    const interval = setInterval(() => {
      angka--;
      if (angka === 2 && !liveStarted) { liveStarted = true; startLiveRecording(currentSlot); }
      if (angka > 0) {
        countdownEl.textContent = angka;
      } else {
        clearInterval(interval);
        countdownEl.classList.remove('show');
        ambilFoto();
      }
    }, 1000);
  }

  function ambilFoto() {
    flashEl.classList.add('show');
    setTimeout(() => flashEl.classList.remove('show'), 200);

    const W = 720, H = 540;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    const vW = video.videoWidth || W;
    const vH = video.videoHeight || H;
    const baseScale = Math.max(W / vW, H / vH);
    const totalScale = baseScale * zoom;
    const drawW = vW * totalScale, drawH = vH * totalScale;
    const drawX = (W - drawW) / 2 - panX * drawW;
    const drawY = (H - drawH) / 2 + panY * drawH;
    ctx.save();
    ctx.translate(W, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, vW, vH, drawX, drawY, drawW, drawH);
    ctx.restore();
    photos[currentSlot] = canvas.toDataURL('image/jpeg', 0.85);

    setTimeout(() => stopLiveRecording(), 800);
    isCountingDown = false;

    const nextEmpty = photos.findIndex(p => p === null);
    if (nextEmpty !== -1) {
      currentSlot = nextEmpty;
      statusMsg.textContent = `Bagus! Sekarang foto ${nextEmpty + 1}`;
      if (captureMode === 'auto') {
        // Auto mode: langsung countdown foto berikutnya
        setTimeout(() => { statusMsg.textContent = ''; mulaiCountdown(); }, 1200);
      } else {
        setTimeout(() => { statusMsg.textContent = ''; btnAmbil.disabled = false; }, 1200);
      }
    } else {
      statusMsg.textContent = 'Semua foto selesai! ✓';
      if (stream) stream.getTracks().forEach(t => t.stop());
      setTimeout(() => showPhotoPreview(), 600);
    }
    renderStrip(); renderIndicators(); updateTitle(); updateFrameGuide();
  }

  function showPhotoPreview() {
    const panel = document.getElementById('photoPreviewPanel');
    const bigImg = document.getElementById('previewBigImg');
    const thumbs = document.getElementById('previewThumbs');

    panel.classList.add('show');

    // Build thumbs
    thumbs.innerHTML = '';
    photos.forEach((src, i) => {
      if (!src) return;
      const img = document.createElement('img');
      img.className = 'preview-thumb' + (i === 0 ? ' active' : '');
      img.src = src;
      img.onclick = () => {
        document.querySelectorAll('.preview-thumb').forEach(t => t.classList.remove('active'));
        img.classList.add('active');
        bigImg.style.opacity = '0';
        setTimeout(() => { bigImg.src = src; bigImg.style.opacity = '1'; }, 150);
      };
      thumbs.appendChild(img);
    });

    // Show first photo
    bigImg.src = photos.find(Boolean) || '';
  }

  function closePreview() {
    document.getElementById('photoPreviewPanel').classList.remove('show');
    // Allow retake
    const idx = photos.findIndex((p, i) => i === 0); // go back to first slot retake mode
    btnAmbil.style.display = captureMode === 'manual' ? '' : 'none';
    if (stream && stream.active) return;
    startCamera();
  }

  function lanjutFilter() {
    try {
      localStorage.removeItem('photos'); localStorage.removeItem('filteredPhotos'); localStorage.removeItem('livePhotos');
      localStorage.setItem('photos', JSON.stringify(photos));
      setTimeout(() => {
        const validLive = liveVideos.filter(Boolean);
        if (validLive.length > 0) {
          try { localStorage.setItem('livePhotos', JSON.stringify(liveVideos)); } catch(e) { console.warn('livePhotos too large:', e); }
        }
        window.location.href = 'filter.html';
      }, 600);
    } catch(err) {
      alert('Storage penuh. Hapus beberapa template lama di Admin, lalu coba lagi.');
    }
  }

  function kembali() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    window.location.href = 'template.html';
  }

  // Pan/Zoom buttons
  document.getElementById('btnZoomIn').onclick  = () => { zoom = Math.min(ZOOM_MAX, +(zoom+ZOOM_STEP).toFixed(1)); updateVideoTransform(); };
  document.getElementById('btnZoomOut').onclick = () => { zoom = Math.max(ZOOM_MIN, +(zoom-ZOOM_STEP).toFixed(1)); if(zoom===1){panX=0;panY=0;} updateVideoTransform(); };
  document.getElementById('btnPanUp').onclick    = () => { panY = Math.max(-0.4, panY - PAN_STEP); updateVideoTransform(); };
  document.getElementById('btnPanDown').onclick  = () => { panY = Math.min(0.4, panY + PAN_STEP); updateVideoTransform(); };
  document.getElementById('btnPanLeft').onclick  = () => { panX = Math.min(0.4, panX + PAN_STEP); updateVideoTransform(); };
  document.getElementById('btnPanRight').onclick = () => { panX = Math.max(-0.4, panX - PAN_STEP); updateVideoTransform(); };
  document.getElementById('btnResetPan').onclick = () => { panX = 0; panY = 0; zoom = 1.0; updateVideoTransform(); };

  syncPanBtns();
  renderIndicators(); renderStrip(); updateTitle();
  startCamera();
  setTimeout(updateFrameGuide, 800);
  window.addEventListener('resize', updateFrameGuide);
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }
</script>
</body>
