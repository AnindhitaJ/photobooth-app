<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamera - Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h2 {
      font-size: 22px;
      font-weight: 700;
    }

    .header p {
      font-size: 14px;
      color: #a0a0b0;
      margin-top: 4px;
    }

    .camera-wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 3/4;
      margin-bottom: 24px;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas { display: none; }

    .countdown-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 96px;
      font-weight: 900;
      color: white;
      text-shadow: 0 0 40px rgba(233,69,96,0.8);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .countdown-overlay.show { opacity: 1; }

    .flash-overlay {
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }

    .flash-overlay.show { opacity: 1; }

    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #e94560;
      color: white;
      padding: 18px 40px;
      font-size: 18px;
    }

    .btn-primary:hover { background: #c73652; transform: scale(1.04); }

    .btn-secondary {
      background: transparent;
      color: #a0a0b0;
      border: 2px solid #a0a0b0;
    }

    .btn-secondary:hover { color: white; border-color: white; }

    .btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .paket-badge {
      display: inline-block;
      background: #e94560;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #statusMsg {
      font-size: 13px;
      color: #a0a0b0;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="paket-badge" id="paketBadge">Paket</div>
    <h2>Ambil Foto</h2>
    <p>Posisikan wajah di tengah frame</p>
  </div>

  <div class="camera-wrapper">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="countdown-overlay" id="countdown"></div>
    <div class="flash-overlay" id="flash"></div>
  </div>

  <div class="controls">
    <button class="btn btn-secondary" onclick="kembali()">← Kembali</button>
    <button class="btn btn-primary" id="btnAmbil" onclick="mulaiCountdown()">📷 Ambil Foto</button>
  </div>

  <p id="statusMsg"></p>

  <script>
    const paket = localStorage.getItem('paket') || '5k';
    document.getElementById('paketBadge').textContent = 'Paket ' + paket.toUpperCase();

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const countdownEl = document.getElementById('countdown');
    const flashEl = document.getElementById('flash');
    const btnAmbil = document.getElementById('btnAmbil');
    const statusMsg = document.getElementById('statusMsg');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } },
          audio: false
        });
        video.srcObject = stream;
        statusMsg.textContent = '';
      } catch (err) {
        statusMsg.textContent = 'Kamera tidak bisa diakses. Pastikan izin kamera sudah diberikan.';
        btnAmbil.disabled = true;
      }
    }

    function mulaiCountdown() {
      btnAmbil.disabled = true;
      let angka = 3;
      countdownEl.textContent = angka;
      countdownEl.classList.add('show');

      const interval = setInterval(() => {
        angka--;
        if (angka > 0) {
          countdownEl.textContent = angka;
        } else {
          clearInterval(interval);
          countdownEl.classList.remove('show');
          ambilFoto();
        }
      }, 1000);
    }

    function ambilFoto() {
      flashEl.classList.add('show');
      setTimeout(() => flashEl.classList.remove('show'), 200);

      const w = video.videoWidth;
      const h = video.videoHeight;
      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext('2d');
      ctx.save();
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, w, h);
      ctx.restore();

      const dataURL = canvas.toDataURL('image/jpeg', 0.95);
      localStorage.setItem('foto', dataURL);

      statusMsg.textContent = 'Foto berhasil diambil! Menuju preview...';
      setTimeout(() => {
        window.location.href = 'preview.html';
      }, 800);
    }

    function kembali() {
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
      }
      window.location.href = 'index.html';
    }

    startCamera();
  </script>

</body>
</html>
