<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamera - Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .top-bar {
      margin-bottom: 16px;
    }

    .paket-badge {
      display: inline-block;
      background: #e94560;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .slot-indicator {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 12px 0;
      flex-wrap: wrap;
    }

    .slot-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #0f3460;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #a0a0b0;
      transition: all 0.3s;
    }

    .slot-dot.done {
      background: #27ae60;
      border-color: #27ae60;
      color: white;
    }

    .slot-dot.active {
      background: #e94560;
      border-color: #e94560;
      color: white;
      transform: scale(1.2);
    }

    .camera-wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
      margin-bottom: 20px;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas {
      display: none;
    }

    .countdown-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 96px;
      font-weight: 900;
      color: white;
      text-shadow: 0 0 40px rgba(233,69,96,0.8);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .countdown-overlay.show {
      opacity: 1;
    }

    .flash-overlay {
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }

    .flash-overlay.show {
      opacity: 1;
    }

    .photos-strip {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .photo-thumb {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid #27ae60;
    }

    .photo-thumb-empty {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      border: 2px dashed #0f3460;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f3460;
      font-size: 20px;
    }

    .controls {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #e94560;
      color: white;
      padding: 18px 40px;
      font-size: 18px;
    }

    .btn-primary:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .btn-secondary {
      background: transparent;
      color: #a0a0b0;
      border: 2px solid #a0a0b0;
    }

    .btn-secondary:hover {
      color: white;
      border-color: white;
    }

    .btn-success {
      background: #27ae60;
      color: white;
    }

    .btn-success:hover {
      background: #219a52;
    }

    #statusMsg {
      font-size: 13px;
      color: #a0a0b0;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="paket-badge" id="paketBadge">Paket</div>
    <h2 id="titleText">Ambil Foto</h2>
    <p style="font-size:13px; color:#a0a0b0;" id="subText"></p>
  </div>

  <div class="slot-indicator" id="slotIndicator"></div>

  <div class="photos-strip" id="photosStrip"></div>

  <div class="camera-wrapper">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="countdown-overlay" id="countdown"></div>
    <div class="flash-overlay" id="flash"></div>
  </div>

  <div class="controls">
    <button class="btn btn-secondary" onclick="kembali()">← Balik</button>
    <button class="btn btn-primary" id="btnAmbil" onclick="mulaiCountdown()">📷 Ambil Foto</button>
    <button class="btn btn-success" id="btnLanjut" onclick="lanjutFilter()" style="display:none">Lanjut ke Filter →</button>
  </div>

  <p id="statusMsg"></p>

<script>
  const paket = localStorage.getItem('paket') || '5k';
  const slotCount = parseInt(localStorage.getItem('slotCount') || '1');
  const templateName = localStorage.getItem('templateName') || 'Template';

  document.getElementById('paketBadge').textContent = 'Paket ' + paket.toUpperCase();
  document.getElementById('subText').textContent = `${templateName} · ${slotCount} foto`;

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const countdownEl = document.getElementById('countdown');
  const flashEl = document.getElementById('flash');
  const btnAmbil = document.getElementById('btnAmbil');
  const btnLanjut = document.getElementById('btnLanjut');
  const statusMsg = document.getElementById('statusMsg');

  let photos = [];
  let currentSlot = 0;

  function renderIndicators() {
    const ind = document.getElementById('slotIndicator');
    ind.innerHTML = '';

    for (let i = 0; i < slotCount; i++) {
      const dot = document.createElement('div');

      if (i < currentSlot) {
        dot.className = 'slot-dot done';
      } else if (i === currentSlot) {
        dot.className = 'slot-dot active';
      } else {
        dot.className = 'slot-dot';
      }

      dot.textContent = i + 1;
      ind.appendChild(dot);
    }
  }

  function renderStrip() {
    const strip = document.getElementById('photosStrip');
    strip.innerHTML = '';

    for (let i = 0; i < slotCount; i++) {
      if (photos[i]) {
        const img = document.createElement('img');
        img.className = 'photo-thumb';
        img.src = photos[i];
        strip.appendChild(img);
      } else {
        const empty = document.createElement('div');
        empty.className = 'photo-thumb-empty';
        empty.textContent = i + 1;
        strip.appendChild(empty);
      }
    }
  }

  function updateTitle() {
    if (currentSlot < slotCount) {
      document.getElementById('titleText').textContent = `Foto ${currentSlot + 1} dari ${slotCount}`;
      btnAmbil.style.display = '';
      btnLanjut.style.display = 'none';
    } else {
      document.getElementById('titleText').textContent = 'Semua foto selesai!';
      btnAmbil.style.display = 'none';
      btnLanjut.style.display = '';
    }
  }

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width: { ideal: 960 },
          height: { ideal: 720 }
        },
        audio: false
      });

      video.srcObject = stream;
    } catch (err) {
      console.error(err);
      statusMsg.textContent = 'Kamera tidak bisa diakses.';
      btnAmbil.disabled = true;
    }
  }

  function mulaiCountdown() {
    btnAmbil.disabled = true;

    let angka = 3;
    countdownEl.textContent = angka;
    countdownEl.classList.add('show');

    const interval = setInterval(() => {
      angka--;

      if (angka > 0) {
        countdownEl.textContent = angka;
      } else {
        clearInterval(interval);
        countdownEl.classList.remove('show');
        ambilFoto();
      }
    }, 1000);
  }

  function ambilFoto() {
    flashEl.classList.add('show');
    setTimeout(() => flashEl.classList.remove('show'), 200);

    const sourceW = video.videoWidth || 960;
    const sourceH = video.videoHeight || 720;

    const targetW = 720;
    const targetH = 540;

    canvas.width = targetW;
    canvas.height = targetH;

    const ctx = canvas.getContext('2d');

    ctx.save();
    ctx.translate(targetW, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, sourceW, sourceH, 0, 0, targetW, targetH);
    ctx.restore();

    const dataURL = canvas.toDataURL('image/jpeg', 0.55);

    photos[currentSlot] = dataURL;
    currentSlot++;

    renderStrip();
    renderIndicators();
    updateTitle();

    if (currentSlot < slotCount) {
      statusMsg.textContent = `Bagus! Sekarang foto ${currentSlot + 1} dari ${slotCount}`;

      setTimeout(() => {
        statusMsg.textContent = '';
        btnAmbil.disabled = false;
      }, 1000);
    } else {
      statusMsg.textContent = 'Semua foto udah diambil!';

      if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
      }
    }
  }

  function lanjutFilter() {
    try {
      localStorage.removeItem('photos');
      localStorage.removeItem('filteredPhotos');
      localStorage.removeItem('foto');
      localStorage.removeItem('filteredPhoto');

      localStorage.setItem('photos', JSON.stringify(photos));

      if (photos[0]) {
        localStorage.setItem('foto', photos[0]);
      }

      window.location.href = 'filter.html';
    } catch (err) {
      console.error(err);
      alert('Storage browser penuh. Hapus beberapa template lama di Admin, lalu coba lagi.');
    }
  }

  function kembali() {
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
    }

    window.location.href = 'template.html';
  }

  renderIndicators();
  renderStrip();
  updateTitle();
  startCamera();
</script>

</body>
</html>
