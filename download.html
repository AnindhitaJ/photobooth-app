<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#1D3557">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Download - LUX Photobooth</title>
  <style>
    :root {
      --orange: #D84B7E; --yellow: #E5B842;
      --bg: #FFF8FC; --border: #fad0e4;
      --text: #1D3557; --text2: #7a90b8;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 48px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background-image: radial-gradient(circle, rgba(216,75,126,0.10) 1px, transparent 1px);
      background-size: 28px 28px; background-color: var(--bg);
    }

    /* ── Header ── */
    .header {
      background: white; border-bottom: 2px solid var(--border);
      padding: 16px 20px; text-align: center;
      box-shadow: 0 2px 12px rgba(216,75,126,0.08);
      position: sticky; top: 0; z-index: 10;
    }
    .header-logo {
      font-size: 13px; font-weight: 900; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text2);
    }
    .header-logo span {
      background: linear-gradient(135deg, var(--orange), var(--text));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ── Main ── */
    .main { max-width: 480px; margin: 0 auto; padding: 24px 20px; }

    /* ── Status card ── */
    .status-card {
      background: white; border: 2px solid var(--border); border-radius: 20px;
      padding: 24px 20px; text-align: center; margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(216,75,126,0.08);
    }
    .status-icon { font-size: 52px; margin-bottom: 12px; line-height: 1; }
    .status-title { font-size: 22px; font-weight: 900; margin-bottom: 6px; letter-spacing: -0.5px; }
    .status-sub { font-size: 14px; color: var(--text2); font-weight: 500; line-height: 1.5; }

    /* ── Preview ── */
    .preview-wrap {
      background: white; border: 2px solid var(--border); border-radius: 20px;
      padding: 16px; margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(216,75,126,0.08);
      display: none;
    }
    .preview-wrap.visible { display: block; }
    .preview-label {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--text2); margin-bottom: 10px;
    }
    #preview {
      width: 100%; border-radius: 14px; border: 2px solid var(--border);
      object-fit: contain; display: block;
    }

    /* ── Buttons ── */
    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 15px 24px; border-radius: 50px; font-size: 15px; font-weight: 800;
      cursor: pointer; border: none; transition: all 0.2s; width: 100%;
      font-family: inherit;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    .btn-icon { font-size: 20px; }
    .btn-info { flex: 1; text-align: left; }
    .btn-info-title { font-size: 15px; font-weight: 800; line-height: 1.2; }
    .btn-info-sub { font-size: 12px; opacity: 0.75; font-weight: 500; margin-top: 1px; }
    .btn-badge {
      background: rgba(255,255,255,0.25); border-radius: 50px;
      padding: 3px 10px; font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
    }

    .btn-jpg {
      background: linear-gradient(135deg, var(--orange), #1D3557);
      color: white; box-shadow: 0 6px 20px rgba(216,75,126,0.4);
    }
    .btn-jpg:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(216,75,126,0.5); }

    .btn-gif {
      background: linear-gradient(135deg, var(--yellow), #c9972a);
      color: white; box-shadow: 0 6px 20px rgba(229,184,66,0.4);
      display: none;
    }
    .btn-gif:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(229,184,66,0.5); }
    .btn-gif.visible { display: flex; }

    .btn-outline {
      background: white; border: 2.5px solid var(--border);
      color: var(--text2); box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .btn-outline:hover { border-color: var(--orange); color: var(--orange); transform: translateY(-1px); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text); color: white; padding: 12px 24px;
      border-radius: 50px; font-size: 14px; font-weight: 700;
      opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #06a870; }
    .toast.error { background: #e94560; }

    /* ── Countdown ── */
    .countdown-bar {
      background: linear-gradient(135deg, #fff3e0, #FFF8FC);
      border: 2px solid var(--border); border-radius: 14px;
      padding: 10px 14px; margin-bottom: 12px;
      display: none; align-items: center; gap: 10px;
    }
    .countdown-bar.visible { display: flex; }
    .countdown-icon { font-size: 18px; flex-shrink: 0; }
    .countdown-text { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.5; }
    .countdown-text span { color: var(--orange); font-weight: 900; }
    /* ── Spinner ── */
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--orange); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="/auth.js"></script>
</head>
<body>

<div class="header">
  <div class="header-logo" style="display:flex;align-items:center;justify-content:center;gap:8px;"><img src="/logo.png" alt="LUX Photobooth" style="height:36px;width:36px;border-radius:50%;object-fit:cover;"><span>LUX PHOTOBOOTH</span></div>
</div>

<div class="main">

  <div class="status-card" id="statusCard">
    <div class="spinner" id="spinner"></div>
    <div class="status-title" id="statusTitle">Memuat foto...</div>
    <div class="status-sub" id="statusSub">Sebentar ya 🙏</div>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <div class="preview-label">📷 Preview Hasil Foto</div>
    <img id="preview" alt="Hasil foto">
  </div>

  <div class="countdown-bar" id="countdownBar">
    <div class="countdown-icon">⏳</div>
    <div class="countdown-text">File ini akan dihapus otomatis dalam <span id="countdownText">14 hari</span> sejak foto diambil. Download sekarang!</div>
  </div>

  <div class="btn-group">

    <button class="btn btn-jpg" id="btnJpg" onclick="dlJpg()" disabled>
      <span class="btn-icon">🖼️</span>
      <div class="btn-info">
        <div class="btn-info-title">Download Foto</div>
        <div class="btn-info-sub">Format JPG, kualitas penuh</div>
      </div>
      <span class="btn-badge">JPG</span>
    </button>

    <button class="btn btn-gif" id="btnGif" onclick="dlGif()">
      <span class="btn-icon">✨</span>
      <div class="btn-info">
        <div class="btn-info-title">Download Animasi</div>
        <div class="btn-info-sub">GIF bergerak semua foto</div>
      </div>
      <span class="btn-badge">GIF</span>
    </button>

    <button class="btn btn-outline" id="btnShare" onclick="sharePhoto()" disabled>
      <span class="btn-icon">📤</span>
      <div class="btn-info">
        <div class="btn-info-title">Bagikan Foto</div>
        <div class="btn-info-sub">Kirim ke WhatsApp, IG, dll</div>
      </div>
    </button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const params   = new URLSearchParams(window.location.search);
  const photoURL = params.get('photo');
  const gifURL   = params.get('gif');

  if (!photoURL) {
    showError('Link tidak valid', 'Scan ulang QR dari halaman photobooth.');
  } else {
    init();
  }

  async function init() {
    try {
      const preview = document.getElementById('preview');
      preview.crossOrigin = 'anonymous';
      preview.onload = () => {
        // Sembunyikan spinner, tampilkan sukses
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('statusTitle').textContent = 'Foto siap didownload! 🎉';
        document.getElementById('statusSub').textContent = 'Pilih format yang kamu mau di bawah.';

        // Tampilkan preview
        document.getElementById('previewWrap').classList.add('visible');

        // Enable tombol
        document.getElementById('btnJpg').disabled = false;
        document.getElementById('btnShare').disabled = false;

        // Tampilkan GIF kalau ada
        if (gifURL) {
          document.getElementById('btnGif').classList.add('visible');
        }
      };
      preview.onerror = () => {
        showError('Foto tidak bisa dimuat', 'Link mungkin sudah kadaluarsa. Minta foto baru dari photobooth.');
      };
      preview.src = photoURL;
      startCountdown();
    } catch(e) {
      showError('Terjadi kesalahan', e.message);
    }
  }

  function startCountdown() {
    const RETENTION_MS = 14 * 24 * 60 * 60 * 1000;
    // Ambil timestamp dari URL foto
    function getTs() {
      const m = photoURL.match(/results\/(\d{13})_/);
      return m ? parseInt(m[1]) : Date.now();
    }
    function fmt(ms) {
      if (ms <= 0) return 'sudah kadaluarsa';
      const d = Math.floor(ms / 86400000);
      const h = Math.floor((ms % 86400000) / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      if (d > 0) return d + ' hari ' + h + ' jam ' + m + ' menit lagi';
      if (h > 0) return h + ' jam ' + m + ' menit lagi';
      return m + ' menit lagi';
    }
    function tick() {
      const rem = (getTs() + RETENTION_MS) - Date.now();
      document.getElementById('countdownBar').classList.add('visible');
      document.getElementById('countdownText').textContent = fmt(rem);
    }
    tick();
    setInterval(tick, 60000);
  }

  async function dlJpg() {
    const btn = document.getElementById('btnJpg');
    btn.disabled = true;
    btn.querySelector('.btn-info-title').textContent = 'Mengunduh...';
    try {
      const res  = await fetch(photoURL);
      if (!res.ok) throw new Error('Gagal fetch');
      const blob = await res.blob();
      triggerDl(blob, `lux-photobooth-${Date.now()}.jpg`);
      showToast('✓ Download dimulai!', 'success');
    } catch(e) {
      window.open(photoURL, '_blank');
      showToast('Dibuka di tab baru', '');
    } finally {
      btn.disabled = false;
      btn.querySelector('.btn-info-title').textContent = 'Download Foto';
    }
  }

  async function dlGif() {
    if (!gifURL) return;
    const btn = document.getElementById('btnGif');
    btn.disabled = true;
    btn.querySelector('.btn-info-title').textContent = 'Mengunduh...';
    try {
      const res  = await fetch(gifURL);
      if (!res.ok) throw new Error('Gagal fetch GIF');
      const blob = await res.blob();
      triggerDl(blob, `lux-animated-${Date.now()}.gif`);
      showToast('✓ GIF didownload!', 'success');
    } catch(e) {
      window.open(gifURL, '_blank');
    } finally {
      btn.disabled = false;
      btn.querySelector('.btn-info-title').textContent = 'Download Animasi';
    }
  }

  async function sharePhoto() {
    try {
      const res  = await fetch(photoURL);
      const blob = await res.blob();
      const file = new File([blob], 'lux-photobooth.jpg', { type: 'image/jpeg' });
      const files = [file];

      // Sertakan GIF jika ada
      if (gifURL) {
        try {
          const gr   = await fetch(gifURL);
          const gb   = await gr.blob();
          const gf   = new File([gb], 'lux-animated.gif', { type: 'image/gif' });
          files.push(gf);
        } catch(e) {}
      }

      if (navigator.canShare && navigator.canShare({ files })) {
        await navigator.share({ files, title: 'Foto LUX Photobooth' });
      } else {
        // Fallback
        window.open(photoURL, '_blank');
        showToast('Dibuka di tab baru', '');
      }
    } catch(e) {
      if (e.name !== 'AbortError') showToast('Gagal share: ' + e.message, 'error');
    }
  }

  function triggerDl(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  }

  function showError(title, sub) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('statusTitle').textContent = title;
    document.getElementById('statusSub').textContent = sub;
    document.getElementById('statusCard').style.borderColor = '#ffc0cb';
  }

  let toastTimer;
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
