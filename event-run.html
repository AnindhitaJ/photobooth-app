<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Mulai Event - LUX Photobooth</title>
  <script src="/config.js"></script>
  <script src="/auth.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;color:white;font-family:'Segoe UI',system-ui,sans-serif}
    video{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;transform:scaleX(-1);z-index:1}
    .dim{position:fixed;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.25),rgba(0,0,0,.48));z-index:2}
    .welcome{position:fixed;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .welcome img{width:100%;height:100%;object-fit:contain}
    .fallback{position:fixed;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;text-align:center;padding:26px}
    .fallback-card{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.22);backdrop-filter:blur(14px);border-radius:28px;padding:28px;max-width:420px}
    .fallback-card h1{font-size:34px;line-height:1.05;margin-bottom:8px}
    .fallback-card p{opacity:.78;font-weight:700}
    .back-top{
      position:fixed;top:16px;left:16px;z-index:6;
      min-width:120px;height:48px;border-radius:16px;
      display:flex;align-items:center;justify-content:center;gap:10px;
      background:#fff;color:#111;
      border:3px solid #111;
      box-shadow:0 12px 28px rgba(0,0,0,.22), 0 2px 0 rgba(0,0,0,.65);
      font-size:22px;font-weight:900;padding:0 18px;
      letter-spacing:.01em;
      backdrop-filter:none;
      transition:transform .15s ease, box-shadow .15s ease;
    }
    .back-top:hover{transform:translateY(-1px);box-shadow:0 16px 34px rgba(0,0,0,.24), 0 3px 0 rgba(0,0,0,.75)}
    .back-top:active{transform:translateY(1px);box-shadow:0 8px 18px rgba(0,0,0,.18), 0 1px 0 rgba(0,0,0,.65)}
    .back-top .arrow{font-size:28px;line-height:1;font-weight:900}
    .back-top .label{font-size:18px;line-height:1;font-weight:900}
    @media(max-width:620px){
      .back-top{top:12px;left:12px;min-width:108px;height:44px;border-radius:14px;padding:0 14px}
      .back-top .arrow{font-size:24px}
      .back-top .label{font-size:16px}
    }
    .bottom{position:fixed;left:0;right:0;bottom:0;z-index:4;padding:22px 20px max(22px,env(safe-area-inset-bottom));display:flex;gap:12px;justify-content:center;align-items:center;background:linear-gradient(to top,rgba(0,0,0,.78),transparent);flex-wrap:wrap}
    button{border:0;border-radius:999px;padding:15px 22px;font:inherit;font-weight:950;cursor:pointer}
    .start{background:linear-gradient(135deg,#D84B7E,#E5B842);color:white;box-shadow:0 8px 28px rgba(216,75,126,.4)}
    .product-start{display:flex;align-items:center;gap:8px;min-width:178px;justify-content:center}
    .product-start span{font-size:18px}
    .secondary{background:rgba(255,255,255,.14);color:white;border:1.5px solid rgba(255,255,255,.22)}
    @media(max-width:620px){.bottom{display:grid;grid-template-columns:1fr 1fr;padding-left:14px;padding-right:14px}.product-start{min-width:0;width:100%;padding-left:10px;padding-right:10px}}
    .lock{position:fixed;inset:0;z-index:8;background:#FFF8FC;color:#1D3557;display:none;align-items:center;justify-content:center;text-align:center;padding:24px}
    .lock-card{background:white;border:2px solid #fad0e4;border-radius:24px;padding:28px;box-shadow:0 14px 40px rgba(0,0,0,.08);max-width:380px}
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <div class="dim"></div>
  <div class="welcome" id="welcomeLayer"></div>
  <div class="fallback" id="fallbackText">
    <div class="fallback-card">
      <h1 id="eventTitle">Event Photobooth</h1>
      <p>Siap pilih template dan mulai foto ✨</p>
    </div>
  </div>
  <button class="back-top" onclick="location.href='/event'" aria-label="Kembali ke Event"><span class="arrow">‹</span><span class="label">Event</span></button>
  <div class="bottom">
    <button class="start product-start" onclick="startCapture('photostrip')"><span>🎞️</span> Photostrip</button>
    <button class="start product-start" onclick="startCapture('photobox')"><span>🖼️</span> Photobox 4R</button>
  </div>
  <div class="lock" id="lock">
    <div class="lock-card">
      <div style="font-size:48px;margin-bottom:8px">🔒</div>
      <h2>Anda tidak memiliki akses ke Event ini</h2>
      <p style="color:#6b7fa3;margin:8px 0 18px;font-weight:700">Ganti jadi PRO dengan hubungi admin.</p>
      <button class="start" onclick="location.href='/'">Kembali</button>
    </div>
  </div>

<script>
  if (!Auth.getSession()) location.href = '/login';

  const canAccess = Auth.isSuperAdmin?.() || Auth.getPlanStatus?.() === 'pro';
  if (!canAccess) document.getElementById('lock').style.display = 'flex';

  function storageGet(key) {
    try {
      const sessionValue = sessionStorage.getItem(key);
      if (sessionValue !== null) return sessionValue;
    } catch (e) { console.warn('sessionStorage read gagal:', e); }
    try { return localStorage.getItem(key); }
    catch (e) { console.warn('localStorage read gagal:', e); return null; }
  }

  function storageSet(key, value) {
    let ok = false;
    try { sessionStorage.setItem(key, value); ok = true; } catch (e) { console.warn('sessionStorage write gagal:', e); }
    try { localStorage.setItem(key, value); ok = true; } catch (e) { console.warn('localStorage write gagal:', e); }
    return ok;
  }

  function safeJSON(value, fallback = {}) {
    try { return JSON.parse(value || '') || fallback; }
    catch (e) { return fallback; }
  }

  const params = new URLSearchParams(location.search);
  let ev = safeJSON(storageGet('activeEvent'), {});
  const eventId = params.get('id') || storageGet('activeEventId') || ev.id || '';

  function applyEvent(nextEvent) {
    if (!nextEvent || typeof nextEvent !== 'object') return;
    ev = { ...ev, ...nextEvent };

    const name = ev.name || storageGet('activeEventName') || 'Event Photobooth';
    const overlayEnabled = ev.welcome_overlay_enabled !== false && storageGet('activeEventWelcomeOverlay') !== '0';
    const welcomeURL = ev.welcome_screen_url || '';

    document.getElementById('eventTitle').textContent = name;
    const fallback = document.getElementById('fallbackText');
    const layer = document.getElementById('welcomeLayer');
    layer.replaceChildren();

    if (welcomeURL && overlayEnabled) {
      fallback.style.display = 'none';
      const img = document.createElement('img');
      img.src = welcomeURL;
      img.alt = 'Welcome Screen';
      img.onerror = () => {
        layer.replaceChildren();
        fallback.style.display = 'flex';
      };
      layer.appendChild(img);
    } else {
      fallback.style.display = 'flex';
    }

    const templateIds = Array.isArray(ev.template_ids) ? ev.template_ids.map(String) : [];
    const compact = {
      id: String(ev.id || eventId),
      name,
      template_ids: templateIds,
      welcome_overlay_enabled: overlayEnabled
    };
    storageSet('activeEventId', compact.id);
    storageSet('activeEvent', JSON.stringify(compact));
    storageSet('activeEventName', name);
    storageSet('activeEventTemplateIds', JSON.stringify(templateIds));
    storageSet('activeEventWelcomeOverlay', overlayEnabled ? '1' : '0');
  }

  async function loadEvent() {
    applyEvent(ev);
    if (!eventId || !canAccess) return;

    try {
      const url = `${SUPABASE_URL}/rest/v1/lux_events?id=eq.${encodeURIComponent(eventId)}&select=id,name,welcome_screen_url,welcome_overlay_enabled,template_ids&limit=1`;
      const res = await fetch(url, {
        headers: {
          apikey: SUPABASE_ANON,
          Authorization: `Bearer ${Auth.getToken()}`
        },
        cache: 'no-store'
      });
      if (!res.ok) throw new Error(await res.text());
      const rows = await res.json();
      if (rows?.[0]) applyEvent(rows[0]);
    } catch (e) {
      console.warn('Gagal mengambil detail event:', e);
      // Metadata kecil dari halaman sebelumnya tetap cukup untuk meneruskan flow.
    }
  }

  async function startCamera() {
    if (!canAccess) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      document.getElementById('video').srcObject = stream;
    } catch (e) {
      console.warn(e);
    }
  }

  function startCapture(productType) {
    if (!canAccess) {
      document.getElementById('lock').style.display = 'flex';
      return;
    }

    const type = productType === 'photobox' ? 'photobox' : 'photostrip';
    storageSet('eventMode', '1');
    storageSet('activeEventProductType', type);
    try {
      if (type === 'photobox') localStorage.setItem('captureFlow', 'photobox');
      else localStorage.removeItem('captureFlow');
    } catch (e) { console.warn('captureFlow storage gagal:', e); }

    window.location.assign('/template?event=' + encodeURIComponent(eventId || ev.id || '') + '&product=' + type);
  }

  loadEvent();
  startCamera();
</script>
</body>
</html>
