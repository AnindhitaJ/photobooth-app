<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beauty Filter - Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }

    .paket-badge {
      display: inline-block;
      background: #e94560;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    p.sub { font-size: 14px; color: #a0a0b0; margin-bottom: 20px; }

    .main-layout {
      display: flex;
      gap: 24px;
      width: 100%;
      max-width: 900px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .foto-wrapper {
      position: relative;
      width: 280px;
      flex-shrink: 0;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid #0f3460;
    }

    #previewCanvas {
      width: 100%;
      display: block;
    }

    .filter-panel {
      flex: 1;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .filter-group {
      background: #16213e;
      border-radius: 14px;
      padding: 14px 16px;
    }

    .filter-label {
      font-size: 13px;
      font-weight: 700;
      color: #a0a0b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 7px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid #0f3460;
      background: transparent;
      color: #a0a0b0;
      transition: all 0.15s;
    }

    .pill:hover { border-color: #e94560; color: white; }

    .pill.active {
      background: #e94560;
      border-color: #e94560;
      color: white;
    }

    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.15s;
    }

    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: white; transform: scale(1.2); }

    .swatch-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .swatch-off {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #a0a0b0;
      background: transparent;
      font-size: 10px;
      color: #a0a0b0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      transition: all 0.15s;
    }

    .swatch-off.active { border-color: white; color: white; }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 13px 24px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary { background: #e94560; color: white; flex: 1; }
    .btn-primary:hover { background: #c73652; transform: scale(1.03); }

    .btn-secondary {
      background: transparent;
      color: #a0a0b0;
      border: 2px solid #a0a0b0;
    }

    .btn-secondary:hover { color: white; border-color: white; }

    .btn-ghost {
      background: transparent;
      color: #a0a0b0;
      border: 2px solid #0f3460;
      font-size: 13px;
      padding: 10px 18px;
    }

    .btn-ghost:hover { border-color: #a0a0b0; color: white; }

    @media (max-width: 600px) {
      .foto-wrapper { width: 100%; max-width: 340px; }
    }
  </style>
</head>
<body>

  <div style="text-align:center; margin-bottom: 20px;">
    <div class="paket-badge" id="paketBadge">Paket</div>
    <h2>Beauty Filter</h2>
    <p class="sub">Atur tampilan sesuai keinginan kamu</p>
  </div>

  <div class="main-layout">

    <div class="foto-wrapper">
      <canvas id="previewCanvas"></canvas>
    </div>

    <div class="filter-panel">

      <div class="filter-group">
        <div class="filter-label">Cerahkan Wajah</div>
        <div class="pill-row">
          <button class="pill active" onclick="setFilter('brightness','off',this)">Off</button>
          <button class="pill" onclick="setFilter('brightness','natural',this)">Natural</button>
          <button class="pill" onclick="setFilter('brightness','medium',this)">Medium</button>
          <button class="pill" onclick="setFilter('brightness','bright',this)">Bright</button>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Haluskan Kulit</div>
        <div class="pill-row">
          <button class="pill active" onclick="setFilter('smooth','off',this)">Off</button>
          <button class="pill" onclick="setFilter('smooth','soft',this)">Soft</button>
          <button class="pill" onclick="setFilter('smooth','medium',this)">Medium</button>
          <button class="pill" onclick="setFilter('smooth','smooth',this)">Smooth</button>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Warna Bibir</div>
        <div class="swatch-row">
          <div class="swatch-off active" id="lipOff" onclick="setLip('off')">Off</div>
          <div class="color-swatch" style="background:#f4a0b0;" onclick="setLip('pink')" title="Pink Natural"></div>
          <div class="color-swatch" style="background:#c0392b;" onclick="setLip('red')" title="Soft Red"></div>
          <div class="color-swatch" style="background:#e8836a;" onclick="setLip('coral')" title="Coral"></div>
          <div class="color-swatch" style="background:#f5c5a3;" onclick="setLip('peach')" title="Peach"></div>
          <div class="color-swatch" style="background:#c06080;" onclick="setLip('rose')" title="Rose"></div>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Blush</div>
        <div class="swatch-row">
          <div class="swatch-off active" id="blushOff" onclick="setBlush('off')">Off</div>
          <div class="color-swatch" style="background:#f9c0c8;" onclick="setBlush('softpink')" title="Soft Pink"></div>
          <div class="color-swatch" style="background:#f5b89a;" onclick="setBlush('peach')" title="Peach"></div>
          <div class="color-swatch" style="background:#d4708a;" onclick="setBlush('rose')" title="Rose"></div>
          <div class="color-swatch" style="background:#e8909a;" onclick="setBlush('medium')" title="Medium Blush"></div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="resetFilter()">↺ Reset</button>
        <button class="btn btn-secondary" onclick="kembali()">← Balik</button>
        <button class="btn btn-primary" onclick="lanjut()">Pilih Template →</button>
      </div>

    </div>
  </div>

  <script>
    const paket = localStorage.getItem('paket') || '5k';
    document.getElementById('paketBadge').textContent = 'Paket ' + paket.toUpperCase();

    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();

    let state = {
      brightness: 'off',
      smooth: 'off',
      lip: 'off',
      blush: 'off'
    };

    const brightnessMap = { off: 100, natural: 112, medium: 125, bright: 140 };
    const smoothMap = { off: 0, soft: 1, medium: 2, smooth: 3 };

    const lipColors = {
      pink:  { r: 244, g: 160, b: 176, a: 0.35 },
      red:   { r: 192, g: 57,  b: 43,  a: 0.40 },
      coral: { r: 232, g: 131, b: 106, a: 0.38 },
      peach: { r: 245, g: 197, b: 163, a: 0.35 },
      rose:  { r: 192, g: 96,  b: 128, a: 0.38 }
    };

    const blushColors = {
      softpink: { r: 249, g: 192, b: 200, a: 0.30 },
      peach:    { r: 245, g: 184, b: 154, a: 0.28 },
      rose:     { r: 212, g: 112, b: 138, a: 0.28 },
      medium:   { r: 232, g: 144, b: 154, a: 0.32 }
    };

    img.onload = function() {
      canvas.width = img.width;
      canvas.height = img.height;
      applyFilter();
    };

    const fotoData = localStorage.getItem('foto');
    if (fotoData) {
      img.src = fotoData;
    }

    function applyFilter() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const bright = brightnessMap[state.brightness];
      const blur = smoothMap[state.smooth];

      ctx.filter = `brightness(${bright}%) ${blur > 0 ? 'blur(' + blur + 'px)' : ''}`;
      ctx.drawImage(img, 0, 0);
      ctx.filter = 'none';

      const w = canvas.width;
      const h = canvas.height;

      if (state.blush !== 'off' && blushColors[state.blush]) {
        const c = blushColors[state.blush];
        const color = `rgba(${c.r},${c.g},${c.b},${c.a})`;
        const leftX = w * 0.22, rightX = w * 0.78, blushY = h * 0.42;
        const rx = w * 0.14, ry = h * 0.08;
        ctx.save();
        ctx.scale(1, ry / rx);
        ctx.beginPath();
        ctx.arc(leftX, blushY * (rx / ry), rx, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(rightX, blushY * (rx / ry), rx, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      if (state.lip !== 'off' && lipColors[state.lip]) {
        const c = lipColors[state.lip];
        const color = `rgba(${c.r},${c.g},${c.b},${c.a})`;
        const lipX = w * 0.5, lipY = h * 0.72;
        const lipW = w * 0.18, lipH = h * 0.05;
        ctx.beginPath();
        ctx.ellipse(lipX, lipY, lipW, lipH, 0, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      }
    }

    function setFilter(type, val, btn) {
      state[type] = val;
      btn.closest('.pill-row').querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      applyFilter();
    }

    function setLip(val) {
      state.lip = val;
      document.querySelectorAll('.color-swatch, .swatch-off').forEach(s => s.classList.remove('active'));
      if (val === 'off') document.getElementById('lipOff').classList.add('active');
      else event.target.classList.add('active');
      applyFilter();
    }

    function setBlush(val) {
      state.blush = val;
      document.querySelectorAll('.color-swatch, .swatch-off').forEach(s => s.classList.remove('active'));
      if (val === 'off') document.getElementById('blushOff').classList.add('active');
      else event.target.classList.add('active');
      applyFilter();
    }

    function resetFilter() {
      state = { brightness: 'off', smooth: 'off', lip: 'off', blush: 'off' };
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.pill-row').forEach(row => {
        row.querySelector('.pill').classList.add('active');
      });
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      document.getElementById('lipOff').classList.add('active');
      document.getElementById('blushOff').classList.add('active');
      applyFilter();
    }

    function lanjut() {
      const hasil = canvas.toDataURL('image/jpeg', 0.95);
      localStorage.setItem('fotoFiltered', hasil);
      window.location.href = 'template.html';
    }

    function kembali() {
      window.location.href = 'preview.html';
    }
  </script>

</body>
</html>
