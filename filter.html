<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beauty Filter - LUX Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .logo-text {
      font-size: 15px;
      font-weight: 800;
      background: linear-gradient(135deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; text-align:center; }
    p.sub { font-size: 14px; color: #a0a0b0; margin-bottom: 14px; text-align:center; }

    .photo-tabs {
      display: flex; gap: 8px; justify-content: center;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .photo-tab {
      padding: 6px 16px; border-radius: 50px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 2px solid #0f3460; background: transparent; color: #a0a0b0;
      transition: all 0.15s;
    }
    .photo-tab.active { background: #e94560; border-color: #e94560; color: white; }

    .main-layout {
      display: flex; gap: 24px; width: 100%; max-width: 960px;
      align-items: flex-start; flex-wrap: wrap; justify-content: center;
    }
    .foto-wrapper {
      width: 300px; flex-shrink: 0;
      border-radius: 16px; overflow: hidden;
      border: 3px solid #0f3460; background: #000;
    }
    #previewCanvas { width: 100%; display: block; }
    .status-bar { font-size: 12px; color: #a0a0b0; text-align: center; margin-top: 8px; min-height: 18px; }

    .filter-panel {
      flex: 1; min-width: 260px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .filter-group { background: #16213e; border-radius: 14px; padding: 14px 16px; }
    .filter-label {
      font-size: 12px; font-weight: 700; color: #a0a0b0;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
    }
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      padding: 7px 14px; border-radius: 50px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 2px solid #0f3460; background: transparent; color: #a0a0b0;
      transition: all 0.15s;
    }
    .pill:hover { border-color: #e94560; color: white; }
    .pill.active { background: #e94560; border-color: #e94560; color: white; }

    /* Color tone pills (B&W, Sepia, Vintage) */
    .tone-pill {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; cursor: pointer;
    }
    .tone-preview {
      width: 48px; height: 48px; border-radius: 8px;
      border: 2px solid #0f3460; overflow: hidden; transition: all 0.15s;
    }
    .tone-preview canvas { width: 48px; height: 48px; display: block; object-fit: cover; }
    .tone-pill:hover .tone-preview { border-color: #e94560; }
    .tone-pill.active .tone-preview { border-color: #e94560; box-shadow: 0 0 0 2px #e94560; }
    .tone-name { font-size: 10px; color: #a0a0b0; font-weight: 600; }
    .tone-pill.active .tone-name { color: #e94560; }

    .swatch-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .swatch {
      width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer; border: 3px solid transparent; transition: all 0.15s;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.active { border-color: white; transform: scale(1.2); }
    .swatch-off {
      width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer; border: 2px solid #a0a0b0;
      background: transparent; font-size: 9px; color: #a0a0b0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; transition: all 0.15s;
    }
    .swatch-off.active { border-color: white; color: white; }

    .apply-note {
      font-size: 12px; color: #a0a0b0; background: #16213e;
      border-radius: 10px; padding: 10px 14px; text-align: center;
    }
    .apply-note span { color: #e94560; font-weight: 700; }
    .btn-row { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
    .btn {
      padding: 12px 22px; border-radius: 50px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-primary { background: #e94560; color: white; flex: 1; }
    .btn-primary:hover { background: #c73652; }
    .btn-secondary { background: transparent; color: #a0a0b0; border: 2px solid #a0a0b0; }
    .btn-secondary:hover { color: white; border-color: white; }
    .btn-ghost { background: transparent; color: #a0a0b0; border: 2px solid #0f3460; font-size: 13px; padding: 10px 16px; }
    .btn-ghost:hover { border-color: #a0a0b0; color: white; }
    .btn-apply { background: #0f3460; color: white; font-size: 13px; padding: 10px 18px; }
    .btn-apply:hover { background: #1a5090; }
  </style>
</head>
<body>

  <div style="text-align:center;margin-bottom:14px;">
    <div class="logo-text">📸 LUX PHOTOBOOTH</div>
    <h2>Beauty Filter</h2>
    <p class="sub">Edit tiap foto satu per satu</p>
  </div>

  <div class="photo-tabs" id="photoTabs"></div>

  <div class="main-layout">
    <div>
      <div class="foto-wrapper">
        <canvas id="previewCanvas"></canvas>
      </div>
      <p class="status-bar" id="statusBar">Memuat...</p>
    </div>

    <div class="filter-panel">

      <!-- Color Tone: Normal, B&W, Sepia, Vintage -->
      <div class="filter-group">
        <div class="filter-label">Tone Warna</div>
        <div class="pill-row" id="grpTone">
          <button class="pill active" data-val="normal" onclick="setPill('tone',this)">Normal</button>
          <button class="pill" data-val="bw"     onclick="setPill('tone',this)">B&W</button>
          <button class="pill" data-val="sepia"  onclick="setPill('tone',this)">Sepia</button>
          <button class="pill" data-val="vintage" onclick="setPill('tone',this)">Vintage</button>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Cerahkan Wajah</div>
        <div class="pill-row" id="grpBrightness">
          <button class="pill active" data-val="0"  onclick="setPill('brightness',this)">Off</button>
          <button class="pill"        data-val="15" onclick="setPill('brightness',this)">Natural</button>
          <button class="pill"        data-val="30" onclick="setPill('brightness',this)">Medium</button>
          <button class="pill"        data-val="50" onclick="setPill('brightness',this)">Bright</button>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Haluskan Kulit</div>
        <div class="pill-row" id="grpSmooth">
          <button class="pill active" data-val="0" onclick="setPill('smooth',this)">Off</button>
          <button class="pill"        data-val="1" onclick="setPill('smooth',this)">Soft</button>
          <button class="pill"        data-val="2" onclick="setPill('smooth',this)">Medium</button>
          <button class="pill"        data-val="3" onclick="setPill('smooth',this)">Smooth</button>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Warna Bibir</div>
        <div class="swatch-row" id="grpLip">
          <div class="swatch-off active" data-val="off" onclick="setSwatch('lip',this)">Off</div>
          <div class="swatch" style="background:#f4a0b0" data-val="255,160,176,0.45" onclick="setSwatch('lip',this)" title="Pink Natural"></div>
          <div class="swatch" style="background:#c0392b" data-val="192,57,43,0.50"   onclick="setSwatch('lip',this)" title="Soft Red"></div>
          <div class="swatch" style="background:#e8836a" data-val="232,131,106,0.48" onclick="setSwatch('lip',this)" title="Coral"></div>
          <div class="swatch" style="background:#f5c5a3" data-val="245,197,163,0.42" onclick="setSwatch('lip',this)" title="Peach"></div>
          <div class="swatch" style="background:#c06080" data-val="192,96,128,0.48"  onclick="setSwatch('lip',this)" title="Rose"></div>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Blush</div>
        <div class="swatch-row" id="grpBlush">
          <div class="swatch-off active" data-val="off" onclick="setSwatch('blush',this)">Off</div>
          <div class="swatch" style="background:#f9c0c8" data-val="249,192,200,0.35" onclick="setSwatch('blush',this)" title="Soft Pink"></div>
          <div class="swatch" style="background:#f5b89a" data-val="245,184,154,0.32" onclick="setSwatch('blush',this)" title="Peach"></div>
          <div class="swatch" style="background:#d4708a" data-val="212,112,138,0.30" onclick="setSwatch('blush',this)" title="Rose"></div>
          <div class="swatch" style="background:#e8909a" data-val="232,144,154,0.33" onclick="setSwatch('blush',this)" title="Medium"></div>
        </div>
      </div>

      <div class="apply-note">
        Filter diterapkan ke <span>Foto <span id="currentPhotoNum">1</span></span>.
        Tiap foto bisa beda filter.
      </div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="resetFilter()">↺ Reset</button>
        <button class="btn btn-apply" onclick="simpanFoto()">✓ Simpan Foto Ini</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="kembali()">← Balik</button>
        <button class="btn btn-primary" id="btnLanjut" onclick="lanjut()">Lihat Hasil →</button>
      </div>

    </div>
  </div>

<script>
  const photos = JSON.parse(localStorage.getItem('photos') || '[]');
  const slotCount = photos.length;

  // State per foto: tone added
  let filterStates = Array.from({ length: Math.max(photos.length, 1) }, () => ({
    tone: 'normal', brightness: 0, smooth: 0, lip: 'off', blush: 'off'
  }));
  let filteredPhotos = photos.length ? [...photos] : [];
  let currentIdx = 0;

  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  const statusBar = document.getElementById('statusBar');

  let landmarks = null;
  let currentImg = new Image();

  // Build tabs
  const tabsEl = document.getElementById('photoTabs');
  photos.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'photo-tab' + (i === 0 ? ' active' : '');
    btn.textContent = `Foto ${i + 1}`;
    btn.onclick = () => switchPhoto(i);
    tabsEl.appendChild(btn);
  });

  function switchPhoto(idx) {
    simpanFotoSilent();
    currentIdx = idx;
    document.querySelectorAll('.photo-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
    document.getElementById('currentPhotoNum').textContent = idx + 1;
    loadFilterState(filterStates[idx]);
    landmarks = null;

    let src = photos[idx];
    if (!src) { statusBar.textContent = 'Foto tidak ditemukan.'; return; }

    // Handle fallback sessionStorage
    if (src.startsWith('__session__')) {
      const key = 'photo_' + src.replace('__session__','');
      src = sessionStorage.getItem(key) || '';
      if (!src) { statusBar.textContent = 'Foto tidak tersedia.'; return; }
    }

    statusBar.textContent = 'Memuat foto...';
    currentImg = new Image();
    currentImg.crossOrigin = 'anonymous';

    currentImg.onerror = () => {
      statusBar.textContent = 'Gagal load foto.';
      console.error('Image load failed for:', src.substring(0, 80));
    };

    currentImg.onload = async () => {
      const W = currentImg.naturalWidth || currentImg.width;
      const H = currentImg.naturalHeight || currentImg.height;
      if (!W || !H) { statusBar.textContent = 'Foto tidak valid.'; return; }
      canvas.width = W; canvas.height = H;
      await loadMediaPipe();
      applyFilter();
    };

    currentImg.src = src;
  }

  async function loadMediaPipe() {
    try {
      const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs');
      const { FaceLandmarker, FilesetResolver } = vision;
      const filesetResolver = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
      );
      const faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
          delegate: 'CPU'
        },
        runningMode: 'IMAGE', numFaces: 1
      });
      const result = faceLandmarker.detect(currentImg);
      landmarks = result.faceLandmarks?.[0] || null;
      statusBar.textContent = landmarks ? 'Wajah terdeteksi ✓' : 'Wajah tidak terdeteksi';
    } catch(e) {
      statusBar.textContent = 'Filter aktif';
    }
  }

  function loadFilterState(s) {
    // Reset pills
    ['grpTone','grpBrightness','grpSmooth'].forEach(id => {
      const row = document.getElementById(id);
      if (!row) return;
      row.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      row.querySelector('.pill').classList.add('active');
    });
    ['grpLip','grpBlush'].forEach(id => {
      document.getElementById(id).querySelectorAll('.swatch,.swatch-off').forEach(el => el.classList.remove('active'));
      document.getElementById(id).querySelector('.swatch-off').classList.add('active');
    });

    // Set tone
    document.querySelectorAll('#grpTone .pill').forEach(p => {
      if (p.dataset.val === s.tone) {
        p.closest('.pill-row').querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
      }
    });
    // Set brightness
    document.querySelectorAll('#grpBrightness .pill').forEach(p => {
      if (parseFloat(p.dataset.val) === s.brightness) {
        p.closest('.pill-row').querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
      }
    });
    // Set smooth
    document.querySelectorAll('#grpSmooth .pill').forEach(p => {
      if (parseFloat(p.dataset.val) === s.smooth) {
        p.closest('.pill-row').querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
      }
    });
  }

  // ─── Skin smooth: approximasi bilateral filter (bukan blur biasa) ───
  function applySkinSmooth(level, W, H) {
    if (level === 0) return;
    // Pakai teknik: blur ringan + blend dengan original
    // Hasilnya halus tapi tidak burem
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const octx = off.getContext('2d');

    // Blur level kecil (max 1.5px) — jauh lebih sedikit dari sebelumnya
    const blurAmount = level * 0.5; // 0.5, 1.0, 1.5 px
    octx.filter = `blur(${blurAmount}px)`;
    octx.drawImage(canvas, 0, 0);
    octx.filter = 'none';

    // Blend: makin tinggi level, makin banyak blurred version
    // Tapi max opacity 0.6 biar foto tetap tajam
    const blendOpacity = level === 1 ? 0.35 : level === 2 ? 0.50 : 0.62;
    ctx.globalAlpha = blendOpacity;
    ctx.drawImage(off, 0, 0);
    ctx.globalAlpha = 1;
  }

  // ─── Apply tone filters ───
  function applyTone(tone, W, H) {
    if (tone === 'normal') return;
    const imageData = ctx.getImageData(0, 0, W, H);
    const d = imageData.data;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      if (tone === 'bw') {
        const gray = 0.299*r + 0.587*g + 0.114*b;
        d[i] = d[i+1] = d[i+2] = gray;
      } else if (tone === 'sepia') {
        d[i]   = Math.min(255, r*0.393 + g*0.769 + b*0.189);
        d[i+1] = Math.min(255, r*0.349 + g*0.686 + b*0.168);
        d[i+2] = Math.min(255, r*0.272 + g*0.534 + b*0.131);
      } else if (tone === 'vintage') {
        const gray = 0.299*r + 0.587*g + 0.114*b;
        d[i]   = Math.min(255, gray*0.4 + r*0.6 + 20);
        d[i+1] = Math.min(255, gray*0.4 + g*0.6 + 5);
        d[i+2] = Math.min(255, gray*0.4 + b*0.6 - 10);
      }
    }
    ctx.putImageData(imageData, 0, 0);
  }

  function applyFilter() {
    if (!filterStates[currentIdx]) return;
    const s = filterStates[currentIdx];
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // 1. Gambar foto dasar (tanpa blur)
    ctx.drawImage(currentImg, 0, 0);

    // 2. Skin smooth (blend-based, bukan blur mentah)
    if (s.smooth > 0) applySkinSmooth(s.smooth, W, H);

    // 3. Lip color — SEBELUM tone, biar warnanya ikut dipengaruhi tone
    if (s.lip !== 'off') {
      const [r,g,b] = s.lip.split(',').map(Number);
      const lipOff = document.createElement('canvas');
      lipOff.width = W; lipOff.height = H;
      const lctx = lipOff.getContext('2d');
      if (landmarks) {
        const lipIdx = [61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146];
        lctx.beginPath();
        lipIdx.forEach((idx,i) => {
          const pt = landmarks[idx]; if (!pt) return;
          i===0 ? lctx.moveTo(pt.x*W,pt.y*H) : lctx.lineTo(pt.x*W,pt.y*H);
        });
        lctx.closePath();
        lctx.fillStyle = `rgba(${r},${g},${b},1)`;
        lctx.fill();
      } else {
        lctx.beginPath();
        lctx.ellipse(W*0.5,H*0.72,W*0.10,H*0.035,0,0,Math.PI*2);
        lctx.fillStyle = `rgba(${r},${g},${b},1)`;
        lctx.fill();
      }
      const lipBlur = document.createElement('canvas');
      lipBlur.width = W; lipBlur.height = H;
      const lblur = lipBlur.getContext('2d');
      lblur.filter = 'blur(3px)';
      lblur.drawImage(lipOff, 0, 0);
      lblur.filter = 'none';
      ctx.globalAlpha = 0.28;
      ctx.drawImage(lipBlur, 0, 0);
      ctx.globalAlpha = 1;
    }

    // 4. Blush — SEBELUM tone, posisi landmark pipi yang lebih akurat
    if (s.blush !== 'off') {
      const [r,g,b] = s.blush.split(',').map(Number);

      let pts;
      if (landmarks) {
        // Landmark pipi yang lebih akurat:
        // 118 = pipi kiri bawah mata, 347 = pipi kanan bawah mata
        // Lebih ke tengah wajah, bukan ke arah telinga
        const lm = landmarks;
        const leftCheek  = lm[118] || lm[116] || lm[234];
        const rightCheek = lm[347] || lm[345] || lm[454];
        pts = [
          [leftCheek.x*W,  leftCheek.y*H],
          [rightCheek.x*W, rightCheek.y*H],
        ];
      } else {
        pts = [[W*0.28, H*0.50], [W*0.72, H*0.50]];
      }

      const blushR = W * 0.09; // sedikit lebih besar tapi gradient lebih soft
      pts.forEach(([bx, by]) => {
        const grad = ctx.createRadialGradient(bx, by, 0, bx, by, blushR);
        grad.addColorStop(0,    `rgba(${r},${g},${b},0.28)`);
        grad.addColorStop(0.4,  `rgba(${r},${g},${b},0.14)`);
        grad.addColorStop(0.75, `rgba(${r},${g},${b},0.05)`);
        grad.addColorStop(1,    `rgba(${r},${g},${b},0)`);
        ctx.beginPath();
        ctx.arc(bx, by, blushR, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();
      });
    }

    // 5. Tone warna — SETELAH lip & blush
    applyTone(s.tone, W, H);

    // 6. Brightness hanya di area wajah — SETELAH tone
    if (s.brightness > 0) {
      if (landmarks) {
        const xs = landmarks.map(p => p.x * W);
        const ys = landmarks.map(p => p.y * H);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);
        const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
        const rx = (maxX - minX) / 2 * 1.15;
        const ry = (maxY - minY) / 2 * 1.15;
        const maxR = Math.max(rx, ry);

        // Ambil pixel canvas yang sudah ada tone-nya, brighten area wajah
        const current = ctx.getImageData(0, 0, W, H);
        const off = document.createElement('canvas');
        off.width = W; off.height = H;
        const octx = off.getContext('2d');
        octx.putImageData(current, 0, 0);

        // Apply brightness via CSS
