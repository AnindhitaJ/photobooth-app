<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#1D3557">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Galeri - LUX Photobooth</title>
  <style>
    :root {
      --orange: #D84B7E; --yellow: #E5B842; --green: #E5B842;
      --pink: #D84B7E; --purple: #1D3557; --red: #e94560;
      --bg: #FFF8FC; --card: #ffffff; --border: #fad0e4;
      --text: #1D3557; --text2: #7a90b8;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    body::before {
      content:''; position:fixed; inset:0; z-index:-1;
      background-image:radial-gradient(circle,rgba(216,75,126,0.10) 1px,transparent 1px);
      background-size:28px 28px; background-color:var(--bg);
    }

    /* ── LOCK ── */
    #lockScreen {
      position:fixed; inset:0; z-index:999; background:var(--bg);
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; padding:24px; text-align:center;
    }
    .lock-icon { font-size:64px; margin-bottom:16px; animation:bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .lock-title {
      font-size:26px; font-weight:900; letter-spacing:-1px; margin-bottom:6px;
      background:linear-gradient(135deg,var(--orange),var(--purple));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .lock-sub { font-size:14px; color:var(--text2); margin-bottom:32px; font-weight:500; }
    .lock-card {
      background:white; border:2px solid var(--border); border-radius:20px;
      padding:28px 32px; width:100%; max-width:340px;
      box-shadow:0 8px 32px rgba(216,75,126,0.12);
    }
    .lock-label { font-size:12px; font-weight:800; color:var(--text2); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; display:block; text-align:left; }
    .lock-input {
      width:100%; padding:14px 16px; border-radius:12px; border:2px solid var(--border);
      background:var(--bg); font-size:20px; letter-spacing:6px; text-align:center;
      outline:none; color:var(--text); transition:border 0.2s; font-family:inherit; margin-bottom:12px;
    }
    .lock-input:focus { border-color:var(--orange); }
    .lock-error { color:var(--red); font-size:13px; font-weight:700; margin-bottom:12px; display:none; background:#fff0f3; border-radius:8px; padding:8px 12px; }
    .btn-unlock {
      width:100%; padding:15px; border-radius:50px;
      background:linear-gradient(135deg,var(--orange),var(--purple));
      color:white; font-size:16px; font-weight:800; border:none; cursor:pointer;
      transition:all 0.2s; box-shadow:0 6px 20px rgba(216,75,126,0.4);
    }
    .btn-unlock:hover { transform:translateY(-2px); }
    .btn-back-lock { margin-top:14px; background:none; border:none; cursor:pointer; color:var(--text2); font-size:14px; font-weight:600; text-decoration:underline; text-underline-offset:3px; }

    /* ── HEADER ── */
    #galleryScreen { display:none; min-height:100vh; }
    .header {
      background:white; border-bottom:2px solid var(--border); padding:14px 20px;
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
      position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(216,75,126,0.08);
    }
    .header-left { display:flex; align-items:center; gap:10px; }
    .btn-back {
      background:white; border:2px solid var(--border); border-radius:50px;
      padding:8px 14px; font-size:13px; font-weight:700; color:var(--text2);
      cursor:pointer; transition:all 0.2s;
    }
    .btn-back:hover { border-color:var(--orange); color:var(--orange); }
    .header-title { font-size:17px; font-weight:900; display:flex; align-items:center; gap:8px; }
    .header-title img { width:32px; height:32px; border-radius:50%; object-fit:cover; }
    .mode-tabs { display:flex; gap:6px; }
    .mode-tab {
      padding:7px 14px; border-radius:50px; font-size:12px; font-weight:700; cursor:pointer;
      border:2px solid var(--border); background:white; color:var(--text2); transition:all 0.15s;
    }
    .mode-tab.active { background:var(--orange); border-color:var(--orange); color:white; box-shadow:0 4px 12px rgba(216,75,126,0.3); }

    /* ── TOOLBAR ── */
    .toolbar {
      background:white; border-bottom:2px solid var(--border); padding:12px 20px;
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    }
    .filter-label { font-size:11px; font-weight:800; color:var(--text2); text-transform:uppercase; letter-spacing:0.8px; }
    .filter-date {
      padding:8px 12px; border-radius:50px; border:2px solid var(--border);
      background:white; color:var(--text); font-size:13px; font-family:inherit;
      outline:none; font-weight:600; transition:border 0.2s;
    }
    .filter-date:focus { border-color:var(--orange); }
    .btn-clear-filter {
      padding:8px 14px; border-radius:50px; border:2px solid var(--border);
      background:white; color:var(--text2); font-size:12px; font-weight:700;
      cursor:pointer; transition:all 0.2s; display:none;
    }
    .btn-clear-filter:hover { border-color:var(--orange); color:var(--orange); }
    .count-badge {
      margin-left:auto; background:rgba(216,75,126,0.12); color:var(--orange);
      border-radius:50px; padding:4px 12px; font-size:12px; font-weight:800;
    }

    /* ── GRID ── */
    .gallery-content { padding:20px; padding-bottom:120px; max-width:1200px; margin:0 auto; }

    /* Session card */
    .session-card {
      background:white; border:2px solid var(--border); border-radius:20px;
      overflow:hidden; cursor:pointer; transition:all 0.22s;
      box-shadow:0 2px 12px rgba(0,0,0,0.06);
      position:relative;
    }
    .session-card:hover { border-color:var(--orange); transform:translateY(-4px); box-shadow:0 12px 32px rgba(216,75,126,0.2); }
    .session-card.marked-delete { border-color:var(--red); border-width:3px; opacity:0.7; }
    .session-card.marked-delete:hover { box-shadow:0 8px 24px rgba(233,69,96,0.25); transform:translateY(-2px); }

    .strip-thumb {
      width:100%; aspect-ratio:9/16; object-fit:cover; display:block;
    }
    .session-footer {
      padding:10px 12px; display:flex; align-items:center; justify-content:space-between;
    }
    .session-date { font-size:11px; font-weight:700; color:var(--text2); }
    .session-count {
      background:rgba(216,75,126,0.12); color:var(--orange);
      border-radius:50px; padding:3px 10px; font-size:11px; font-weight:800;
    }
    .del-badge {
      position:absolute; top:8px; right:8px; background:var(--red); color:white;
      width:26px; height:26px; border-radius:50%; font-size:14px; font-weight:900;
      display:none; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(233,69,96,0.5);
    }
    .session-card.marked-delete .del-badge { display:flex; }

    .sessions-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px;
    }

    /* ── LOADING / EMPTY ── */
    .loading-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 24px; gap:16px; text-align:center; }
    .spinner { width:44px; height:44px; border:4px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { font-size:14px; font-weight:600; color:var(--text2); }
    .empty-state { text-align:center; padding:80px 24px; }
    .empty-icon { font-size:56px; margin-bottom:14px; opacity:0.45; }
    .empty-title { font-size:18px; font-weight:800; margin-bottom:6px; }
    .empty-sub { font-size:13px; color:var(--text2); font-weight:500; }

    /* ── ACTION BAR (delete mode) ── */
    .action-bar {
      position:fixed; bottom:0; left:0; right:0; z-index:200;
      background:white; border-top:2px solid var(--border); padding:14px 20px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      box-shadow:0 -4px 20px rgba(0,0,0,0.1);
      transform:translateY(100%); transition:transform 0.3s ease;
    }
    .action-bar.visible { transform:translateY(0); }
    .action-info { font-size:14px; font-weight:700; color:var(--text2); }
    .action-info strong { color:var(--red); }
    .btn-bar-cancel {
      padding:10px 18px; border-radius:50px; border:2px solid var(--border);
      background:white; color:var(--text2); font-size:13px; font-weight:700; cursor:pointer;
    }
    .btn-bar-cancel:hover { border-color:var(--red); color:var(--red); }
    .btn-bar-del {
      padding:11px 22px; border-radius:50px; border:none; cursor:pointer;
      background:linear-gradient(135deg,var(--red),#c0392b); color:white;
      font-size:14px; font-weight:800; box-shadow:0 4px 16px rgba(233,69,96,0.4);
      transition:all 0.2s;
    }
    .btn-bar-del:hover { transform:translateY(-2px); }

    /* ── SESSION MODAL ── */
    #sessionModal {
      position:fixed; inset:0; z-index:9000; display:none;
      background:rgba(0,0,0,0.7); backdrop-filter:blur(6px);
      align-items:flex-end; justify-content:center;
    }
    #sessionModal.open { display:flex; }
    .session-modal-box {
      background:white; border-radius:28px 28px 0 0; width:100%; max-width:600px;
      max-height:92vh; overflow-y:auto;
      padding:0 0 32px;
      animation:slideUp 0.3s cubic-bezier(0.34,1.2,0.64,1);
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sm-handle {
      width:40px; height:4px; background:var(--border); border-radius:50px;
      margin:14px auto 0;
    }
    .sm-header {
      padding:16px 20px 12px; border-bottom:2px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .sm-title { font-size:17px; font-weight:900; color:var(--text); }
    .sm-date { font-size:13px; color:var(--text2); font-weight:600; margin-top:2px; }
    .btn-sm-close {
      width:34px; height:34px; border-radius:50%; border:2px solid var(--border);
      background:white; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all 0.2s; flex-shrink:0;
    }
    .btn-sm-close:hover { border-color:var(--red); color:var(--red); }

    /* Strip preview di modal */
    .sm-strip-wrap {
      padding:16px 20px;
      display:flex; gap:14px; align-items:flex-start;
    }
    .sm-strip-img {
      width:110px; flex-shrink:0; border-radius:14px; border:2px solid var(--border);
      object-fit:cover; aspect-ratio:9/16;
    }
    .sm-strip-actions { flex:1; display:flex; flex-direction:column; gap:8px; padding-top:4px; }
    .sm-strip-label { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.8px; color:var(--text2); margin-bottom:4px; }

    /* Foto individual */
    .sm-individual-wrap { padding:0 20px; }
    .sm-section-label {
      font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.8px;
      color:var(--text2); margin-bottom:10px;
    }
    .sm-individual-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
    }
    .sm-photo-item {
      position:relative; border-radius:12px; border:2px solid var(--border);
      overflow:hidden; aspect-ratio:4/3; cursor:pointer; transition:all 0.2s;
    }
    .sm-photo-item:hover { border-color:var(--orange); transform:scale(1.03); }
    .sm-photo-item img { width:100%; height:100%; object-fit:cover; display:block; }
    .sm-photo-dl {
      position:absolute; inset:0; background:rgba(29,53,87,0.0);
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s; font-size:22px;
    }
    .sm-photo-item:hover .sm-photo-dl { background:rgba(29,53,87,0.45); }
    .sm-no-individual {
      font-size:13px; color:var(--text2); font-weight:500; text-align:center;
      padding:20px; background:var(--bg); border-radius:14px; border:2px dashed var(--border);
    }

    /* Buttons di modal */
    .btn-sm {
      display:flex; align-items:center; gap:8px; padding:11px 16px; border-radius:50px;
      font-size:13px; font-weight:800; cursor:pointer; border:none; transition:all 0.2s;
      font-family:inherit; white-space:nowrap;
    }
    .btn-sm-primary {
      background:linear-gradient(135deg,var(--orange),var(--purple));
      color:white; box-shadow:0 4px 14px rgba(216,75,126,0.35);
    }
    .btn-sm-primary:hover { transform:translateY(-1px); box-shadow:0 8px 20px rgba(216,75,126,0.45); }
    .btn-sm-outline {
      background:white; border:2px solid var(--border) !important;
      color:var(--text2); border:none;
    }
    .btn-sm-outline:hover { border-color:var(--orange) !important; color:var(--orange); }
    .btn-sm-red {
      background:white; border:2px solid #ffc0cb !important;
      color:var(--red); border:none;
    }
    .btn-sm-red:hover { background:#fff0f3; }

    /* Delete modal */
    .del-modal-wrap {
      position:fixed; inset:0; z-index:9500; display:none;
      background:rgba(0,0,0,0.65); align-items:center; justify-content:center; padding:24px;
    }
    .del-modal-wrap.open { display:flex; }
    .del-modal-box {
      background:white; border-radius:24px; padding:28px; max-width:380px; width:100%;
      box-shadow:0 24px 64px rgba(0,0,0,0.3); animation:popIn 0.25s ease; text-align:center;
    }
    @keyframes popIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
    .del-modal-icon { font-size:44px; margin-bottom:12px; }
    .del-modal-title { font-size:18px; font-weight:900; margin-bottom:6px; }
    .del-modal-sub { font-size:13px; color:var(--text2); margin-bottom:20px; line-height:1.5; }
    .del-thumbs { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:20px; }
    .del-thumb { width:56px; height:80px; border-radius:8px; object-fit:cover; border:2px solid #ffc0cb; }
    .del-modal-actions { display:flex; gap:10px; }
    .btn-del-cancel {
      flex:1; padding:13px; border-radius:50px; border:2px solid var(--border);
      background:white; color:var(--text2); font-size:14px; font-weight:700; cursor:pointer;
    }
    .btn-del-confirm {
      flex:2; padding:13px; border-radius:50px; border:none;
      background:linear-gradient(135deg,var(--red),#c0392b); color:white;
      font-size:14px; font-weight:800; cursor:pointer;
      box-shadow:0 4px 16px rgba(233,69,96,0.4);
    }
    .btn-del-confirm:disabled { opacity:0.6; cursor:not-allowed; }

    /* Toast */
    .toast {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--red); color:white; padding:12px 24px; border-radius:50px;
      font-size:14px; font-weight:700; opacity:0; transition:all 0.3s;
      z-index:9999; white-space:nowrap; pointer-events:none;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.success { background:#06a870; }
  </style>
</head>
<body>

<!-- LOCK -->
<div id="lockScreen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">Galeri LUX</div>
  <div class="lock-sub">Masukkan password untuk melihat semua foto</div>
  <div class="lock-card">
    <label class="lock-label">Password</label>
    <input type="password" id="pwInput" class="lock-input" placeholder="••••••" maxlength="10"
      autocomplete="current-password" onkeydown="if(event.key==='Enter') checkPass()">
    <div class="lock-error" id="pwError">❌ Password salah. Coba lagi.</div>
    <button class="btn-unlock" onclick="checkPass()">🔓 Buka Galeri</button>
  </div>
  <button class="btn-back-lock" onclick="location.href='index.html'">← Kembali ke Beranda</button>
</div>

<!-- GALLERY -->
<div id="galleryScreen">
  <div class="header">
    <div class="header-left">
      <button class="btn-back" onclick="location.href='index.html'">← Beranda</button>
      <div class="header-title">
        <img src="/logo.png" alt="LUX">
        <span>Galeri <span style="color:var(--orange)">LUX</span></span>
      </div>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabView" onclick="setMode('view')">📸 Lihat</button>
      <button class="mode-tab" id="tabDelete" onclick="setMode('delete')">🗑️ Hapus</button>
    </div>
  </div>

  <div class="toolbar">
    <span class="filter-label">📅 Tanggal:</span>
    <input type="date" id="filterDate" class="filter-date" onchange="applyFilter()">
    <button class="btn-clear-filter" id="btnClearFilter" onclick="clearFilter()">✕ Hapus</button>
    <div class="count-badge" id="countBadge">0 sesi</div>
  </div>

  <div class="gallery-content">
    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">Memuat foto...</div>
    </div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon">📷</div>
      <div class="empty-title">Belum ada foto</div>
      <div class="empty-sub">Belum ada sesi foto tersimpan</div>
    </div>
    <div class="sessions-grid" id="sessionsGrid"></div>
  </div>
</div>

<!-- ACTION BAR (delete mode) -->
<div class="action-bar" id="actionBar">
  <div class="action-info"><strong id="actionCount">0</strong> sesi dipilih</div>
  <div style="display:flex;gap:8px;">
    <button class="btn-bar-cancel" onclick="clearSelection()">✕ Batal</button>
    <button class="btn-bar-del" onclick="openDeleteModal()">🗑️ Hapus Sesi</button>
  </div>
</div>

<!-- SESSION MODAL (klik strip) -->
<div id="sessionModal">
  <div class="session-modal-box" id="sessionModalBox">
    <div class="sm-handle"></div>
    <div class="sm-header">
      <div>
        <div class="sm-title" id="smTitle">Detail Sesi</div>
        <div class="sm-date" id="smDate"></div>
      </div>
      <button class="btn-sm-close" onclick="closeSessionModal()">✕</button>
    </div>

    <!-- Strip + aksi -->
    <div class="sm-strip-wrap">
      <img class="sm-strip-img" id="smStripImg" src="" alt="strip" crossorigin="anonymous">
      <div class="sm-strip-actions">
        <div class="sm-strip-label">📷 Foto Strip</div>
        <button class="btn-sm btn-sm-primary" onclick="downloadStrip()">⬇️ Download Strip</button>
        <button class="btn-sm btn-sm-outline" style="border:2px solid var(--border)!important" onclick="shareStrip()">📤 Share Strip</button>
      </div>
    </div>

    <!-- Foto individual -->
    <div class="sm-individual-wrap">
      <div class="sm-section-label" id="smIndLabel">📸 Foto Individual</div>
      <div class="sm-individual-grid" id="smIndGrid"></div>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="del-modal-wrap" id="deleteModal">
  <div class="del-modal-box">
    <div class="del-modal-icon">🗑️</div>
    <div class="del-modal-title">Hapus Sesi?</div>
    <div class="del-modal-sub" id="deleteModalSub">Semua foto sesi ini akan dihapus permanen.</div>
    <div class="del-thumbs" id="deleteThumbs"></div>
    <div class="del-modal-actions">
      <button class="btn-del-cancel" onclick="closeDeleteModal()">Batal</button>
      <button class="btn-del-confirm" id="btnConfirmDelete" onclick="doDelete()">🗑️ Ya, Hapus</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL  = 'https://eguiubpsijwjwxaxvkhi.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVndWl1YnBzaWp3and4YXh2a2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMTM4NTcsImV4cCI6MjA5NDg4OTg1N30.jwFtqnsbWlhSEtEeF-ZTEBq63CUQpN4jHPRmFpY827o';
  const BUCKET   = 'photobooth';
  const PASSWORD = '123456';

  // sessions = [ { ts, date, dateStr, strip:{url,path}, individuals:[{url,path}], gif:{url,path}|null } ]
  let allSessions = [];
  let filtered    = [];
  let selected    = []; // ts yang dipilih untuk hapus
  let mode        = 'view';
  let activeSess  = null; // session yang sedang dibuka di modal

  // ── PASSWORD ────────────────────────────────────────────────────────
  function checkPass() {
    const val = document.getElementById('pwInput').value;
    if (val === PASSWORD) {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('galleryScreen').style.display = 'block';
      loadPhotos();
    } else {
      const err = document.getElementById('pwError');
      err.style.display = 'block';
      document.getElementById('pwInput').value = '';
      setTimeout(() => { err.style.display = 'none'; }, 3000);
    }
  }

  // ── LOAD & GROUP ─────────────────────────────────────────────────────
  async function loadPhotos() {
    try {
      const res = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${BUCKET}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': `Bearer ${SUPABASE_ANON}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ prefix: 'results/', limit: 1000, offset: 0, sortBy: { column: 'created_at', order: 'desc' } })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const files = await res.json();
      if (!Array.isArray(files)) throw new Error('Respons tidak valid');

      // Group by timestamp prefix
      const sessMap = {};
      files.forEach(f => {
        if (!f.name) return;
        const parts = f.name.split('_');
        const ts = parseInt(parts[0]);
        if (!ts || ts < 1000000000000) return;

        if (!sessMap[ts]) sessMap[ts] = { ts, strip: null, individuals: [], gif: null };

        const url  = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/results/${f.name}`;
        const path = `results/${f.name}`;
        const rest = parts.slice(1).join('_');

        if (rest.startsWith('strip')) {
          sessMap[ts].strip = { url, path };
        } else if (rest.startsWith('foto-')) {
          sessMap[ts].individuals.push({ url, path, name: rest });
        } else if (rest.startsWith('animated')) {
          sessMap[ts].gif = { url, path };
        } else if (rest.startsWith('foto.')) {
          // legacy: foto.jpg (sebelum ada foto individual)
          if (!sessMap[ts].strip) sessMap[ts].strip = { url, path };
        }
      });

      // Sort individuals by name
      Object.values(sessMap).forEach(s => {
        s.individuals.sort((a, b) => a.name.localeCompare(b.name));
      });

      allSessions = Object.values(sessMap)
        .filter(s => s.strip) // hanya tampilkan sesi yang punya strip
        .sort((a, b) => b.ts - a.ts)
        .map(s => {
          const d = new Date(s.ts);
          return { ...s, date: d, dateStr: d.toISOString().slice(0, 10) };
        });

      document.getElementById('loadingState').style.display = 'none';
      applyFilter();

    } catch(e) {
      document.getElementById('loadingState').innerHTML = `
        <div style="font-size:44px">⚠️</div>
        <div style="font-weight:700;color:var(--text)">Gagal memuat foto</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">${e.message}</div>
        <button onclick="loadPhotos()" style="margin-top:16px;padding:10px 24px;border-radius:50px;background:var(--orange);color:white;border:none;font-weight:700;cursor:pointer;">🔄 Coba Lagi</button>
      `;
    }
  }

  // ── FILTER ───────────────────────────────────────────────────────────
  function applyFilter() {
    const dv = document.getElementById('filterDate').value;
    document.getElementById('btnClearFilter').style.display = dv ? 'block' : 'none';
    filtered = dv ? allSessions.filter(s => s.dateStr === dv) : [...allSessions];
    selected = [];
    updateActionBar();
    renderGrid();
  }
  function clearFilter() {
    document.getElementById('filterDate').value = '';
    applyFilter();
  }

  // ── MODE ─────────────────────────────────────────────────────────────
  function setMode(m) {
    mode = m;
    selected = [];
    document.getElementById('tabView').classList.toggle('active', m === 'view');
    document.getElementById('tabDelete').classList.toggle('active', m === 'delete');
    updateActionBar();
    renderGrid();
  }

  // ── RENDER ───────────────────────────────────────────────────────────
  function renderGrid() {
    const grid  = document.getElementById('sessionsGrid');
    const empty = document.getElementById('emptyState');
    document.getElementById('countBadge').textContent = filtered.length + ' sesi';

    if (!filtered.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    grid.innerHTML = filtered.map(s => {
      const isMarked = selected.includes(s.ts);
      const dateLabel = s.date.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
      const timeLabel = s.date.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
      const indCount  = s.individuals.length;
      let cls = 'session-card';
      if (isMarked) cls += ' marked-delete';

      return `
        <div class="${cls}" onclick="cardClick(${s.ts})" data-ts="${s.ts}">
          <img class="strip-thumb" src="${s.strip.url}" alt="strip" loading="lazy" crossorigin="anonymous">
          <div class="del-badge">🗑</div>
          <div class="session-footer">
            <div>
              <div class="session-date">${dateLabel}</div>
              <div class="session-date" style="opacity:0.7">${timeLabel}</div>
            </div>
            ${indCount ? `<div class="session-count">${indCount} foto</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // ── CARD CLICK ───────────────────────────────────────────────────────
  function cardClick(ts) {
    if (mode === 'delete') {
      toggleDelete(ts);
    } else {
      const sess = allSessions.find(s => s.ts === ts);
      if (sess) openSessionModal(sess);
    }
  }

  // ── DELETE SELECTION ─────────────────────────────────────────────────
  function toggleDelete(ts) {
    const i = selected.indexOf(ts);
    if (i > -1) selected.splice(i, 1); else selected.push(ts);
    updateActionBar();
    renderGrid();
  }
  function clearSelection() { selected = []; updateActionBar(); renderGrid(); }
  function updateActionBar() {
    const bar = document.getElementById('actionBar');
    document.getElementById('actionCount').textContent = selected.length;
    bar.classList.toggle('visible', mode === 'delete' && selected.length > 0);
  }

  // ── SESSION MODAL ────────────────────────────────────────────────────
  function openSessionModal(sess) {
    activeSess = sess;
    const dateLabel = sess.date.toLocaleDateString('id-ID', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
    const timeLabel = sess.date.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });

    document.getElementById('smTitle').textContent = 'Sesi ' + timeLabel;
    document.getElementById('smDate').textContent  = dateLabel;
    document.getElementById('smStripImg').src      = sess.strip.url;

    // Individual photos
    const grid = document.getElementById('smIndGrid');
    const label = document.getElementById('smIndLabel');
    if (sess.individuals.length) {
      label.textContent = `📸 Foto Individual (${sess.individuals.length})`;
      grid.innerHTML = sess.individuals.map((p, i) => `
        <div class="sm-photo-item" onclick="downloadIndividual('${p.url}', ${i+1})">
          <img src="${p.url}" alt="foto ${i+1}" loading="lazy" crossorigin="anonymous">
          <div class="sm-photo-dl">⬇️</div>
        </div>
      `).join('');
    } else {
      label.textContent = '📸 Foto Individual';
      grid.innerHTML = `<div class="sm-no-individual" style="grid-column:1/-1">Foto individual tidak tersedia untuk sesi ini</div>`;
    }

    document.getElementById('sessionModal').classList.add('open');
  }

  function closeSessionModal() {
    document.getElementById('sessionModal').classList.remove('open');
    activeSess = null;
  }

  // Tutup modal kalau klik backdrop
  document.getElementById('sessionModal').addEventListener('click', function(e) {
    if (e.target === this) closeSessionModal();
  });

  // ── DOWNLOAD / SHARE ─────────────────────────────────────────────────
  async function downloadStrip() {
    if (!activeSess) return;
    await triggerDownload(activeSess.strip.url, `lux-strip-${activeSess.ts}.jpg`);
    showToast('✅ Strip didownload!', 'success');
  }

  async function shareStrip() {
    if (!activeSess) return;
    try {
      const res  = await fetch(activeSess.strip.url);
      const blob = await res.blob();
      const file = new File([blob], `lux-strip-${activeSess.ts}.jpg`, { type: 'image/jpeg' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Foto Strip LUX Photobooth' });
      } else {
        await triggerDownload(activeSess.strip.url, `lux-strip-${activeSess.ts}.jpg`);
        showToast('Download strip berhasil', 'success');
      }
    } catch(e) {
      if (e.name !== 'AbortError') showToast('Gagal share: ' + e.message);
    }
  }

  async function downloadIndividual(url, idx) {
    await triggerDownload(url, `lux-foto-${idx}-${activeSess?.ts || Date.now()}.jpg`);
    showToast(`✅ Foto ${idx} didownload!`, 'success');
  }

  async function triggerDownload(url, filename) {
    try {
      const res  = await fetch(url);
      const blob = await res.blob();
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 2000);
    } catch(e) {
      window.open(url, '_blank');
    }
  }

  // ── DELETE ───────────────────────────────────────────────────────────
  function openDeleteModal() {
    if (!selected.length) return;
    const sessions = allSessions.filter(s => selected.includes(s.ts));
    const totalFiles = sessions.reduce((acc, s) => {
      return acc + 1 + s.individuals.length + (s.gif ? 1 : 0);
    }, 0);
    document.getElementById('deleteModalSub').textContent =
      `${sessions.length} sesi (${totalFiles} file) akan dihapus permanen dari server.`;

    document.getElementById('deleteThumbs').innerHTML = sessions.map(s =>
      `<img class="del-thumb" src="${s.strip.url}" crossorigin="anonymous">`
    ).join('');

    document.getElementById('btnConfirmDelete').textContent = `🗑️ Ya, Hapus ${sessions.length} Sesi`;
    document.getElementById('btnConfirmDelete').disabled = false;
    document.getElementById('deleteModal').classList.add('open');
  }
  function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); }

  async function doDelete() {
    const btn = document.getElementById('btnConfirmDelete');
    btn.disabled = true; btn.textContent = '⏳ Menghapus...';

    const sessions = allSessions.filter(s => selected.includes(s.ts));
    const paths = [];
    sessions.forEach(s => {
      paths.push(s.strip.path);
      s.individuals.forEach(p => paths.push(p.path));
      if (s.gif) paths.push(s.gif.path);
    });

    try {
      const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}`, {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': `Bearer ${SUPABASE_ANON}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ prefixes: paths })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const tsSet = new Set(selected);
      allSessions = allSessions.filter(s => !tsSet.has(s.ts));
      selected = [];
      closeDeleteModal();
      applyFilter();
      showToast(`✅ ${sessions.length} sesi berhasil dihapus`, 'success');
    } catch(e) {
      btn.disabled = false; btn.textContent = '🗑️ Ya, Hapus';
      closeDeleteModal();
      showToast('❌ Gagal hapus: ' + e.message);
    }
  }

  // ── TOAST ────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'error') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type === 'success' ? ' success' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 3500);
  }

  // ── INIT ─────────────────────────────────────────────────────────────
  document.getElementById('pwInput').focus();
</script>

<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
</body>
