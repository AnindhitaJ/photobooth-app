<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e94560">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LUX Photo">
  <meta name="mobile-web-app-capable" content="yes">
  <title>LUX Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .logo { font-size: 56px; margin-bottom: 16px; }
    h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 15px;
      color: #a0a0b0;
      margin-bottom: 48px;
      line-height: 1.6;
    }
    .btn-mulai {
      background: linear-gradient(135deg, #e94560, #f5a623);
      color: white;
      border: none;
      padding: 20px 64px;
      font-size: 20px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 32px rgba(233,69,96,0.3);
    }
    .btn-mulai:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(233,69,96,0.4); }
    .footer {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="logo">📸</div>
  <h1>LUX PHOTOBOOTH</h1>
  <p class="tagline">Pilih template, ambil foto,<br>download & share hasilnya</p>
  <button class="btn-mulai" onclick="mulai()">Mulai</button>
  <div class="footer">LUX PHOTOBOOTH</div>

  <script>
    function mulai() {
      window.location.href = 'template.html';
    }
  </script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }
</script>
</body>
</html>
