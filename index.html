<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#1D3557">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LUX Photo">
  <meta name="mobile-web-app-capable" content="yes">
  <title>LUX Photobooth</title>
  <style>
    :root {
      --orange: #D84B7E; --yellow: #E5B842; --green: #E5B842;
      --pink: #D84B7E; --purple: #1D3557;
      --bg: #FFF8FC; --card: #ffffff; --border: #f5c6da;
      --text: #1D3557; --text2: #6b7fa3;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      text-align: center; padding: 34px 24px 76px; overflow-x: hidden; overflow-y: auto;
      position: relative;
    }
    /* Playful floating shapes */
    .shape {
      position: fixed; border-radius: 50%; opacity: 0.12; pointer-events: none;
      animation: float 6s ease-in-out infinite;
    }
    .shape1 { width: 200px; height: 200px; background: rgba(229,184,66,0.55); top: -60px; left: -60px; animation-delay: 0s; }
    .shape2 { width: 150px; height: 150px; background: rgba(29,53,87,0.15); top: 10%; right: -40px; animation-delay: 1s; }
    .shape3 { width: 120px; height: 120px; background: rgba(216,75,126,0.45); bottom: 5%; left: 5%; animation-delay: 2s; }
    .shape4 { width: 180px; height: 180px; background: var(--yellow); bottom: -50px; right: -50px; animation-delay: 0.5s; }
    .shape5 { width: 80px; height: 80px; background: rgba(216,75,126,0.5); top: 40%; left: 3%; animation-delay: 1.5s; }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }
    /* Dot pattern */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background-image: radial-gradient(circle, rgba(216,75,126,0.08) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .hero-emoji {
      font-size: 62px; margin-bottom: 12px;
      animation: bounce 2s ease-in-out infinite;
      filter: drop-shadow(0 8px 16px rgba(216,75,126,0.3));
    }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    h1 {
      font-size: clamp(32px, 8vw, 52px); font-weight: 900; letter-spacing: -2px;
      margin-bottom: 8px; line-height: 1;
      background: linear-gradient(135deg, var(--orange) 0%, var(--yellow) 50%, var(--purple) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 15px; color: var(--text2); margin-bottom: 22px;
      line-height: 1.6; font-weight: 500;
    }
    .badge-row {
      display: flex; gap: 8px; justify-content: center; margin-bottom: 22px; flex-wrap: wrap;
    }
    .badge {
      background: white; border: 2px solid var(--border); border-radius: 50px;
      padding: 6px 14px; font-size: 12px; font-weight: 700; color: var(--text2);
      display: flex; align-items: center; gap: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .btn-mulai {
      background: linear-gradient(135deg, var(--orange), var(--purple));
      color: white; border: none; padding: 18px 72px;
      font-size: 20px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 8px 28px rgba(216,75,126,0.45);
      letter-spacing: -0.3px; position: relative; overflow: hidden;
    }
    .btn-mulai::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    }
    .btn-mulai:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 14px 36px rgba(216,75,126,0.55); }
    .btn-mulai:active { transform: scale(0.98); }
    .btn-galeri {
      background: white; color: #7a90b8;
      border: 2.5px solid #fad0e4; padding: 13px 48px;
      font-size: 16px; font-weight: 700; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-galeri:hover { border-color: #D84B7E; color: #D84B7E; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(216,75,126,0.18); }
    .btn-galeri:active { transform: scale(0.98); }
    .btn-ganci {
      background: linear-gradient(135deg, #E5B842, #f7c948);
      color: white; border: none; padding: 13px 48px;
      font-size: 16px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(229,184,66,0.45);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-ganci:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(229,184,66,0.6); }
    .btn-ganci:active { transform: scale(0.98); }
    .btn-kalender {
      background: linear-gradient(135deg, #1D3557, #D84B7E);
      color: white; border: none; padding: 13px 48px;
      font-size: 16px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(29,53,87,0.30);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-kalender:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(216,75,126,0.38); }
    .btn-kalender:active { transform: scale(0.98); }
    .btn-idcard {
      background: linear-gradient(135deg, #c084fc, #D84B7E);
      color: white; border: none; padding: 13px 48px;
      font-size: 16px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(192,132,252,0.35);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-idcard:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(192,132,252,0.48); }
    .btn-idcard:active { transform: scale(0.98); }
    .btn-magazine {
      background: linear-gradient(135deg, #ec4899, #f59e0b);
      color: white; border: none; padding: 13px 48px;
      font-size: 16px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(236,72,153,0.34);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-magazine:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(236,72,153,0.46); }
    .btn-magazine:active { transform: scale(0.98); }
    .btn-newspaper {
      background: linear-gradient(135deg, #111827, #64748b);
      color: white; border: none; padding: 13px 48px;
      font-size: 16px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(17,24,39,0.30);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-newspaper:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(17,24,39,0.42); }
    .btn-newspaper:active { transform: scale(0.98); }
    .home-shell {
      width: min(760px, 100%);
      display: flex; flex-direction: column; align-items: center;
    }
    .btn-group {
      width: 100%; max-width: 680px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .btn-mulai {
      width: min(440px, 100%);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .feature-grid {
      width: 100%; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px; margin-top: 4px;
    }
    .feature-card {
      font-family: inherit;
      border: 2px solid var(--border);
      background: rgba(255,255,255,0.92);
      border-radius: 22px;
      padding: 14px 14px 13px;
      min-height: 92px;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      box-shadow: 0 6px 22px rgba(29,53,87,0.07);
      display: flex; align-items: center; text-align: left; gap: 12px;
    }
    .feature-card:hover {
      transform: translateY(-3px);
      border-color: var(--pink);
      box-shadow: 0 12px 30px rgba(216,75,126,0.15);
    }
    .feature-icon {
      width: 46px; height: 46px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 23px; flex: 0 0 auto; color: white;
      box-shadow: 0 7px 18px rgba(0,0,0,0.12);
    }
    .feature-title {
      font-size: 14px; font-weight: 950; color: var(--text);
      line-height: 1.15; letter-spacing: -0.2px;
    }
    .feature-desc {
      display: block;
      margin-top: 4px; font-size: 11px; color: var(--text2);
      line-height: 1.35; font-weight: 750;
    }
    .ganci .feature-icon { background: linear-gradient(135deg, #E5B842, #f7c948); }
    .kalender .feature-icon { background: linear-gradient(135deg, #1D3557, #D84B7E); }
    .galeri .feature-icon { background: linear-gradient(135deg, #ffffff, #fff0f6); color: var(--pink); border: 2px solid var(--border); }
    .idcard .feature-icon { background: linear-gradient(135deg, #c084fc, #D84B7E); }
    .magazine .feature-icon { background: linear-gradient(135deg, #ec4899, #f59e0b); }
    .newspaper .feature-icon { background: linear-gradient(135deg, #111827, #64748b); }

    .trading .feature-icon { background: linear-gradient(135deg, #f97316, #ec4899); }
    .portrait .feature-icon { background: linear-gradient(135deg, #8b5cf6, #d6b56d); }
    .certificate .feature-icon { background: linear-gradient(135deg, #d6b56d, #f59e0b); }
    .game .feature-icon { background: linear-gradient(135deg, #22d3ee, #7c3aed); }
    .footer {
      position: static; margin-top: 24px;
      font-size: 11px; color: #cbb8ac;
      font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    }
    @media (max-width: 560px) {
      body { padding: 24px 16px 64px; justify-content: flex-start; }
      .hero-emoji { font-size: 54px; }
      h1 { font-size: clamp(30px, 11vw, 44px); }
      .feature-grid { grid-template-columns: 1fr; }
      .feature-card { min-height: 84px; }
    }
  </style>
  <script>
    // Intersep recovery token SEBELUM auth.js jalan
    (function() {
      const h = new URLSearchParams(window.location.hash.substring(1));
      const q = new URLSearchParams(window.location.search);
      const t = h.get('access_token') || q.get('access_token');
      const y = h.get('type') || q.get('type');
      if (t && y === 'recovery') {
        window.location.replace('/reset-password' + window.location.hash + window.location.search);
      }
    })();
  </script>
  <script src="/auth.js"></script>
</head>
<body>
  <div class="shape shape1"></div>
  <div class="shape shape2"></div>
  <div class="shape shape3"></div>
  <div class="shape shape4"></div>
  <div class="shape shape5"></div>

  <img data-auth-logo src="/logo.png" alt="LUX Photobooth" style="width:120px;height:120px;border-radius:50%;object-fit:cover;box-shadow:0 8px 32px rgba(216,75,126,0.3);">
  <h1 data-auth-boothname>LUX PHOTOBOOTH</h1>
  <div id="planBadge" style="margin-top:8px;"></div>
  <p class="tagline">Pilih template, ambil foto,<br>download & share hasilnya ✨</p>

  <div class="badge-row">
    <div class="badge">🎨 Filter Keren</div>
    <div class="badge">⚡ GIF Animasi</div>
    <div class="badge">📱 Live Strip</div>
  </div>

  <div style="position:absolute;top:16px;right:16px;z-index:10;">
  <button onclick="Auth.logout()" style="background:white;border:2px solid #fad0e4;border-radius:50px;padding:7px 14px;font-size:12px;font-weight:700;color:#7a90b8;cursor:pointer;">Logout</button>
</div>
<div class="home-shell">
    <div class="btn-group">
      <button class="btn-mulai" onclick="mulai()">✨ Mulai Photobooth</button>

      <div class="feature-grid">
        <button class="feature-card ganci" onclick="bukaGanci()">
          <span class="feature-icon">🪝</span>
          <span>
            <span class="feature-title">Ganci Photo Insert</span>
            <span class="feature-desc">layout ganci + panel logo siap print</span>
          </span>
        </button>

        <button class="feature-card kalender" onclick="bukaKalender()">
          <span class="feature-icon">📅</span>
          <span>
            <span class="feature-title">Photobooth Kalender</span>
            <span class="feature-desc">kalender 4R tahunan atau bulanan</span>
          </span>
        </button>

        <button class="feature-card galeri" onclick="bukaGaleri()">
          <span class="feature-icon">🖼️</span>
          <span>
            <span class="feature-title">Galeri Foto</span>
            <span class="feature-desc">lihat dan download hasil sesi</span>
          </span>
        </button>

        <button class="feature-card idcard" onclick="bukaIdCard()">
          <span class="feature-icon">🪪</span>
          <span>
            <span class="feature-title">ID Card</span>
            <span class="feature-desc">kartu collectible ukuran KTP</span>
          </span>
        </button>

        <button class="feature-card magazine" onclick="bukaMagazine()">
          <span class="feature-icon">📰</span>
          <span>
            <span class="feature-title">Magazine Cover</span>
            <span class="feature-desc">foto jadi cover majalah 4R</span>
          </span>
        </button>

        <button class="feature-card newspaper" onclick="bukaNewspaper()">
          <span class="feature-icon">🗞️</span>
          <span>
            <span class="feature-title">Newspaper Cover</span>
            <span class="feature-desc">foto jadi halaman depan koran</span>
          </span>
        </button>

        <button class="feature-card trading" onclick="bukaTradingCard()">
          <span class="feature-icon">🃏</span>
          <span>
            <span class="feature-title">Trading Card</span>
            <span class="feature-desc">collectible card dengan stats & rarity</span>
          </span>
        </button>

        <button class="feature-card portrait" onclick="bukaIconPortrait()">
          <span class="feature-icon">👑</span>
          <span>
            <span class="feature-title">Icon Portrait</span>
            <span class="feature-desc">portrait karakter ikonik premium</span>
          </span>
        </button>

        <button class="feature-card certificate" onclick="bukaCertificate()">
          <span class="feature-icon">📜</span>
          <span>
            <span class="feature-title">Certificate</span>
            <span class="feature-desc">sertifikat lucu/aesthetic siap 4R</span>
          </span>
        </button>

        <button class="feature-card game" onclick="bukaGameCharacter()">
          <span class="feature-icon">🎮</span>
          <span>
            <span class="feature-title">Game Character</span>
            <span class="feature-desc">profil karakter game + stats</span>
          </span>
        </button>

      </div>
    </div>

    <div class="footer"><img data-auth-logo src="/logo.png" alt="LUX" style="height:22px;width:22px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px;">LUX PHOTOBOOTH</div>
  </div>

  <script>
    // Cek kalau ini redirect dari email reset password
    const _hash = new URLSearchParams(window.location.hash.substring(1));
    const _query = new URLSearchParams(window.location.search);
    const _recToken = _hash.get('access_token') || _query.get('access_token');
    const _recType  = _hash.get('type') || _query.get('type');
    if (_recToken && _recType === 'recovery') {
      // Redirect ke reset-password dengan token
      window.location.href = '/reset-password' + window.location.hash + window.location.search;
    }

    // Cek auth
    if (!Auth.getSession()) { window.location.href = '/login'; }

    // Tampilkan plan badge
    window.addEventListener('DOMContentLoaded', () => {
      const badge = document.getElementById('planBadge');
      if (!badge) return;
      const status = Auth.getPlanStatus();
      const days   = Auth.getDaysLeft();
      if (status === 'pro') {
        badge.innerHTML = `<span style="background:#d1fae5;color:#059669;padding:4px 14px;border-radius:50px;font-size:12px;font-weight:800;">⭐ PRO · ${days} hari lagi</span>`;
      } else if (status === 'trial') {
        badge.innerHTML = `<span style="background:#fef3c7;color:#d97706;padding:4px 14px;border-radius:50px;font-size:12px;font-weight:800;">🔄 Trial · ${days} hari lagi</span>`;
      } else if (status === 'expired' || status === 'inactive') {
        badge.innerHTML = `<span style="background:#fee2e2;color:#dc2626;padding:4px 14px;border-radius:50px;font-size:12px;font-weight:800;">⏰ Akses Habis</span>`;
      }

      // CMS link untuk super admin
      if (Auth.isSuperAdmin()) {
        const cms = document.createElement('div');
        cms.style.cssText = 'position:absolute;top:16px;left:16px;z-index:10;';
        cms.innerHTML = '<a href="/cms" style="background:var(--navy,#1D3557);color:#E5B842;padding:7px 14px;border-radius:50px;font-size:12px;font-weight:800;text-decoration:none;">⚙️ CMS</a>';
        document.body.appendChild(cms);
      }

      // Block akses kalau expired & bukan super admin
      if (status === 'expired' && !Auth.isSuperAdmin()) {
        document.querySelector('.btn-group').innerHTML = `
          <div style="background:#fee2e2;border:2px solid #fca5a5;border-radius:16px;padding:20px;text-align:center;max-width:300px;">
            <div style="font-size:32px;margin-bottom:10px;">⏰</div>
            <div style="font-size:16px;font-weight:900;color:#dc2626;margin-bottom:6px;">Akses Kamu Sudah Habis</div>
            <div style="font-size:13px;color:#64748b;margin-bottom:14px;">Hubungi admin untuk perpanjang akses</div>
            <a href="https://instagram.com/luxphotobooth.id" target="_blank" style="display:inline-block;background:#D84B7E;color:white;padding:10px 22px;border-radius:50px;font-weight:800;font-size:14px;text-decoration:none;">📸 @luxphotobooth.id</a>
          </div>`;
      }
    });
    function mulai() { window.location.href = '/template'; }
    function bukaGanci() { window.location.href = '/ganci'; }
    function bukaKalender() { window.location.href = '/kalender'; }
    function bukaGaleri() { window.location.href = '/gallery'; }
    function bukaIdCard() { window.location.href = '/idcard'; }
    function bukaMagazine() { window.location.href = '/magazine'; }
    function bukaNewspaper() { window.location.href = '/newspaper'; }
    function bukaTradingCard() { window.location.href = '/trading-card'; }
    function bukaIconPortrait() { window.location.href = '/icon-portrait'; }
    function bukaCertificate() { window.location.href = '/certificate'; }
    function bukaGameCharacter() { window.location.href = '/game-character'; }
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
