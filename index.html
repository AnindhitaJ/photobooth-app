<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#1D3557">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LUX Photo">
  <meta name="mobile-web-app-capable" content="yes">
  <title>LUX Photobooth</title>
  <style>
    :root {
      --orange: #D84B7E; --yellow: #E5B842; --green: #E5B842;
      --pink: #D84B7E; --purple: #1D3557;
      --bg: #FFF8FC; --card: #ffffff; --border: #f5c6da;
      --text: #1D3557; --text2: #6b7fa3;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      text-align: center; padding: 18px 24px 42px; overflow-x: hidden; overflow-y: auto;
      position: relative;
    }
    /* Playful floating shapes */
    .shape {
      position: fixed; border-radius: 50%; opacity: 0.12; pointer-events: none;
      animation: float 6s ease-in-out infinite;
    }
    .shape1 { width: 200px; height: 200px; background: rgba(229,184,66,0.55); top: -60px; left: -60px; animation-delay: 0s; }
    .shape2 { width: 150px; height: 150px; background: rgba(29,53,87,0.15); top: 10%; right: -40px; animation-delay: 1s; }
    .shape3 { width: 120px; height: 120px; background: rgba(216,75,126,0.45); bottom: 5%; left: 5%; animation-delay: 2s; }
    .shape4 { width: 180px; height: 180px; background: var(--yellow); bottom: -50px; right: -50px; animation-delay: 0.5s; }
    .shape5 { width: 80px; height: 80px; background: rgba(216,75,126,0.5); top: 40%; left: 3%; animation-delay: 1.5s; }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }
    /* Dot pattern */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background-image: radial-gradient(circle, rgba(216,75,126,0.08) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .hero-emoji {
      font-size: 52px; margin-bottom: 6px;
      animation: bounce 2s ease-in-out infinite;
      filter: drop-shadow(0 8px 16px rgba(216,75,126,0.3));
    }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    h1 {
      font-size: clamp(32px, 8vw, 52px); font-weight: 900; letter-spacing: -2px;
      margin-bottom: 4px; line-height: 1;
      background: linear-gradient(135deg, var(--orange) 0%, var(--yellow) 50%, var(--purple) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 15px; color: var(--text2); margin-bottom: 12px;
      line-height: 1.6; font-weight: 500;
    }
    .badge-row {
      display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap;
    }
    .badge {
      background: white; border: 2px solid var(--border); border-radius: 50px;
      padding: 6px 14px; font-size: 12px; font-weight: 700; color: var(--text2);
      display: flex; align-items: center; gap: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .btn-mulai {
      background: linear-gradient(135deg, var(--orange), var(--purple));
      color: white; border: none; padding: 15px 56px;
      font-size: 18px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 8px 28px rgba(216,75,126,0.45);
      letter-spacing: -0.3px; position: relative; overflow: hidden;
    }
    .btn-mulai::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    }
    .btn-mulai:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 14px 36px rgba(216,75,126,0.55); }
    .btn-mulai:active { transform: scale(0.98); }
    .btn-galeri {
      background: white; color: #7a90b8;
      border: 2.5px solid #fad0e4; padding: 13px 48px;
      font-size: 16px; font-weight: 700; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-galeri:hover { border-color: #D84B7E; color: #D84B7E; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(216,75,126,0.18); }
    .btn-galeri:active { transform: scale(0.98); }
    .btn-ganci {
      background: linear-gradient(135deg, #E5B842, #f7c948);
      color: white; border: none; padding: 13px 48px;
      font-size: 16px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(229,184,66,0.45);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-ganci:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(229,184,66,0.6); }
    .btn-ganci:active { transform: scale(0.98); }
    .btn-kalender {
      background: linear-gradient(135deg, #1D3557, #D84B7E);
      color: white; border: none; padding: 13px 48px;
      font-size: 16px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(29,53,87,0.30);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-kalender:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(216,75,126,0.38); }
    .btn-kalender:active { transform: scale(0.98); }
    .btn-idcard {
      background: linear-gradient(135deg, #c084fc, #D84B7E);
      color: white; border: none; padding: 13px 48px;
      font-size: 16px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(192,132,252,0.35);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-idcard:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(192,132,252,0.48); }
    .btn-idcard:active { transform: scale(0.98); }
    .btn-magazine {
      background: linear-gradient(135deg, #ec4899, #f59e0b);
      color: white; border: none; padding: 13px 48px;
      font-size: 16px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(236,72,153,0.34);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-magazine:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(236,72,153,0.46); }
    .btn-magazine:active { transform: scale(0.98); }
    .btn-newspaper {
      background: linear-gradient(135deg, #111827, #64748b);
      color: white; border: none; padding: 13px 48px;
      font-size: 16px; font-weight: 800; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(17,24,39,0.30);
      letter-spacing: -0.3px; margin-top: 12px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-newspaper:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(17,24,39,0.42); }
    .btn-newspaper:active { transform: scale(0.98); }

    .product-grid {
      width: min(640px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }
    .product-card {
      border: 2.5px solid var(--border);
      background: rgba(255,255,255,0.96);
      border-radius: 24px;
      padding: 18px 14px;
      min-height: 150px;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      box-shadow: 0 8px 24px rgba(29,53,87,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .18s, box-shadow .18s, border-color .18s;
    }
    .product-card:hover {
      transform: translateY(-3px);
      border-color: var(--pink);
      box-shadow: 0 14px 34px rgba(216,75,126,0.15);
    }
    .product-icon {
      width: 54px;
      height: 54px;
      border-radius: 19px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 29px;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
    }
    .product-card.strip .product-icon { background: linear-gradient(135deg,#D84B7E,#E5B842); }
    .product-card.box .product-icon { background: linear-gradient(135deg,#1D3557,#D84B7E); }
    .product-title { font-size: 18px; font-weight: 950; letter-spacing: -.45px; }
    .product-desc { font-size: 12px; font-weight: 700; color: var(--text2); line-height: 1.35; max-width: 230px; }
    @media (max-width: 560px) {
      .product-grid { grid-template-columns: 1fr; }
      .product-card { min-height: 128px; }
    }

    .home-shell {
      width: min(880px, 100%);
      display: flex; flex-direction: column; align-items: center;
    }
    .btn-group {
      width: 100%; max-width: 820px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .btn-mulai {
      width: min(420px, 100%);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .feature-grid {
      width: 100%; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px; margin-top: 0;
    }
    .feature-card {
      font-family: inherit;
      border: 2px solid var(--border);
      background: rgba(255,255,255,0.94);
      border-radius: 18px;
      padding: 10px 9px;
      min-height: 74px;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      box-shadow: 0 5px 16px rgba(29,53,87,0.06);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: 6px;
    }
    .feature-card:hover {
      transform: translateY(-2px);
      border-color: var(--pink);
      box-shadow: 0 10px 24px rgba(216,75,126,0.13);
    }
    .feature-icon {
      width: 36px; height: 36px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; flex: 0 0 auto; color: white;
      box-shadow: 0 6px 14px rgba(0,0,0,0.10);
    }
    .feature-title {
      font-size: 12px; font-weight: 950; color: var(--text);
      line-height: 1.1; letter-spacing: -0.2px;
    }
    .feature-desc {
      display: none;
    }
    .top-actions {
      position:absolute; top:16px; right:16px; z-index:10;
      display:flex; align-items:center; gap:8px;
    }
    .top-action-btn {
      background:white; border:2px solid #fad0e4; border-radius:50px;
      padding:7px 13px; font-size:12px; font-weight:800; color:#7a90b8;
      cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:5px;
      box-shadow:0 3px 12px rgba(29,53,87,.05);
    }
    .top-action-btn:hover { border-color:#D84B7E; color:#D84B7E; }
    .ganci .feature-icon { background: linear-gradient(135deg, #E5B842, #f7c948); }
    .kalender .feature-icon { background: linear-gradient(135deg, #1D3557, #D84B7E); }
    .galeri .feature-icon { background: linear-gradient(135deg, #ffffff, #fff0f6); color: var(--pink); border: 2px solid var(--border); }
    .idcard .feature-icon { background: linear-gradient(135deg, #c084fc, #D84B7E); }
    .magazine .feature-icon { background: linear-gradient(135deg, #ec4899, #f59e0b); }
    .newspaper .feature-icon { background: linear-gradient(135deg, #111827, #64748b); }

    .trading .feature-icon { background: linear-gradient(135deg, #f97316, #ec4899); }
    .portrait .feature-icon { background: linear-gradient(135deg, #8b5cf6, #d6b56d); }
    .certificate .feature-icon { background: linear-gradient(135deg, #d6b56d, #f59e0b); }
    .game .feature-icon { background: linear-gradient(135deg, #22d3ee, #7c3aed); }
    .detective .feature-icon { background: linear-gradient(135deg, #8c5a2b, #d84b7e); }
    .footer {
      position: static; margin-top: 14px;
      font-size: 11px; color: #cbb8ac;
      font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    }
    @media (max-width: 860px) {
      .feature-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .home-shell { width: min(720px, 100%); }
    }
    @media (max-width: 560px) {
      body { padding: 20px 14px 48px; justify-content: flex-start; }
      .hero-emoji { font-size: 48px; }
      h1 { font-size: clamp(30px, 11vw, 42px); }
      .feature-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .feature-card { min-height: 72px; }
      .top-actions { position:static; margin: 0 0 12px; justify-content:center; }
    }
  </style>
  <script>
    // Intersep recovery token SEBELUM auth.js jalan
    (function() {
      const h = new URLSearchParams(window.location.hash.substring(1));
      const q = new URLSearchParams(window.location.search);
      const t = h.get('access_token') || q.get('access_token');
      const y = h.get('type') || q.get('type');
      if (t && y === 'recovery') {
        window.location.replace('/reset-password' + window.location.hash + window.location.search);
      }
    })();
  </script>
  <script src="/auth.js"></script>
</head>
<body>
  <div class="shape shape1"></div>

  <div class="shape shape3"></div>
  <div class="shape shape4"></div>
  <div class="shape shape5"></div>

  <script>
    // Cek kalau ini redirect dari email reset password
    const _hash = new URLSearchParams(window.location.hash.substring(1));
    const _query = new URLSearchParams(window.location.search);
    const _recToken = _hash.get('access_token') || _query.get('access_token');
    const _recType  = _hash.get('type') || _query.get('type');
    if (_recToken && _recType === 'recovery') {
      // Redirect ke reset-password dengan token
      window.location.href = '/reset-password' + window.location.hash + window.location.search;
    }

    // Cek auth
    if (!Auth.getSession()) { window.location.href = '/login'; }

    // Tampilkan plan badge
    window.addEventListener('DOMContentLoaded', () => {
      const badge = document.getElementById('planBadge');
      if (!badge) return;
      const status = Auth.getPlanStatus();
      const days   = Auth.getDaysLeft();
      if (status === 'pro') {
        const dayText = days > 0 ? ` · ${days} hari lagi` : '';
        badge.innerHTML = `<span style="background:#d1fae5;color:#059669;padding:4px 14px;border-radius:50px;font-size:12px;font-weight:800;">⭐ PRO${dayText}</span>`;
      } else if (status === 'inactive') {
        badge.innerHTML = `<span style="background:#fee2e2;color:#dc2626;padding:4px 14px;border-radius:50px;font-size:12px;font-weight:800;">⛔ Akun Nonaktif</span>`;
      } else {
        badge.innerHTML = `<span style="background:#e0f2fe;color:#0369a1;padding:4px 14px;border-radius:50px;font-size:12px;font-weight:800;">🆓 Free</span>`;
      }

      // Top shortcut: Event + CMS
      const topShortcut = document.createElement('div');
      topShortcut.style.cssText = 'position:absolute;top:16px;left:16px;z-index:10;display:flex;gap:8px;flex-wrap:wrap;';
      topShortcut.innerHTML = '<a href="/event" style="background:var(--navy,#1D3557);color:#E5B842;padding:7px 14px;border-radius:50px;font-size:12px;font-weight:800;text-decoration:none;">🎉 Event</a>' +
        '<a href="/admin" style="background:var(--navy,#1D3557);color:#E5B842;padding:7px 14px;border-radius:50px;font-size:12px;font-weight:800;text-decoration:none;">⚙️ Admin</a>' +
        (Auth.isSuperAdmin() ? '<a href="/cms" style="background:var(--navy,#1D3557);color:#E5B842;padding:7px 14px;border-radius:50px;font-size:12px;font-weight:800;text-decoration:none;">CMS</a>' : '');
      document.body.appendChild(topShortcut);

      // Block akses hanya kalau akun dinonaktifkan oleh admin.
      if (status === 'inactive' && !Auth.isSuperAdmin()) {
        document.querySelector('.btn-group').innerHTML = `
          <div style="background:#fee2e2;border:2px solid #fca5a5;border-radius:16px;padding:20px;text-align:center;max-width:300px;">
            <div style="font-size:32px;margin-bottom:10px;">⛔</div>
            <div style="font-size:16px;font-weight:900;color:#dc2626;margin-bottom:6px;">Akun Sedang Nonaktif</div>
            <div style="font-size:13px;color:#64748b;margin-bottom:14px;">Hubungi admin untuk mengaktifkan kembali akun.</div>
          </div>`;
      }
    });
    function clearEventState() {
      [
        'eventMode',
        'activeEvent',
        'activeEventTemplateIds',
        'activeEventName',
        'activeEventWelcomeURL',
        'activeEventWelcomeOverlay',
        'activeEventProductType'
      ].forEach(k => localStorage.removeItem(k));
    }

    function mulai() { mulaiPhotostrip(); }
    function mulaiPhotostrip() {
      clearEventState();
      localStorage.removeItem('captureFlow');
      localStorage.removeItem('captureReturnUrl');
      window.location.href = '/template';
    }
    function mulaiPhotobox() {
      clearEventState();
      localStorage.setItem('captureFlow', 'photobox');
      localStorage.removeItem('captureReturnUrl');
      window.location.href = '/template';
    }
