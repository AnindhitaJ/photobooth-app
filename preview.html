<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview - Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .paket-badge {
      display: inline-block;
      background: #e94560;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    p.sub {
      font-size: 14px;
      color: #a0a0b0;
      margin-bottom: 24px;
    }

    .foto-wrapper {
      width: 100%;
      max-width: 360px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 28px;
      border: 3px solid #0f3460;
    }

    #previewImg {
      width: 100%;
      display: block;
    }

    .controls {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #e94560;
      color: white;
      padding: 16px 36px;
      font-size: 17px;
    }

    .btn-primary:hover { background: #c73652; transform: scale(1.04); }

    .btn-secondary {
      background: transparent;
      color: #a0a0b0;
      border: 2px solid #a0a0b0;
    }

    .btn-secondary:hover { color: white; border-color: white; }

    #errMsg {
      color: #e94560;
      font-size: 14px;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <div class="paket-badge" id="paketBadge">Paket</div>
  <h2>Preview Foto</h2>
  <p class="sub">Suka hasilnya? Lanjut ke filter, atau ulangi foto.</p>

  <div class="foto-wrapper">
    <img id="previewImg" alt="Hasil foto" />
  </div>

  <div class="controls">
    <button class="btn btn-secondary" onclick="ulangi()">↩ Ulangi Foto</button>
    <button class="btn btn-primary" onclick="lanjut()">Lanjut ke Filter ✨</button>
  </div>

  <p id="errMsg"></p>

  <script>
    const paket = localStorage.getItem('paket') || '5k';
    const foto = localStorage.getItem('foto');

    document.getElementById('paketBadge').textContent = 'Paket ' + paket.toUpperCase();

    if (!foto) {
      document.getElementById('errMsg').textContent = 'Foto tidak ditemukan. Silakan ulangi dari kamera.';
    } else {
      document.getElementById('previewImg').src = foto;
    }

    function ulangi() {
      localStorage.removeItem('foto');
      window.location.href = 'camera.html';
    }

    function lanjut() {
      if (!foto) return;
      window.location.href = 'filter.html';
    }
  </script>

</body>
</html>
