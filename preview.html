<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#1D3557">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LUX Photo">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Preview - LUX Photobooth</title>
  <style>
    :root {
      --orange: #D84B7E; --yellow: #E5B842; --green: #E5B842;
      --pink: #D84B7E; --purple: #1D3557;
      --bg: #FFF8FC; --card: #ffffff; --border: #f5c6da;
      --text: #1D3557; --text2: #6b7fa3;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px; text-align: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background-image: radial-gradient(circle, rgba(216,75,126,0.07) 1px, transparent 1px);
      background-size: 28px 28px; background-color: var(--bg);
    }
    .paket-badge {
      display: inline-block; background: linear-gradient(135deg, var(--orange), var(--purple));
      color: white; font-size: 12px; font-weight: 800; padding: 5px 14px;
      border-radius: 50px; margin-bottom: 12px; text-transform: uppercase;
      letter-spacing: 1px; box-shadow: 0 4px 14px rgba(216,75,126,0.4);
    }
    h2 { font-size: 22px; font-weight: 900; margin-bottom: 6px; color: var(--text); }
    p.sub { font-size: 14px; color: var(--text2); margin-bottom: 24px; font-weight: 500; }
    .foto-wrapper {
      width: 100%; max-width: 360px; border-radius: 20px; overflow: hidden;
      margin-bottom: 28px; border: 3px solid var(--border);
      box-shadow: 0 12px 40px rgba(216,75,126,0.2);
    }
    #previewCanvas { width: 100%; display: block; }
    .btn-row { display: flex; gap: 12px; width: 100%; max-width: 360px; }
    .btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      border: none; cursor: pointer; font-weight: 700; font-size: 15px;
      padding: 16px 24px; border-radius: 50px; transition: all 0.2s;
    }
    .btn-secondary {
      background: white; color: var(--text2); border: 2px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .btn-secondary:hover { border-color: var(--orange); color: var(--orange); }
    .btn-primary {
      background: linear-gradient(135deg, var(--orange), var(--purple));
      color: white; box-shadow: 0 6px 20px rgba(216,75,126,0.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(216,75,126,0.5); }
  </style>
  <script src="/config.js"></script>
  <script src="/auth.js"></script>
</head>
<body>

  <div class="paket-badge" id="paketBadge">Paket</div>
  <h2>Preview Foto</h2>
  <p class="sub">Suka hasilnya? Lanjut ke filter, atau ulangi foto.</p>

  <div class="foto-wrapper">
    <img id="previewImg" alt="Hasil foto" />
  </div>

  <div class="controls">
    <button class="btn btn-secondary" onclick="ulangi()">↩ Ulangi Foto</button>
    <button class="btn btn-primary" onclick="lanjut()">Lanjut ke Filter ✨</button>
  </div>

  <p id="errMsg"></p>

  <script>
    const paket = localStorage.getItem('paket') || '5k';
    const foto = localStorage.getItem('foto');

    document.getElementById('paketBadge').textContent = 'Paket ' + paket.toUpperCase();

    if (!foto) {
      document.getElementById('errMsg').textContent = 'Foto tidak ditemukan. Silakan ulangi dari kamera.';
    } else {
      document.getElementById('previewImg').src = foto;
    }

    function ulangi() {
      localStorage.removeItem('foto');
      window.location.href = '/camera';
    }

    function lanjut() {
      if (!foto) return;
      window.location.href = '/filter';
    }
  </script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }
</script>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</body>
</html>
