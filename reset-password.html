<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1D3557">
  <title>Reset Password - Photobooth App</title>
  <style>
    :root {
      --orange: #D84B7E; --yellow: #E5B842;
      --navy: #1D3557; --bg: #FFF8FC; --border: #fad0e4;
      --text: #1D3557; --text2: #7a90b8;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI',system-ui,sans-serif;
      background:var(--bg); min-height:100vh;
      display:flex; align-items:center; justify-content:center; padding:24px;
    }
    body::before {
      content:''; position:fixed; inset:0; z-index:-1;
      background-image:radial-gradient(circle,rgba(216,75,126,0.10) 1px,transparent 1px);
      background-size:28px 28px; background-color:var(--bg);
    }
    .card {
      background:white; border:2px solid var(--border); border-radius:24px;
      padding:36px 32px; width:100%; max-width:380px;
      box-shadow:0 8px 40px rgba(216,75,126,0.12);
    }
    .logo-wrap { display:flex; flex-direction:column; align-items:center; margin-bottom:28px; }
    .logo-title {
      font-size:22px; font-weight:900; letter-spacing:-0.5px; margin-top:12px;
      background:linear-gradient(135deg,var(--orange),var(--navy));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .logo-sub { font-size:13px; color:var(--text2); font-weight:500; margin-top:3px; text-align:center; }
    .form-group { margin-bottom:16px; }
    label { display:block; font-size:12px; font-weight:800; color:var(--text2); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
    input {
      width:100%; padding:13px 16px; border-radius:12px; border:2px solid var(--border);
      background:var(--bg); font-size:15px; outline:none; color:var(--text);
      transition:border 0.2s; font-family:inherit;
    }
    input:focus { border-color:var(--orange); }
    .btn {
      width:100%; padding:15px; border-radius:50px; border:none;
      font-size:16px; font-weight:800; cursor:pointer; transition:all 0.2s;
      background:linear-gradient(135deg,var(--orange),var(--navy));
      color:white; box-shadow:0 6px 20px rgba(216,75,126,0.4); margin-top:8px;
      font-family:inherit;
    }
    .btn:hover { transform:translateY(-2px); }
    .btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .error-msg { background:#fff0f3; border:1.5px solid #ffc0cb; border-radius:10px; padding:10px 14px; font-size:13px; font-weight:700; color:#e94560; margin-bottom:14px; display:none; }
    .success-msg { background:#f0fff8; border:1.5px solid #a0e4c0; border-radius:10px; padding:10px 14px; font-size:13px; font-weight:700; color:#06a870; margin-bottom:14px; display:none; }
    .loading { text-align:center; padding:40px; }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
  <script src="/config.js"></script>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <svg width="56" height="56" viewBox="0 0 100 100">
      <rect x="8" y="32" width="84" height="52" rx="10" fill="#E5B842"/>
      <rect x="36" y="22" width="28" height="14" rx="5" fill="#E5B842"/>
      <rect x="14" y="26" width="14" height="8" rx="3" fill="#D84B7E"/>
      <circle cx="50" cy="58" r="20" fill="#1D3557"/>
      <circle cx="50" cy="58" r="13" fill="#0f2035"/>
      <circle cx="50" cy="58" r="8" fill="#1D3557"/>
      <circle cx="44" cy="52" r="3" fill="rgba(255,255,255,0.2)"/>
      <circle cx="78" cy="38" r="6" fill="#D84B7E"/>
    </svg>
    <div class="logo-title">Reset Password</div>
    <div class="logo-sub">Masukkan password baru kamu</div>
  </div>

  <!-- Loading state -->
  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    <div style="color:var(--text2);font-weight:600;font-size:14px">Memverifikasi link...</div>
  </div>

  <!-- Form reset -->
  <div id="resetForm" style="display:none">
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    <div class="form-group">
      <label>Password Baru</label>
      <input type="password" id="newPassword" placeholder="Min. 6 karakter" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Konfirmasi Password</label>
      <input type="password" id="confirmPassword" placeholder="Ulangi password baru"
        onkeydown="if(event.key==='Enter') doReset()">
    </div>
    <button class="btn" id="btnReset" onclick="doReset()">🔐 Simpan Password Baru</button>
  </div>

  <!-- Error state -->
  <div id="errorState" style="display:none;text-align:center;padding:20px 0">
    <div style="font-size:44px;margin-bottom:12px">⚠️</div>
    <div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:8px">Link Tidak Valid</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px">Link reset sudah kadaluarsa atau tidak valid. Minta link baru.</div>
    <a href="/login" style="display:inline-block;background:linear-gradient(135deg,var(--orange),var(--navy));color:white;padding:12px 28px;border-radius:50px;font-weight:800;font-size:14px;text-decoration:none;">← Kembali ke Login</a>
  </div>
</div>

<script>
  const SUPABASE_URL = window.LUX_CONFIG?.SUPABASE_URL || '';
  const SUPABASE_ANON = window.LUX_CONFIG?.SUPABASE_ANON_KEY || '';

  let accessToken = null;

  // Ambil token dari URL — Supabase bisa kirim via hash atau query param
  window.addEventListener('load', () => {
    // Coba dari hash dulu: #access_token=...
    const hashParams  = new URLSearchParams(window.location.hash.substring(1));
    // Fallback ke query param: ?access_token=...
    const queryParams = new URLSearchParams(window.location.search);

    const token = hashParams.get('access_token') || queryParams.get('access_token');
    const type  = hashParams.get('type')         || queryParams.get('type');

    console.log('[reset] token:', token ? token.substring(0,20) : null, 'type:', type);
    console.log('[reset] hash:', window.location.hash.substring(0,50));
    console.log('[reset] search:', window.location.search.substring(0,50));

    if (token && type === 'recovery') {
      accessToken = token;
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('resetForm').style.display = 'block';
    } else if (token) {
      // Ada token tapi type bukan recovery — coba tetap tampilkan form
      accessToken = token;
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('resetForm').style.display = 'block';
    } else {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }
  });

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '❌ ' + msg; el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = '✅ ' + msg; el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  async function doReset() {
    const newPw  = document.getElementById('newPassword').value;
    const confPw = document.getElementById('confirmPassword').value;
    if (newPw.length < 6) return showError('Password minimal 6 karakter');
    if (newPw !== confPw) return showError('Password tidak cocok');
    if (!accessToken) return showError('Token tidak valid');

    const btn = document.getElementById('btnReset');
    btn.disabled = true; btn.textContent = '⏳ Menyimpan...';
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        method: 'PUT',
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ password: newPw })
      });
      if (res.ok) {
        showSuccess('Password berhasil diubah! Mengalihkan ke halaman login...');
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        setTimeout(() => { window.location.href = '/login'; }, 2000);
      } else {
        const d = await res.json();
        throw new Error(d.error_description || d.msg || 'Gagal mengubah password');
      }
    } catch(e) {
      showError(e.message);
      btn.disabled = false; btn.textContent = '🔐 Simpan Password Baru';
    }
  }
</script>
</body>
</html>
