<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hasil - Photobooth</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Segoe UI',sans-serif;
      background:#1a1a2e;
      color:white;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px;
    }

    .paket-badge{
      display:inline-block;
      background:#e94560;
      color:white;
      font-size:12px;
      font-weight:700;
      padding:4px 12px;
      border-radius:999px;
      margin-bottom:12px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    h2{
      font-size:22px;
      margin-bottom:4px;
      text-align:center;
    }

    p.sub{
      font-size:14px;
      color:#a0a0b0;
      margin-bottom:24px;
      text-align:center;
    }

    .main-layout{
      display:flex;
      gap:32px;
      width:100%;
      max-width:960px;
      align-items:flex-start;
      flex-wrap:wrap;
      justify-content:center;
    }

    .result-wrapper{
      position:relative;
      border-radius:16px;
      overflow:hidden;
      border:3px solid #0f3460;
      background:black;
    }

    #resultCanvas{
      display:block;
    }

    .loading-overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.7);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      font-size:14px;
    }

    .spinner{
      width:40px;
      height:40px;
      border:4px solid #0f3460;
      border-top-color:#e94560;
      border-radius:50%;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

    .action-panel{
      flex:1;
      min-width:260px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .btn{
      width:100%;
      padding:14px 20px;
      border-radius:14px;
      border:none;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
    }

    .btn-download{
      background:#e94560;
      color:white;
    }

    .btn-wa{
      background:#25d366;
      color:white;
    }

    .btn-share{
      background:#0f3460;
      color:white;
      border:2px solid #1a5090;
    }

    .btn-ulang{
      background:transparent;
      color:#a0a0b0;
      border:2px solid #a0a0b0;
    }

    .qr-box{
      background:#16213e;
      border-radius:14px;
      padding:16px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }

    .divider{
      height:1px;
      background:#0f3460;
      margin:4px 0;
    }

    #statusMsg{
      font-size:13px;
      color:#27ae60;
      text-align:center;
      min-height:20px;
    }

    #debugBox{
      background:black;
      color:lime;
      padding:12px;
      margin-top:20px;
      width:100%;
      max-width:960px;
      border-radius:12px;
      font-size:12px;
      white-space:pre-wrap;
      line-height:1.5;
      overflow-wrap:break-word;
    }

  </style>
</head>
<body>

  <div style="text-align:center; margin-bottom:20px;">
    <div class="paket-badge" id="paketBadge">Paket</div>
    <h2>Hasil Fotomu 🎉</h2>
    <p class="sub">
      Download, share, atau scan QR buat ambil di HP
    </p>
  </div>

  <div class="main-layout">

    <div class="result-wrapper">

      <canvas id="resultCanvas"></canvas>

      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span>Menggabungkan foto...</span>
      </div>

    </div>

    <div class="action-panel">

      <button
        class="btn btn-download"
        id="btnDownload"
        onclick="downloadFoto()"
        disabled
      >
        ⬇️ Download Soft File
      </button>

      <button
        class="btn btn-wa"
        id="btnWa"
        onclick="shareWa()"
        disabled
      >
        💬 Kirim ke WhatsApp
      </button>

      <button
        class="btn btn-share"
        id="btnShare"
        onclick="shareNative()"
        disabled
      >
        📤 Share ke Aplikasi Lain
      </button>

      <div class="divider"></div>

      <div class="qr-box">
        <p>Scan QR ini dari HP untuk download foto</p>

        <div id="qrcode"></div>

        <p id="qrStatus" style="color:#e94560">
          Menunggu foto selesai...
        </p>
      </div>

      <div class="divider"></div>

      <p id="statusMsg"></p>

      <button
        class="btn btn-ulang"
        onclick="fotoLagi()"
      >
        📷 Foto Lagi
      </button>

    </div>

  </div>

  <div id="debugBox"></div>

<script>

  // =========================
  // DEBUG
  // =========================

  function debug(msg){

    console.log(msg);

    const box = document.getElementById('debugBox');

    if(box){
      box.innerText += msg + '\n';
    }

  }

  // =========================
  // STORAGE
  // =========================

  const paket =
    localStorage.getItem('paket') || '5k';

  document.getElementById('paketBadge').textContent =
    'Paket ' + paket.toUpperCase();

  const filteredPhotos =
    JSON.parse(
      localStorage.getItem('filteredPhotos') || '[]'
    );

  const templateSrc =
    localStorage.getItem('templateSrc');

  const slots =
    JSON.parse(
      localStorage.getItem('templateSlots') || '[]'
    );

  debug('========== START ==========');
  debug('PAKET: ' + paket);
  debug('PHOTO COUNT: ' + filteredPhotos.length);
  debug('SLOT COUNT: ' + slots.length);
  debug('TEMPLATE: ' + templateSrc);

  // =========================
  // CANVAS
  // =========================

  const canvas =
    document.getElementById('resultCanvas');

  const ctx =
    canvas.getContext('2d');

  const OUTPUT =
    paket === '5k'
      ? { w:591, h:1772 }
      : { w:1181, h:1772 };

  const displayW = 280;

  const displayH =
    Math.round(
      OUTPUT.h * displayW / OUTPUT.w
    );

  canvas.style.width =
    displayW + 'px';

  canvas.style.height =
    displayH + 'px';

  canvas.width =
    OUTPUT.w;

  canvas.height =
    OUTPUT.h;

  let finalDataURL = null;

  // =========================
  // LOAD IMAGE
  // =========================

  async function loadImage(src){

    return new Promise((resolve,reject)=>{

      const img = new Image();

      img.crossOrigin = 'anonymous';

      img.onload = ()=>{

        debug('IMAGE LOADED');

        resolve(img);

      };

      img.onerror = (e)=>{

        debug('IMAGE ERROR');

        console.error(e);

        reject(e);

      };

      img.src = src;

    });

  }

  // =========================
  // GENERATE RESULT
  // =========================

  async function generateResult(){

    try{

      debug('GENERATE START');

      ctx.fillStyle = '#ffffff';

      ctx.fillRect(
        0,
        0,
        OUTPUT.w,
        OUTPUT.h
      );

      // =====================
      // FOTO
      // =====================

      for(let i=0; i<slots.length; i++){

        debug('----------------');
        debug('LOOP: ' + i);

        const slot = slots[i];

        debug(
          'SLOT: ' +
          JSON.stringify(slot)
        );

        const photoSrc =
          filteredPhotos[i] ||
          filteredPhotos[0];

        debug(
          'PHOTO EXISTS: ' +
          !!photoSrc
        );

        if(!photoSrc){

          debug('PHOTO EMPTY');

          continue;

        }

        debug(
          'PHOTO LENGTH: ' +
          photoSrc.length
        );

        debug('LOADING PHOTO...');

        const photo =
          await loadImage(photoSrc);

        debug(
          'PHOTO WIDTH: ' +
          photo.width
        );

        debug(
          'PHOTO HEIGHT: ' +
          photo.height
        );

        // DEBUG SLOT
        ctx.strokeStyle = 'red';
        ctx.lineWidth = 5;

        ctx.strokeRect(
          slot.x,
          slot.y,
          slot.w,
          slot.h
        );

        // COVER FIT
        const scaleX =
          slot.w / photo.width;

        const scaleY =
          slot.h / photo.height;

        const scale =
          Math.max(scaleX, scaleY);

        const sw =
          slot.w / scale;

        const sh =
          slot.h / scale;

        const sx =
          (photo.width - sw) / 2;

        const sy =
          (photo.height - sh) / 2;

        debug('DRAWING PHOTO');

        ctx.drawImage(
          photo,
          sx,
          sy,
          sw,
          sh,
          slot.x,
          slot.y,
          slot.w,
          slot.h
        );

      }

      // =====================
      // TEMPLATE
      // =====================

      debug('LOADING TEMPLATE...');

      const tmpl =
        await loadImage(templateSrc);

      debug('TEMPLATE LOADED');

      // canvas sementara
      const tempCanvas =
        document.createElement('canvas');

      const tempCtx =
        tempCanvas.getContext('2d');

      tempCanvas.width =
        OUTPUT.w;

      tempCanvas.height =
        OUTPUT.h;

      // gambar template
      tempCtx.drawImage(
        tmpl,
        0,
        0,
        OUTPUT.w,
        OUTPUT.h
      );

      // ambil pixel
      const imageData =
        tempCtx.getImageData(
          0,
          0,
          OUTPUT.w,
          OUTPUT.h
        );

      const data =
        imageData.data;

      debug('REMOVING GREEN...');

      // chroma key
      for(let i=0; i<data.length; i+=4){

        const r = data[i];
        const g = data[i+1];
        const b = data[i+2];

        // DETEKSI HIJAU
        if(
          g > 180 &&
          r < 120 &&
          b < 120
        ){

          // transparency
          data[i+3] = 0;

        }

      }

      // apply perubahan
      tempCtx.putImageData(
        imageData,
        0,
        0
      );

      // gambar ke canvas utama
      ctx.drawImage(
        tempCanvas,
        0,
        0
      );

      debug('GREEN REMOVED');
      debug('TEMPLATE DRAWN');

      // =====================
      // EXPORT
      // =====================

      debug('EXPORTING JPG...');

      finalDataURL =
        canvas.toDataURL(
          'image/jpeg',
          0.7
        );

      debug('EXPORT DONE');

      // HIDE LOADING
      document.getElementById(
        'loadingOverlay'
      ).style.display = 'none';

      // ENABLE BUTTONS
      [
        'btnDownload',
        'btnWa',
        'btnShare'
      ].forEach(id=>{

        document.getElementById(id)
          .disabled = false;

      });

      // QR
      generateQR();

      debug('QR GENERATED');
      debug('========== FINISHED ==========');

    }catch(e){

      console.error(e);

      debug('========== ERROR ==========');
      debug(e.message);

      document.getElementById(
        'loadingOverlay'
      ).innerHTML =
        '<span style="color:#e94560">Gagal generate foto</span>';

    }

  }

  // =========================
  // QR
  // =========================

  function generateQR(){

    if(!finalDataURL) return;

    localStorage.setItem(
      'finalPhoto',
      finalDataURL
    );

    const downloadURL =
      window.location.origin +
      '/download.html';

    document.getElementById(
      'qrStatus'
    ).textContent = '';

    new QRCode(
      document.getElementById('qrcode'),
      {
        text:downloadURL,
        width:160,
        height:160,
        colorDark:'#ffffff',
        colorLight:'#16213e'
      }
    );

  }

  // =========================
  // DOWNLOAD
  // =========================

  function downloadFoto(){

    if(!finalDataURL) return;

    const a =
      document.createElement('a');

    a.href = finalDataURL;

    a.download =
      `photobooth-${Date.now()}.jpg`;

    a.click();

    document.getElementById(
      'statusMsg'
    ).textContent =
      'Download dimulai ✓';

    setTimeout(()=>{

      document.getElementById(
        'statusMsg'
      ).textContent = '';

    },2000);

  }

  // =========================
  // SHARE WA
  // =========================

  function shareWa(){

    if(!finalDataURL) return;

    const msg =
      encodeURIComponent(
        'Halo! Ini hasil photobooth kamu 📸\n' +
        window.location.origin +
        '/download.html'
      );

    window.open(
      'https://wa.me/?text=' + msg,
      '_blank'
    );

  }

  // =========================
  // SHARE NATIVE
  // =========================

  async function shareNative(){

    if(!finalDataURL) return;

    try{

      const res =
        await fetch(finalDataURL);

      const blob =
        await res.blob();

      const file =
        new File(
          [blob],
          'photobooth.jpg',
          {
            type:'image/jpeg'
          }
        );

      if(
        navigator.canShare &&
        navigator.canShare({
          files:[file]
        })
      ){

        await navigator.share({
          files:[file],
          title:'Hasil Photobooth'
        });

      }else{

        downloadFoto();

      }

    }catch(e){

      if(e.name !== 'AbortError'){
        downloadFoto();
      }

    }

  }

  // =========================
  // RESET
  // =========================

  function fotoLagi(){

    localStorage.removeItem('photos');
    localStorage.removeItem('filteredPhotos');
    localStorage.removeItem('finalPhoto');

    window.location.href =
      'index.html';

  }

  // =========================
  // START
  // =========================

  generateResult();

</script>

</body>
</html>
