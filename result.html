<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasil - Photobooth</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    .paket-badge {
      display: inline-block;
      background: #e94560;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; text-align: center; }
    p.sub { font-size: 14px; color: #a0a0b0; margin-bottom: 24px; text-align: center; }

    .main-layout {
      display: flex;
      gap: 32px;
      width: 100%;
      max-width: 960px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .result-wrapper {
      position: relative;
      flex-shrink: 0;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid #0f3460;
      background: #000;
    }

    #resultCanvas { display: block; }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 14px;
      color: white;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #0f3460;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .action-panel {
      flex: 1;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-icon { font-size: 20px; }

    .btn-download { background: #e94560; color: white; }
    .btn-download:hover { background: #c73652; transform: scale(1.02); }

    .btn-wa { background: #25d366; color: white; }
    .btn-wa:hover { background: #1fb855; transform: scale(1.02); }

    .btn-share { background: #0f3460; color: white; border: 2px solid #1a5090; }
    .btn-share:hover { background: #1a5090; transform: scale(1.02); }

    .btn-ulang { background: transparent; color: #a0a0b0; border: 2px solid #a0a0b0; justify-content: center; }
    .btn-ulang:hover { color: white; border-color: white; }

    .qr-box {
      background: #16213e;
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-box p {
      font-size: 12px;
      color: #a0a0b0;
      text-align: center;
      line-height: 1.5;
    }
    #qrcode canvas, #qrcode img {
      border-radius: 8px;
    }

    .divider {
      height: 1px;
      background: #0f3460;
      margin: 4px 0;
    }

    #statusMsg {
      font-size: 13px;
      color: #27ae60;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div style="text-align:center; margin-bottom:20px;">
    <div class="paket-badge" id="paketBadge">Paket</div>
    <h2>Hasil Fotomu 🎉</h2>
    <p class="sub">Download, share, atau scan QR buat ambil di HP</p>
  </div>

  <div class="main-layout">

    <div class="result-wrapper" id="resultWrapper">
      <canvas id="resultCanvas"></canvas>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span>Menggabungkan foto...</span>
      </div>
    </div>

    <div class="action-panel">

      <button class="btn btn-download" id="btnDownload" onclick="downloadFoto()" disabled>
        <span class="btn-icon">⬇️</span>
        <span>Download Soft File</span>
      </button>

      <button class="btn btn-wa" id="btnWa" onclick="shareWa()" disabled>
        <span class="btn-icon">💬</span>
        <span>Kirim ke WhatsApp</span>
      </button>

      <button class="btn btn-share" id="btnShare" onclick="shareNative()" disabled>
        <span class="btn-icon">📤</span>
        <span>Share ke Aplikasi Lain</span>
      </button>

      <div class="divider"></div>

      <div class="qr-box">
        <p>Scan QR ini dari HP untuk download foto</p>
        <div id="qrcode"></div>
        <p id="qrStatus" style="color:#e94560">Menunggu foto selesai...</p>
      </div>

      <div class="divider"></div>

      <p id="statusMsg"></p>

      <button class="btn btn-ulang" onclick="fotoLagi()">📷 Foto Lagi</button>
      <div id="debugBox" style="
  background:black;
  color:lime;
  padding:10px;
  margin-top:20px;
  width:100%;
  max-width:500px;
  font-size:12px;
  white-space:pre-wrap;
  border-radius:10px;
"></div>

    </div>
  </div>

<script>
  const paket = localStorage.getItem('paket') || '5k';
  document.getElementById('paketBadge').textContent = 'Paket ' + paket.toUpperCase();

  const filteredPhotos = JSON.parse(localStorage.getItem('filteredPhotos') || '[]');
  const templateSrc    = localStorage.getItem('templateSrc');
  const slots          = JSON.parse(localStorage.getItem('templateSlots') || '[]');

  const canvas  = document.getElementById('resultCanvas');
  const ctx     = canvas.getContext('2d');

  // Ukuran output sesuai paket
  const OUTPUT = paket === '5k'
    ? { w: 591,  h: 1772 }
    : { w: 1181, h: 1772 };

  // Tampilan max 320px lebar
  const displayW = 280;
  const displayH = Math.round(OUTPUT.h * displayW / OUTPUT.w);
  canvas.style.width  = displayW + 'px';
  canvas.style.height = displayH + 'px';
  canvas.width  = OUTPUT.w;
  canvas.height = OUTPUT.h;

  let finalDataURL = null;

  async function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  async function generateResult() {
    try {
      // 1. Gambar foto-foto ke slot masing-masing
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, OUTPUT.w, OUTPUT.h);

      for (let i = 0; i < slots.length; i++) {
        const slot = slots[i];
        const photoSrc = filteredPhotos[i] || filteredPhotos[0];
        if (!photoSrc) continue;

        const photo = await loadImage(photoSrc);

        // Cover fit: isi slot tanpa distorsi
        const scaleX = slot.w / photo.width;
        const scaleY = slot.h / photo.height;
        const scale  = Math.max(scaleX, scaleY);
        const sw = slot.w / scale;
        const sh = slot.h / scale;
        const sx = (photo.width  - sw) / 2;
        const sy = (photo.height - sh) / 2;

        ctx.drawImage(photo, sx, sy, sw, sh, slot.x, slot.y, slot.w, slot.h);
      }

      // 2. Overlay template di atas foto
      const tmpl = await loadImage(templateSrc);
      ctx.drawImage(tmpl, 0, 0, OUTPUT.w, OUTPUT.h);

      // 3. Selesai
      finalDataURL = canvas.toDataURL('image/jpeg', 0.95);

      // Sembunyikan loading
      document.getElementById('loadingOverlay').style.display = 'none';

      // Aktifkan tombol
      ['btnDownload','btnWa','btnShare'].forEach(id => {
        document.getElementById(id).disabled = false;
      });

      // Generate QR
      generateQR();

    } catch(e) {
      console.error(e);
      document.getElementById('loadingOverlay').innerHTML =
        '<span style="color:#e94560">Gagal generate foto. Coba ulangi.</span>';
    }
  }

  function generateQR() {
    if (!finalDataURL) return;

    // Simpan foto ke localStorage, buat link "download page"
    localStorage.setItem('finalPhoto', finalDataURL);

    // QR mengarah ke halaman download sederhana
    const downloadURL = window.location.origin + '/download.html';

    document.getElementById('qrStatus').textContent = '';
    new QRCode(document.getElementById('qrcode'), {
      text: downloadURL,
      width: 160,
      height: 160,
      colorDark: '#ffffff',
      colorLight: '#16213e',
    });
  }

  function downloadFoto() {
    if (!finalDataURL) return;
    const a = document.createElement('a');
    a.href = finalDataURL;
    a.download = `photobooth-${Date.now()}.jpg`;
    a.click();
    document.getElementById('statusMsg').textContent = 'Download dimulai ✓';
    setTimeout(() => document.getElementById('statusMsg').textContent = '', 2000);
  }

  function shareWa() {
    if (!finalDataURL) return;
    // WhatsApp share via link download
    const msg = encodeURIComponent('Halo! Ini hasil foto photobooth kamu 📸\nDownload di: ' + window.location.origin + '/download.html');
    window.open('https://wa.me/?text=' + msg, '_blank');
  }

  async function shareNative() {
    if (!finalDataURL) return;
    try {
      // Convert dataURL ke blob
      const res  = await fetch(finalDataURL);
      const blob = await res.blob();
      const file = new File([blob], 'photobooth.jpg', { type: 'image/jpeg' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Hasil Photobooth' });
      } else {
        // Fallback: download
        downloadFoto();
        document.getElementById('statusMsg').textContent = 'Share tidak didukung browser ini — file didownload';
      }
    } catch(e) {
      if (e.name !== 'AbortError') {
        downloadFoto();
      }
    }
  }

  function fotoLagi() {
    localStorage.removeItem('photos');
    localStorage.removeItem('filteredPhotos');
    localStorage.removeItem('finalPhoto');
    window.location.href = 'index.html';
  }

  // Mulai generate
  generateResult();
</script>

</body>
</html>
