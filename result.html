<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#1D3557">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LUX Photo">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Hasil - LUX Photobooth</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root {
      --orange: #D84B7E; --yellow: #E5B842; --green: #E5B842;
      --pink: #D84B7E; --purple: #1D3557;
      --bg: #FFF8FC; --card: #ffffff; --border: #fad0e4;
      --text: #1D3557; --text2: #6b7fa3;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 20px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background-image: radial-gradient(circle, rgba(216,75,126,0.07) 1px, transparent 1px);
      background-size: 28px 28px; background-color: var(--bg);
    }
    .logo-text {
      font-size: 15px; font-weight: 900; margin-bottom: 10px;
      background: linear-gradient(135deg, var(--orange), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    h2 { font-size: 22px; font-weight: 900; margin-bottom: 4px; text-align: center; }
    p.sub { font-size: 14px; color: var(--text2); margin-bottom: 20px; text-align: center; font-weight: 500; }
    .main-layout {
      display: flex; gap: 28px; width: 100%; max-width: 960px;
      align-items: flex-start; flex-wrap: wrap; justify-content: center;
    }
    .result-wrapper {
      position: relative; flex-shrink: 0; border-radius: 20px; overflow: hidden;
      border: 3px solid var(--border); background: #f0f0f0;
      box-shadow: 0 12px 40px rgba(216,75,126,0.18);
    }
    #resultCanvas { display: block; }
    .loading-overlay {
      position: absolute; inset: 0; background: rgba(255,248,240,0.92);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; font-size: 14px; color: var(--text2); font-weight: 600;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid var(--border);
      border-top-color: var(--orange); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .action-panel { flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 10px; }
    .section-label {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text2); margin-bottom: 6px;
    }
    .btn {
      display: flex; align-items: center; justify-content: space-between;
      border: none; cursor: pointer; font-weight: 700; font-size: 14px;
      padding: 14px 18px; border-radius: 50px; transition: all 0.2s; width: 100%;
    }
    .btn-label { flex: 1; text-align: center; }
    .btn-badge {
      font-size: 11px; font-weight: 800; opacity: 0.75; letter-spacing: 0.5px;
      background: rgba(255,255,255,0.25); padding: 2px 8px; border-radius: 50px;
    }
    .btn-orange { background: linear-gradient(135deg, var(--orange), var(--purple)); color: white; box-shadow: 0 6px 20px rgba(216,75,126,0.4); }
    .btn-orange:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(216,75,126,0.5); }
    .btn-orange:disabled { opacity: 0.4; transform: none; box-shadow: none; }
    .btn-purple { background: linear-gradient(135deg, var(--purple), #D84B7E); color: white; box-shadow: 0 6px 20px rgba(168,85,247,0.35); }
    .btn-purple:hover { transform: translateY(-2px); }
    .btn-purple:disabled { opacity: 0.4; transform: none; box-shadow: none; }
    .btn-green { background: linear-gradient(135deg, var(--green), #c9972a); color: white; box-shadow: 0 6px 20px rgba(229,184,66,0.35); }
    .btn-green:hover { transform: translateY(-2px); }
    .btn-green:disabled { opacity: 0.4; transform: none; box-shadow: none; }
    .btn-yellow { background: linear-gradient(135deg, var(--yellow), #ffb300); color: #3d2600; box-shadow: 0 6px 20px rgba(255,210,63,0.4); }
    .btn-yellow:hover { transform: translateY(-2px); }
    .btn-yellow:disabled { opacity: 0.4; transform: none; box-shadow: none; }
    .btn-outline { background: white; color: var(--text2); border: 2px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .btn-outline:hover { border-color: var(--orange); color: var(--orange); }
    .btn-outline:disabled { opacity: 0.4; }
    .btn-cetak2strip { background: linear-gradient(135deg, #D84B7E, #E5B842); color: white; box-shadow: 0 6px 20px rgba(216,75,126,0.35); }
    .btn-cetak2strip:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(216,75,126,0.45); }
    .btn-cetak2strip:disabled { opacity: 0.4; transform: none; box-shadow: none; }
    .hint-text { font-size: 11px; color: var(--text2); text-align: center; margin-top: -4px; font-weight: 500; }
    .progress-bar {
      height: 4px; background: var(--border); border-radius: 50px;
      overflow: hidden; margin-top: -4px; display: none;
    }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--orange), var(--pink)); width: 0%; transition: width 0.3s; border-radius: 50px; }
    .divider { height: 2px; background: var(--border); border-radius: 50px; margin: 4px 0; }
    /* QR section */
    .btn-qr {
      background: white; border: 2.5px solid var(--border); border-radius: 50px;
      padding: 13px 28px; font-size: 15px; font-weight: 800; color: var(--text);
      cursor: pointer; transition: all 0.2s; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .btn-qr:hover { border-color: var(--orange); color: var(--orange); transform: translateY(-2px); }
    .btn-qr:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    /* QR Modal */
    .qr-modal-box {
      background: white; border-radius: 28px; padding: 32px 28px 28px;
      max-width: 380px; width: 100%; text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      animation: qrPop 0.28s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }
    @keyframes qrPop { from{transform:scale(0.8) translateY(20px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
    .qr-modal-title {
      font-size: 22px; font-weight: 900; color: var(--text);
      margin-bottom: 4px; letter-spacing: -0.5px;
    }
    .qr-modal-sub {
      font-size: 13px; color: var(--text2); font-weight: 500;
      margin-bottom: 24px; line-height: 1.5;
    }
    #qrcodeModal {
      display: flex; justify-content: center; margin-bottom: 20px;
      padding: 16px; background: var(--bg); border-radius: 20px;
      border: 2px solid var(--border);
    }
    #qrcodeModal canvas, #qrcodeModal img {
      border-radius: 12px;
      width: 240px !important; height: 240px !important;
    }
    #qrStatus {
      font-size: 13px; color: var(--text2); font-weight: 600;
      margin-bottom: 20px; min-height: 20px;
    }
    .btn-qr-close {
      width: 100%; padding: 14px; border-radius: 50px;
      border: 2.5px solid var(--border); background: white;
      color: var(--text2); font-size: 15px; font-weight: 800;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-qr-close:hover { border-color: var(--orange); color: var(--orange); }
    /* Countdown */
    .countdown-bar {
      background: linear-gradient(135deg, #fff3e0, #fff8f0);
      border: 2px solid #f5c6da; border-radius: 14px;
      padding: 10px 14px; margin: 0 0 10px;
      display: none; align-items: center; gap: 10px;
    }
    .countdown-bar.visible { display: flex; }
    .countdown-icon { font-size: 18px; flex-shrink: 0; }
    .countdown-text { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.4; }
    .countdown-text span { color: var(--orange); font-weight: 900; }
    /* Status toast */
    #statusToast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--text); color: white; padding: 12px 24px; border-radius: 50px;
      font-size: 14px; font-weight: 700; z-index: 999; transition: transform 0.3s;
      box-shadow: 0 8px 28px rgba(0,0,0,0.2); white-space: nowrap;
    }
    #statusToast.show { transform: translateX(-50%) translateY(0); }
    .foto-lagi-btn {
      background: white; color: var(--text2); border: 2px solid var(--border);
      border-radius: 50px; padding: 14px 24px; font-size: 15px; font-weight: 700;
      cursor: pointer; width: 100%; transition: all 0.2s; display: flex;
      align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-top: 4px;
    }
    .foto-lagi-btn:hover { border-color: var(--orange); color: var(--orange); }
    /* Print/share section */
    .extra-card {
      background: white; border-radius: 18px; border: 2px solid var(--border);
      padding: 14px 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
  </style>
  <script src="/auth.js"></script>
</head>
<body>

  <div style="text-align:center;margin-bottom:18px;">
    <div class="logo-text" style="display:flex;align-items:center;gap:8px;"><img data-auth-logo src="/logo.png" alt="LUX Photobooth" style="height:36px;width:36px;border-radius:50%;object-fit:cover;"><span>LUX PHOTOBOOTH</span></div>
    <h2>Hasil Fotomu 🎉</h2>
    <p class="sub">Download satuan atau semua sekaligus</p>
  </div>

  <div class="main-layout">

    <div class="result-wrapper" id="resultWrapper">
      <canvas id="resultCanvas"></canvas>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span id="loadingText">Menggabungkan foto...</span>
      </div>
    </div>

    <!-- Plan status banner -->
    <div id="planBanner" style="display:none;margin-bottom:12px;"></div>

    <div class="action-panel">

      <div class="countdown-bar" id="countdownBar">
        <div class="countdown-icon">⏳</div>
        <div class="countdown-text">File akan dihapus otomatis dalam <span id="countdownText">14 hari</span> — download sekarang!</div>
      </div>

      </button>

      <button class="btn btn-live" id="btnLive" onclick="downloadLive()" disabled>

      <div class="divider"></div>

      <button class="btn btn-cetak2strip" id="btnShare" onclick="shareNative()" disabled>

      <button class="btn btn-cetak2strip" id="btnCetak2Strip" onclick="cetak2Strip()" disabled>
        <span class="btn-icon">🖨️</span>
        <span class="btn-label">Cetak 2 Strip</span>
        <span class="btn-badge">10×15</span>
      </button>


      <div class="divider"></div>

      <button class="btn btn-qr" id="btnQR" onclick="bukaQR()" disabled>
        <span>📲</span>
        <span id="btnQRLabel">Menunggu foto selesai...</span>
      </button>


      <div class="divider"></div>
      <p id="statusMsg"></p>
      <button class="btn btn-ulang" onclick="fotoLagi()">📷 Foto Lagi</button>

    </div>
  </div>

<!-- QR MODAL -->
<div id="qrModal" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:24px;">
  <div class="qr-modal-box">
    <div class="qr-modal-title">📲 Scan QR Code</div>
    <div class="qr-modal-sub">Scan pakai kamera HP untuk download foto</div>
    <div id="qrcodeModal"></div>
    <p id="qrStatus">⏫ Mengupload...</p>
    <button class="btn-qr-close" onclick="tutupQR()">✕ Tutup</button>
  </div>
</div>

<script>
  // ─── Supabase ───
  const BUCKET        = 'photobooth';

  async function uploadToSupabase(blob, filename) {
    const token  = Auth.getToken();
    const userId = Auth.getUserId() || 'anon';
    console.log('[upload] userId:', userId, 'token:', token?.substring(0,20));
    const ts       = Date.now();
    const path     = `results/${userId}_${ts}_${filename}`;
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${token}`,
        'Content-Type': blob.type || 'image/jpeg',
        'x-upsert': 'true',
      },
      body: blob,
    });
    if (!res.ok) {
      const errText = await res.text();
      console.error('Supabase upload error:', res.status, errText);
      throw new Error(`Upload gagal (${res.status}): ${errText}`);
    }
    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;

    // Insert metadata ke photo_sessions
    if (userId !== 'anon') {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/photo_sessions`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON,
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            user_id:    userId,
            file_path:  path,
          })
        });
      } catch(e) { console.warn('Insert photo_sessions gagal:', e); }
    }

    return publicUrl;
  }

  // ─── State ───
  const filteredPhotos = JSON.parse(localStorage.getItem('filteredPhotos') || '[]');
  const livePhotos     = JSON.parse(localStorage.getItem('livePhotos') || '[]');
  const templateSrc    = localStorage.getItem('templateSrc');
  const slots          = JSON.parse(localStorage.getItem('templateSlots') || '[]');
  const tmplW          = parseInt(localStorage.getItem('templateW') || '591');
  const tmplH          = parseInt(localStorage.getItem('templateH') || '1772');
  const isBasicTemplate = localStorage.getItem('templateIsBasic') === '1';

  const canvas = document.getElementById('resultCanvas');
  const ctx    = canvas.getContext('2d');

  const displayW = 240;
  const displayH = Math.round(tmplH * displayW / tmplW);
  canvas.style.width  = displayW + 'px';
  canvas.style.height = displayH + 'px';
  canvas.width  = tmplW;
  canvas.height = tmplH;

  let finalDataURL   = null;
  let finalPublicURL = null;
  let gifDataURL     = null;
  let liveMP4URL     = null; // object URL for live fotostrip video

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  function dataURLtoBlob(dataURL) {
    const arr = dataURL.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    const u8 = new Uint8Array(bstr.length);
    for (let i = 0; i < bstr.length; i++) u8[i] = bstr.charCodeAt(i);
    return new Blob([u8], { type: mime });
  }

  function triggerDownload(href, filename) {
    const a = document.createElement('a');
    if (href.startsWith('blob:') || href.startsWith('http')) {
      a.href = href;
    } else {
      a.href = URL.createObjectURL(dataURLtoBlob(href));
    }
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => document.body.removeChild(a), 300);
  }

  function showStatus(msg, color = '#27ae60') {
    const el = document.getElementById('statusMsg');
    el.style.color = color;
    el.textContent = msg;
    setTimeout(() => { el.textContent = ''; }, 4000);
  }

  function setProgress(id, pct) {
    const wrap = document.getElementById(id + 'Progress');
    const fill = document.getElementById(id + 'ProgressFill');
    if (!wrap || !fill) return;
    if (pct === null) { wrap.classList.remove('show'); fill.style.width = '0%'; return; }
    wrap.classList.add('show');
    fill.style.width = pct + '%';
  }

  // ─── Generate composite image ───
  async function generateResult() {
    try {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, tmplW, tmplH);

      for (let i = 0; i < slots.length; i++) {
        const slot = slots[i];
        const src  = filteredPhotos[i] || filteredPhotos[filteredPhotos.length - 1];
        if (!src) continue;
        const photo = await loadImage(src);
        const scale = Math.max(slot.w / photo.width, slot.h / photo.height);
        const sw = slot.w / scale, sh = slot.h / scale;
        const sx = (photo.width - sw) / 2, sy = (photo.height - sh) / 2;
        ctx.save();
        ctx.beginPath();
        ctx.rect(slot.x, slot.y, slot.w, slot.h);
        ctx.clip();
        ctx.drawImage(photo, sx, sy, sw, sh, slot.x, slot.y, slot.w, slot.h);
        ctx.restore();
      }

      if (templateSrc) {
        const tmpl = await loadImage(templateSrc);
        ctx.drawImage(tmpl, 0, 0, tmplW, tmplH);
      }

      // ── Teks "LUX PHOTOBOOTH" di area bawah (hanya template custom) ──
      if (!isBasicTemplate && slots.length > 0 && Auth.showWatermark()) {
        try {
          const bottomOfLastSlot = Math.max(...slots.map(s => s.y + s.h));
          const gapH = tmplH - bottomOfLastSlot;

          if (gapH > 16) {
            // Sample warna background di area footer (tengah-bawah template)
            const sampleX = Math.floor(tmplW / 2);
            const sampleY = Math.floor(bottomOfLastSlot + gapH / 2);
            const px = ctx.getImageData(sampleX, sampleY, 1, 1).data;
            const r = px[0], g = px[1], b = px[2];

            // Hitung luminance
            const lum = 0.299*r + 0.587*g + 0.114*b;

            // Kalau background gelap → teks putih; terang → teks hitam
            // Tapi jangan terlalu terang/gelap → pilih warna mid-contrast
            let textR, textG, textB;
            if (lum < 128) {
              // Background gelap → teks putih agak warm
              textR = 255; textG = 248; textB = 240;
            } else {
              // Background terang → teks navy gelap
              textR = 29; textG = 53; textB = 87;
            }

            // Font size: proporsional dengan gap, min 18px max 52px
            const fontSize = Math.max(18, Math.min(52, Math.floor(gapH * 0.38)));
            const centerX  = tmplW / 2;
            const centerY  = bottomOfLastSlot + gapH / 2;

            ctx.save();
            ctx.globalAlpha = 0.70;
            ctx.font = `900 ${fontSize}px 'Segoe UI', Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.letterSpacing = '3px';
            ctx.fillStyle = `rgb(${textR},${textG},${textB})`;
            // Pakai nama booth dari profil, kalau watermark enabled
            if (Auth.showWatermark()) {
              const boothName = Auth.getBoothName().toUpperCase();
              ctx.fillText(boothName, centerX, centerY);
            }
            ctx.restore();
          }
        } catch(e) {
          console.warn('Watermark teks gagal:', e);
        }
      }

      // ── Watermark tiled diagonal untuk non-PRO (Shutterstock style) ──
      if (!Auth.isPro() && !Auth.isSuperAdmin()) {
        const w = canvas.width, h = canvas.height;
        ctx.save();

        // Tiled diagonal text
        const fontSize = Math.max(22, Math.floor(w * 0.055));
        ctx.font = `800 ${fontSize}px 'Segoe UI', Arial, sans-serif`;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.38)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const text    = 'PROPERTY OF LUX PHOTOBOOTH';
        const angle   = -Math.PI / 6; // -30 derajat
        const spacing = fontSize * 4;

        ctx.translate(w / 2, h / 2);
        ctx.rotate(angle);

        const diagLen = Math.sqrt(w * w + h * h);
        const cols = Math.ceil(diagLen / (ctx.measureText(text).width + spacing)) + 2;
        const rows = Math.ceil(diagLen / spacing) + 2;

        for (let r = -rows; r <= rows; r++) {
          for (let c = -cols; c <= cols; c++) {
            const x = c * (ctx.measureText(text).width + spacing * 1.5);
            const y = r * spacing;
            ctx.fillText(text, x, y);
          }
        }
        ctx.restore();


      }

      finalDataURL = canvas.toDataURL('image/jpeg', 0.97);

      // Bersihkan base64 besar dari localStorage setelah dipakai
      // (URL Supabase tetap aman disimpan)
      try {
        const ts = localStorage.getItem('templateSrc') || '';
        if (ts.startsWith('data:')) localStorage.removeItem('templateSrc');
        const fp = localStorage.getItem('filteredPhotos') || '';
        if (fp.length > 100000) {

  // ─── Countdown 14 hari ───
  function startCountdown() {
    const RETENTION_MS = 14 * 24 * 60 * 60 * 1000;
    function getTs() {
      if (finalPublicURL) {
        // Format baru: results/{userId}_{timestamp}_{filename}
        const m = finalPublicURL.match(/results\/[^_]+_(\d{13})_/);
        if (m) return parseInt(m[1]);
        // Format lama: results/{timestamp}_{filename}
        const m2 = finalPublicURL.match(/results\/(\d{13})_/);
        if (m2) return parseInt(m2[1]);
      }
      return Date.now();
    }
    function fmt(ms) {
      if (ms <= 0) return 'sudah kadaluarsa';
      const d = Math.floor(ms / 86400000);
      const h = Math.floor((ms % 86400000) / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      if (d > 0) return d + ' hari ' + h + ' jam ' + m + ' menit lagi';
      if (h > 0) return h + ' jam ' + m + ' menit lagi';
      return m + ' menit lagi';
    }
    function tick() {
      const rem = (getTs() + RETENTION_MS) - Date.now();
      document.getElementById('countdownBar').classList.add('visible');
      document.getElementById('countdownText').textContent = fmt(rem);
    }
    tick();
    setInterval(tick, 60000);
  }

  // ─── Live Fotostrip Video ───
  // Buat 1 video: semua slot live video tampil sekaligus dalam layout strip
  async function downloadLive() {
    const btn = document.getElementById('btnLive');
    if (liveMP4URL) {
      triggerDownload(liveMP4URL, `lux-fotostrip-live-${Date.now()}.webm`);
      showStatus('Download live fotostrip ✓');
      return;
    }

    const validLives = livePhotos.filter(Boolean);
    if (!validLives.length) {
      showStatus('Tidak ada live video', '#e94560');
      return;
    }

    btn.disabled = true;
    btn.querySelector('.btn-label').textContent = 'Membuat fotostrip video...';
    setProgress('live', 5);
    document.getElementById('liveHint').textContent = 'Memuat video...';

    try {
      // Load semua video element
      const videoEls = await Promise.all(livePhotos.map((src, i) => {
        return new Promise((resolve) => {
          if (!src) { resolve(null); return; }
          const v = document.createElement('video');
          v.src = src;
          v.muted = true;
          v.loop = true;
          v.playsInline = true;
          v.onloadeddata = () => resolve(v);
          v.onerror = () => resolve(null);
          v.load();
        });
      }));

      setProgress('live', 20);
      document.getElementById('liveHint').textContent = 'Menyusun strip...';

      // Layout: strip vertikal, semua slot stack dari atas ke bawah
      // Setiap slot: lebar penuh, tinggi proporsional
      const STRIP_W = 320;
      const slotH   = Math.round(STRIP_W * 3 / 4); // 4:3 per slot
      const STRIP_H = slotH * slots.length;

      const offscreen = document.createElement('canvas');
      offscreen.width  = STRIP_W;
      offscreen.height = STRIP_H;
      const offCtx = offscreen.getContext('2d');

      // Start all videos
      const playPromises = videoEls.map(v => v ? v.play().catch(() => {}) : Promise.resolve());
      await Promise.all(playPromises);
      setProgress('live', 40);

      // Record the composite canvas
      const stream = offscreen.captureStream(24);
      const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8')
        ? 'video/webm;codecs=vp8' : 'video/webm';
      const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 2000000 });
      const chunks = [];
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

      recorder.start(100);
      setProgress('live', 50);
      document.getElementById('liveHint').textContent = 'Merekam...';

      // Draw loop for ~3 seconds
      const DURATION = 3000;
      const startTime = performance.now();

      await new Promise(resolve => {
        function drawFrame() {
          const elapsed = performance.now() - startTime;
          const progress = Math.min(elapsed / DURATION, 1);
          setProgress('live', 50 + Math.round(progress * 40));

          offCtx.fillStyle = '#000';
          offCtx.fillRect(0, 0, STRIP_W, STRIP_H);

          videoEls.forEach((v, i) => {
            const y = i * slotH;
            if (v && v.readyState >= 2) {
              // Cover fit
              const vw = v.videoWidth || STRIP_W;
              const vh = v.videoHeight || slotH;
              const scale = Math.max(STRIP_W / vw, slotH / vh);
              const sw = STRIP_W / scale, sh = slotH / scale;
              const sx = (vw - sw) / 2, sy = (vh - sh) / 2;
              offCtx.drawImage(v, sx, sy, sw, sh, 0, y, STRIP_W, slotH);
            } else if (filteredPhotos[i]) {
              // Fallback: draw still photo
              const img = new Image();
              img.src = filteredPhotos[i];
              offCtx.drawImage(img, 0, y, STRIP_W, slotH);
            }

            // Slot border
            offCtx.strokeStyle = 'rgba(255,255,255,0.15)';
            offCtx.lineWidth = 1;
            offCtx.strokeRect(0, y, STRIP_W, slotH);

            // Slot number
            offCtx.fillStyle = 'rgba(255,255,255,0.5)';
            offCtx.font = 'bold 12px sans-serif';
            offCtx.fillText(`${i+1}`, 8, y + 18);
          });

          if (elapsed < DURATION) {
            requestAnimationFrame(drawFrame);
          } else {
            resolve();
          }
        }
        requestAnimationFrame(drawFrame);
      });

      recorder.stop();
      setProgress('live', 95);

      // Wait for recorder to finish
      await new Promise(resolve => { recorder.onstop = resolve; });

      const blob = new Blob(chunks, { type: mimeType });
      liveMP4URL = URL.createObjectURL(blob);

      // Pause all videos
      videoEls.forEach(v => v && v.pause());

      setProgress('live', null);
      document.getElementById('liveHint').textContent = '';
      btn.disabled = false;
      btn.querySelector('.btn-label').textContent = 'Download Live Fotostrip';

      triggerDownload(liveMP4URL, `lux-fotostrip-live-${Date.now()}.webm`);
      showStatus('Live fotostrip berhasil ✓');

    } catch(e) {
      console.error('Live video error:', e);
      setProgress('live', null);
      document.getElementById('liveHint').textContent = 'Gagal: ' + e.message;
      btn.disabled = false;
      btn.querySelector('.btn-label').textContent = 'Download Live Fotostrip';
      showStatus('Gagal buat live video: ' + e.message, '#e94560');
    }
  }

  // Pure JS GIF encoder — tidak butuh library eksternal
  // ─── GIF generation — Median-Cut quantizer + Floyd-Steinberg dithering ───
  async function makeGif() {
    const GIF_W = 480;
    const GIF_H = 360;
    const DELAY = 80; // 800ms per frame

    const images = await Promise.all(filteredPhotos.map(src => loadImage(src).catch(() => null)));
    const validImages = images.filter(Boolean);
    if (validImages.length < 2) throw new Error('Butuh minimal 2 foto');

    setProgress('gif', 15);

    const tmp = document.createElement('canvas');
    tmp.width = GIF_W; tmp.height = GIF_H;
    const tc = tmp.getContext('2d', { willReadFrequently: true });

    // Draw all frames
    const frameDataList = [];
    for (let fi = 0; fi < validImages.length; fi++) {
      const img = validImages[fi];
      tc.fillStyle = '#ffffff';
      tc.fillRect(0, 0, GIF_W, GIF_H);
      const scale = Math.max(GIF_W / img.width, GIF_H / img.height);
      const sw = GIF_W / scale, sh = GIF_H / scale;
      tc.drawImage(img, (img.width-sw)/2, (img.height-sh)/2, sw, sh, 0, 0, GIF_W, GIF_H);
      frameDataList.push(tc.getImageData(0, 0, GIF_W, GIF_H));
      setProgress('gif', 15 + Math.round((fi+1) / validImages.length * 30));
    }

    setProgress('gif', 50);
    document.getElementById('gifHint').textContent = 'Membangun palet warna...';

    // Build global palette using median-cut across all frames
    const palette = medianCut(frameDataList, 255);
    // Reserve index 0 for white background
    palette.unshift([255, 255, 255]);
    while (palette.length < 256) palette.push([0, 0, 0]);

    setProgress('gif', 65);
    document.getElementById('gifHint').textContent = 'Encoding GIF...';

    const gifData = encodeGIF(frameDataList, GIF_W, GIF_H, DELAY, palette);
    setProgress('gif', 95);
    return new Blob([gifData], { type: 'image/gif' });
  }

  // ─── Median-Cut Color Quantizer ───
  function medianCut(frames, maxColors) {
    // Sample pixels from all frames
    const pixels = [];
    const step = Math.max(1, Math.floor(frames[0].data.length / 4 / 3000));
    frames.forEach(f => {
      const d = f.data;
      for (let i = 0; i < d.length; i += 4 * step) {
        pixels.push([d[i], d[i+1], d[i+2]]);
      }
    });

    // Median cut recursion
    function cut(bucket, depth) {
      if (depth === 0 || bucket.length <= 1) {
        // Average the bucket
        const avg = [0, 0, 0];
        bucket.forEach(p => { avg[0] += p[0]; avg[1] += p[1]; avg[2] += p[2]; });
        return [[Math.round(avg[0]/bucket.length), Math.round(avg[1]/bucket.length), Math.round(avg[2]/bucket.length)]];
      }
      // Find channel with largest range
      let minR=255,maxR=0,minG=255,maxG=0,minB=255,maxB=0;
      bucket.forEach(([r,g,b]) => {
        if(r<minR)minR=r; if(r>maxR)maxR=r;
        if(g<minG)minG=g; if(g>maxG)maxG=g;
        if(b<minB)minB=b; if(b>maxB)maxB=b;
      });
      const rRange = maxR-minR, gRange = maxG-minG, bRange = maxB-minB;
      const ch = rRange >= gRange && rRange >= bRange ? 0 : gRange >= bRange ? 1 : 2;
      bucket.sort((a, b) => a[ch] - b[ch]);
      const mid = Math.floor(bucket.length / 2);
      return [
        ...cut(bucket.slice(0, mid), depth - 1),
        ...cut(bucket.slice(mid), depth - 1),
      ];
    }

    const depth = Math.ceil(Math.log2(maxColors));
    return cut(pixels, depth).slice(0, maxColors);
  }

  // ─── Floyd-Steinberg dithering + nearest color ───
  function ditherFrame(imgData, w, h, palette) {
    // Build KD-tree-like lookup: precompute nearest for sampled colors
    const pixels = new Uint8Array(w * h);
    const buf = new Float32Array(imgData.data); // copy for error diffusion

    function nearest(r, g, b) {
      let best = 0, bestD = Infinity;
      for (let i = 0; i < palette.length; i++) {
        const dr = r - palette[i][0], dg = g - palette[i][1], db = b - palette[i][2];
        const d = dr*dr + dg*dg + db*db;
        if (d < bestD) { bestD = d; best = i; }
      }
      return best;
    }

    // Work on a copy with error buffer
    const err = new Float32Array(w * h * 3).fill(0);
    const src = new Float32Array(w * h * 3);
    for (let i = 0; i < w * h; i++) {
      src[i*3]   = imgData.data[i*4];
      src[i*3+1] = imgData.data[i*4+1];
      src[i*3+2] = imgData.data[i*4+2];
    }

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = y * w + x;
        const r = Math.max(0, Math.min(255, src[i*3]   + err[i*3]));
        const g = Math.max(0, Math.min(255, src[i*3+1] + err[i*3+1]));
        const b = Math.max(0, Math.min(255, src[i*3+2] + err[i*3+2]));

        const idx = nearest(r, g, b);
        pixels[i] = idx;

        const er = r - palette[idx][0];
        const eg = g - palette[idx][1];
        const eb = b - palette[idx][2];

        // Distribute error to neighbors (Floyd-Steinberg)
        function addErr(nx, ny, factor) {
          if (nx < 0 || nx >= w || ny >= h) return;
          const ni = ny * w + nx;
          err[ni*3]   += er * factor;
          err[ni*3+1] += eg * factor;
          err[ni*3+2] += eb * factor;
        }
        addErr(x+1, y,   7/16);
        addErr(x-1, y+1, 3/16);
        addErr(x,   y+1, 5/16);
        addErr(x+1, y+1, 1/16);
      }
    }
    return pixels;
  }

  // ─── GIF89a encoder ───
  function encodeGIF(frames, w, h, delay, palette) {
    const bytes = [];
    function writeStr(s) { for (let i = 0; i < s.length; i++) bytes.push(s.charCodeAt(i)); }
    function write16(n) { bytes.push(n & 0xFF, (n >> 8) & 0xFF); }

    writeStr('GIF89a');
    write16(w); write16(h);
    bytes.push(0xF7, 0, 0); // GCT: 256 colors, bg=0, aspect=0

    for (let i = 0; i < 256; i++) {
      const c = palette[i] || [0,0,0];
      bytes.push(c[0], c[1], c[2]);
    }

    // Netscape loop extension
    bytes.push(0x21, 0xFF, 0x0B);
    writeStr('NETSCAPE2.0');
    bytes.push(3, 1, 0, 0, 0);

    frames.forEach((frame, fi) => {
      setProgress('gif', 65 + Math.round((fi / frames.length) * 28));

      bytes.push(0x21, 0xF9, 0x04, 0x00);
      write16(delay);
      bytes.push(0, 0);

      bytes.push(0x2C);
      write16(0); write16(0); write16(w); write16(h);
      bytes.push(0x00);

      // Dither this frame
      const pixels = ditherFrame(frame, w, h, palette);

      const lzw = lzwEncode(pixels, 8);
      bytes.push(8);
      for (let i = 0; i < lzw.length; i += 255) {
        const block = lzw.slice(i, i + 255);
        bytes.push(block.length);
        for (const b of block) bytes.push(b);
      }
      bytes.push(0);
    });

    bytes.push(0x3B);
    return new Uint8Array(bytes);
  }

  function lzwEncode(pixels, minCodeSize) {
    const clearCode = 1 << minCodeSize;
    const eoi = clearCode + 1;
    const result = [];
    let codeSize = minCodeSize + 1;
    let nextCode = eoi + 1;
    const table = new Map();

    function resetTable() {
      table.clear();
      for (let i = 0; i < clearCode; i++) table.set(String(i), i);
      codeSize = minCodeSize + 1;
      nextCode = eoi + 1;
    }

    let buf = 0, bufLen = 0;
    function writeBits(code) {
      buf |= code << bufLen;
      bufLen += codeSize;
      while (bufLen >= 8) { result.push(buf & 0xFF); buf >>= 8; bufLen -= 8; }
    }

    resetTable();
    writeBits(clearCode);

    let prefix = String(pixels[0]);
    for (let i = 1; i < pixels.length; i++) {
      const c = String(pixels[i]);
      const key = prefix + ',' + c;
      if (table.has(key)) {
        prefix = key;
      } else {
        writeBits(table.get(prefix));
        if (nextCode < 4096) {
          table.set(key, nextCode++);
          if (nextCode > (1 << codeSize)) codeSize = Math.min(codeSize + 1, 12);
        } else {
          writeBits(clearCode);
          resetTable();
        }
        prefix = c;
      }
    }
    writeBits(table.get(prefix));
    writeBits(eoi);
    if (bufLen > 0) result.push(buf & 0xFF);
    return result;
  }


  // ─── Cetak 2 Strip (10×15 cm, 2 strip 5×15 berdampingan tanpa gap) ───
  async function cetak2Strip() {
    if (!finalDataURL) return;
    const btn = document.getElementById('btnCetak2Strip');
    btn.disabled = true;
    btn.querySelector('.btn-label').textContent = 'Memproses...';
    try {
      // 10×15 cm @ 300dpi = 1181×1772 px
      // Masing-masing strip: 5×15 cm = 590×1772 px
      // Disusun ke samping: total 1180×1772 px (2×590, tanpa gap)
      const STRIP_W = 590;
      const STRIP_H = 1772;
      const canvas  = document.createElement('canvas');
      canvas.width  = STRIP_W * 2;  // 1180
      canvas.height = STRIP_H;      // 1772
      const ctx = canvas.getContext('2d');

      const img = await new Promise((res, rej) => {
        const i = new Image();
        i.onload  = () => res(i);
        i.onerror = () => rej(new Error('Gagal load foto'));
        i.src = finalDataURL;
      });

      // Gambar strip kiri (cover-fit ke 590×1772)
      const scale = Math.max(STRIP_W / img.width, STRIP_H / img.height);
      const sw = STRIP_W / scale, sh = STRIP_H / scale;
      const sx = (img.width  - sw) / 2;
      const sy = (img.height - sh) / 2;

      ctx.drawImage(img, sx, sy, sw, sh, 0,       0, STRIP_W, STRIP_H); // kiri
      ctx.drawImage(img, sx, sy, sw, sh, STRIP_W, 0, STRIP_W, STRIP_H); // kanan (identik)

      canvas.toBlob(async (blob) => {
        const file = new File([blob], `lux-cetak2strip-${Date.now()}.jpg`, { type: 'image/jpeg' });
        // Coba Web Share API dulu (buka ke app lain langsung)
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: 'Cetak 2 Strip LUX Photobooth' });
          } catch(e) {
            if (e.name !== 'AbortError') {
              // Fallback: download biasa
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = file.name;
              a.click();
            }
          }
        } else {
          // Desktop / browser tanpa share API: langsung download
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = file.name;
          a.click();
          showStatus('File 10×15 didownload — buka di app cetak favorit kamu');
        }
        btn.querySelector('.btn-label').textContent = 'Cetak 2 Strip';
        btn.disabled = false;
      }, 'image/jpeg', 0.95);

    } catch(e) {
      showStatus('Gagal generate: ' + e.message);
      btn.querySelector('.btn-label').textContent = 'Cetak 2 Strip';
      btn.disabled = false;
    }
  }

  // ─── Share ───
  async function shareNative() {
    if (!finalDataURL) return;
    const btn = document.getElementById('btnShare');
    btn.disabled = true;
    btn.querySelector('.btn-label').textContent = 'Memproses...';
    try {
      // Canvas 10×15 cm @ 300dpi = 1181×1772 px
      // Kiri (5×15 = 590×1772): foto strip, Kanan: putih/transparan
      const TOTAL_W = 1181, STRIP_W = 590, H = 1772;
      const canvas  = document.createElement('canvas');
      canvas.width  = TOTAL_W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Background putih penuh
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, TOTAL_W, H);

      // Gambar foto hanya di sisi kiri (590×1772), sisi kanan tetap putih
      const img = await new Promise((res, rej) => {
        const i = new Image();
        i.onload  = () => res(i);
        i.onerror = () => rej(new Error('Gagal load foto'));
        i.src = finalDataURL;
      });

      const scale = Math.max(STRIP_W / img.width, H / img.height);
      const sw = STRIP_W / scale, sh = H / scale;
      const sx = (img.width  - sw) / 2;
      const sy = (img.height - sh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, STRIP_W, H);

      canvas.toBlob(async (blob) => {
        const file = new File([blob], `lux-cetak1strip-${Date.now()}.jpg`, { type: 'image/jpeg' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: 'Cetak 1 Strip LUX Photobooth' });
          } catch(e) {
            if (e.name !== 'AbortError') {
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = file.name;
              a.click();
            }
          }
        } else {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = file.name;
          a.click();
          showStatus('File 10×15 didownload — buka di app cetak favorit kamu');
        }
        btn.querySelector('.btn-label').textContent = 'Cetak 1 Strip';
        btn.disabled = false;
      }, 'image/jpeg', 0.95);

    } catch(e) {
      showStatus('Gagal generate: ' + e.message);
      btn.querySelector('.btn-label').textContent = 'Cetak 1 Strip';
      btn.disabled = false;
    }
  }

  // ─── Print ───
  function printFoto() {
    if (!finalDataURL) return;
    // Buat hidden iframe untuk print — lebih compatible dari window.open
    const existing = document.getElementById('printFrame');
    if (existing) existing.remove();

    const iframe = document.createElement('iframe');
    iframe.id = 'printFrame';
    iframe.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;border:none;';
    document.body.appendChild(iframe);

    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(`<!DOCTYPE html><html><head>
      <style>
        * { margin:0; padding:0; }
        body { display:flex; justify-content:center; align-items:flex-start; }
        img { max-width:100%; height:auto; display:block; page-break-inside:avoid; }
        @media print { body { margin:0; } img { width:5cm; } }
      </style>
    </head><body>
      <img src="${finalDataURL}" onload="window.print();">
</body></html>`);
    doc.close();

    showStatus('Membuka dialog print...');
  }

  // ─── Download ZIP (works on desktop & mobile) ───
  async function downloadZip() {
    if (!finalDataURL) return;
    const btn = document.getElementById('btnZip');
    btn.disabled = true;
    btn.querySelector('.btn-label').textContent = 'Menyiapkan ZIP...';
    setProgress('zip', 5);

    try {
      const zip = new JSZip();
      const folder = zip.folder('lux-photobooth');

      // 1. Foto utama (composite)
      setProgress('zip', 15);
      const jpgBlob = dataURLtoBlob(finalDataURL);
      folder.file('foto-utama.jpg', jpgBlob);

      // 2. Foto satuan (per slot)
      setProgress('zip', 25);
      for (let i = 0; i < filteredPhotos.length; i++) {
        if (filteredPhotos[i]) {
          const fBlob = dataURLtoBlob(filteredPhotos[i]);
          folder.file(`foto-${i+1}.jpg`, fBlob);
        }
        setProgress('zip', 25 + Math.round((i+1)/filteredPhotos.length * 20));
      }

      // 3. GIF (buat dulu kalau belum ada)
      setProgress('zip', 50);
      btn.querySelector('.btn-label').textContent = 'Membuat GIF...';
      if (!gifBlob && filteredPhotos.length >= 2) {
        try {
          gifBlob = await makeGif();
        } catch(e) { /* skip gif jika gagal */ }
      }
      if (gifBlob) folder.file('animated.gif', gifBlob);

      // 4. Generate ZIP
      setProgress('zip', 80);
      btn.querySelector('.btn-label').textContent = 'Membangun ZIP...';
      const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } },
        (meta) => setProgress('zip', 80 + Math.round(meta.percent * 0.18))
      );

      setProgress('zip', null);
      btn.disabled = false;
      btn.querySelector('.btn-label').textContent = 'Download Semua (ZIP)';

      // Trigger download
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `lux-photobooth-${Date.now()}.zip`;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
      showStatus('ZIP berhasil didownload ✓');

    } catch(e) {
      console.error('ZIP error:', e);
      setProgress('zip', null);
      btn.disabled = false;
      btn.querySelector('.btn-label').textContent = 'Download Semua (ZIP)';
      showStatus('Gagal buat ZIP: ' + e.message, '#e94560');
    }
  }

  function fotoLagi() {
    ['photos','filteredPhotos','finalPhoto','finalPhotoThumb','livePhotos'].forEach(k => localStorage.removeItem(k));
    window.location.href = '/index';
  }

  generateResult();
</script>

    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }
</script>
