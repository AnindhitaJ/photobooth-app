<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilih Template - LUX Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    .top-bar {
      width: 100%;
      max-width: 860px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .admin-btn {
      background: transparent;
      border: none;
      color: #a0a0b0;
      font-size: 20px;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .admin-btn:hover { color: white; background: #16213e; }

    h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; text-align: center; }
    p.sub { font-size: 14px; color: #a0a0b0; margin-bottom: 20px; text-align: center; }

    /* Category tabs */
    .cat-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
      width: 100%;
      max-width: 860px;
    }
    .cat-tab {
      padding: 7px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid #0f3460;
      background: transparent;
      color: #a0a0b0;
      transition: all 0.15s;
    }
    .cat-tab:hover { border-color: #e94560; color: white; }
    .cat-tab.active { background: #e94560; border-color: #e94560; color: white; }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 14px;
      width: 100%;
      max-width: 860px;
      margin-bottom: 32px;
    }
    .template-card {
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #0f3460;
      transition: all 0.2s;
      background: #16213e;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .template-card:hover { border-color: #e94560; transform: translateY(-4px); }
    .template-card.selected { border-color: #e94560; box-shadow: 0 0 0 2px #e94560; }
    .template-card canvas, .template-card img {
      width: 100%;
      display: block;
      aspect-ratio: 1/3;
      object-fit: cover;
    }
    .template-name {
      font-size: 12px;
      font-weight: 600;
      color: #a0a0b0;
      padding: 8px 10px;
      text-align: center;
    }
    .template-card.selected .template-name { color: #e94560; }
    .selected-badge {
      display: none;
      font-size: 10px;
      background: #e94560;
      color: white;
      padding: 2px 8px;
      border-radius: 50px;
      margin: 6px 0 0;
      font-weight: 700;
    }
    .template-card.selected .selected-badge { display: inline-block; }
    .basic-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: #f5a623;
      color: #1a1a2e;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    /* Frame color picker (shown for basic frame) */
    .frame-color-picker {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: #16213e;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      width: 100%;
      max-width: 860px;
    }
    .frame-color-picker.show { display: flex; }
    .frame-color-picker label { font-size: 12px; color: #a0a0b0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .color-swatches { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .color-swatch {
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.15s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: white; transform: scale(1.2); }

    .info-box {
      background: #16213e;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      color: #a0a0b0;
      margin-bottom: 24px;
      text-align: center;
      display: none;
      max-width: 860px;
      width: 100%;
    }
    .info-box span { color: #e94560; font-weight: 700; }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #e94560;
      color: white;
      min-width: 200px;
      opacity: 0.4;
      pointer-events: none;
      cursor: not-allowed;
    }
    .btn-primary.aktif { opacity: 1; pointer-events: auto; cursor: pointer; }
    .btn-primary.aktif:hover { background: #c73652; transform: scale(1.03); }
    .btn-secondary { background: transparent; color: #a0a0b0; border: 2px solid #a0a0b0; }
    .btn-secondary:hover { color: white; border-color: white; }

    /* Admin modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 999;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #16213e;
      border-radius: 20px;
      padding: 32px;
      width: 300px;
      text-align: center;
      border: 2px solid #0f3460;
    }
    .modal h3 { font-size: 18px; margin-bottom: 8px; }
    .modal p { font-size: 13px; color: #a0a0b0; margin-bottom: 20px; }
    .modal input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 2px solid #0f3460;
      background: #1a1a2e;
      color: white;
      font-size: 18px;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 12px;
      outline: none;
    }
    .modal input:focus { border-color: #e94560; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1; padding: 12px;
      border-radius: 50px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; border: none;
      transition: all 0.2s;
    }
    .modal-confirm { background: #e94560; color: white; }
    .modal-confirm:hover { background: #c73652; }
    .modal-cancel { background: transparent; color: #a0a0b0; border: 2px solid #a0a0b0 !important; }
    .modal-cancel:hover { color: white; border-color: white !important; }
    .modal-error { color: #e94560 !important; font-size: 12px !important; margin-top: 8px; min-height: 16px; margin-bottom: 0 !important; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="logo-text">📸 LUX PHOTOBOOTH</div>
    <button class="admin-btn" onclick="bukaAdmin()" title="Admin">⚙️</button>
  </div>

  <h2>Pilih Template</h2>
  <p class="sub">Pilih template, nanti foto sesuai jumlah slot-nya</p>

  <div class="cat-tabs" id="catTabs"></div>

  <div class="frame-color-picker" id="frameColorPicker">
    <label>Warna Frame Basic</label>
    <div class="color-swatches" id="colorSwatches"></div>
  </div>

  <div class="template-grid" id="templateGrid"></div>

  <div class="info-box" id="infoBox">
    Template ini punya <span id="slotCount">-</span> slot foto —
    kamu akan ambil foto sebanyak itu
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="kembali()">← Balik</button>
    <button class="btn btn-primary" id="btnLanjut" onclick="lanjut()">Mulai Foto →</button>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>🔐 Admin Access</h3>
      <p>Masukkan password untuk masuk ke Template Manager</p>
      <input type="password" id="passwordInput" placeholder="••••••" maxlength="10"
        onkeydown="if(event.key==='Enter') cekPassword()">
      <div class="modal-btns">
        <button class="modal-cancel" onclick="tutupModal()">Batal</button>
        <button class="modal-confirm" onclick="cekPassword()">Masuk</button>
      </div>
      <p class="modal-error" id="modalError"></p>
    </div>
  </div>

<script>
  // ─── Frame Basic: 4 slot (5×15cm = 591×1772px) ───
  const FRAME_COLORS = [
    { label: 'Putih',    bg: '#ffffff', text: '#1a1a2e' },
    { label: 'Hitam',    bg: '#1a1a2e', text: '#ffffff' },
    { label: 'Merah',    bg: '#e94560', text: '#ffffff' },
    { label: 'Emas',     bg: '#f5a623', text: '#1a1a2e' },
    { label: 'Pink',     bg: '#f472b6', text: '#ffffff' },
    { label: 'Biru',     bg: '#3b82f6', text: '#ffffff' },
    { label: 'Hijau',    bg: '#22c55e', text: '#1a1a2e' },
    { label: 'Ungu',     bg: '#8b5cf6', text: '#ffffff' },
  ];
  let selectedFrameColor = FRAME_COLORS[0];

  // Render basic frame as PNG using canvas (591x1772)
  function generateBasicFrameSrc(colorObj) {
    const W = 591, H = 1772;
    const PADDING = 20;
    const GAP = 12;
    const N_SLOTS = 4;
    const FOOTER_H = 60;
    const slotH = Math.floor((H - PADDING * 2 - GAP * (N_SLOTS - 1) - FOOTER_H) / N_SLOTS);
    const slotW = W - PADDING * 2;

    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');

    // Background
    ctx.fillStyle = colorObj.bg;
    ctx.fillRect(0, 0, W, H);

    // Slot placeholders (will be filled by result.html)
    // Just draw placeholder rectangles — the transparent area
    ctx.fillStyle = 'rgba(0,0,0,0)';
    for (let i = 0; i < N_SLOTS; i++) {
      const y = PADDING + i * (slotH + GAP);
      ctx.clearRect(PADDING, y, slotW, slotH);
    }

    // Footer text
    ctx.fillStyle = colorObj.text;
    ctx.font = `bold 22px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = '4px';
    ctx.fillText('LUX PHOTOBOOTH', W / 2, H - FOOTER_H / 2);

    return { src: c.toDataURL('image/png'), slots: generateBasicSlots(), w: W, h: H };
  }

  function generateBasicSlots() {
    const W = 591, H = 1772;
    const PADDING = 20;
    const GAP = 12;
    const N_SLOTS = 4;
    const FOOTER_H = 60;
    const slotH = Math.floor((H - PADDING * 2 - GAP * (N_SLOTS - 1) - FOOTER_H) / N_SLOTS);
    const slotW = W - PADDING * 2;
    const slots = [];
    for (let i = 0; i < N_SLOTS; i++) {
      slots.push({ x: PADDING, y: PADDING + i * (slotH + GAP), w: slotW, h: slotH });
    }
    return slots;
  }

  // Generate basic frame template object
  function getBasicTemplate() {
    const data = generateBasicFrameSrc(selectedFrameColor);
    return {
      id: '__basic__',
      name: 'Frame Basic',
      category: '__basic__',
      isBasic: true,
      src: data.src,
      slots: data.slots,
      frameColor: selectedFrameColor,
      w: data.w,
      h: data.h
    };
  }

  // ─── State ───
  let selectedTemplate = null;
  let currentCat = 'all';

  function getSavedTemplates() {
    try {
      const data = JSON.parse(localStorage.getItem('pb_templates') || '[]');
      return Array.isArray(data) ? data : [];
    } catch { return []; }
  }

  function getCategories() {
    try { return JSON.parse(localStorage.getItem('pb_categories') || '[]'); }
    catch { return []; }
  }

  // ─── Render category tabs ───
  function renderCatTabs() {
    const cats = getCategories();
    const el = document.getElementById('catTabs');
    let html = `<button class="cat-tab ${currentCat==='all'?'active':''}" onclick="filterCat('all')">Semua</button>`;
    html += `<button class="cat-tab ${currentCat==='__basic__'?'active':''}" onclick="filterCat('__basic__')">Basic</button>`;
    html += cats.map(c =>
      `<button class="cat-tab ${currentCat===c?'active':''}" onclick="filterCat('${c}')">${c}</button>`
    ).join('');
    el.innerHTML = html;
  }

  function filterCat(cat) {
    currentCat = cat;
    renderCatTabs();
    renderTemplates();
  }

  // ─── Render color swatches for basic frame ───
  function renderColorSwatches() {
    const el = document.getElementById('colorSwatches');
    el.innerHTML = FRAME_COLORS.map((c, i) =>
      `<div class="color-swatch ${selectedFrameColor === c ? 'active' : ''}"
            style="background:${c.bg}; border-color:${c===selectedFrameColor?'white':'transparent'}"
            title="${c.label}"
            onclick="pickFrameColor(${i})"></div>`
    ).join('');
  }

  function pickFrameColor(idx) {
    selectedFrameColor = FRAME_COLORS[idx];
    renderColorSwatches();
    // Regenerate and re-select if basic is currently selected
    if (selectedTemplate && selectedTemplate.isBasic) {
      const newBasic = getBasicTemplate();
      selectedTemplate = newBasic;
      localStorage.setItem('templateSrc', newBasic.src);
      localStorage.setItem('templateSlots', JSON.stringify(newBasic.slots));
      localStorage.setItem('templateW', newBasic.w);
      localStorage.setItem('templateH', newBasic.h);
    }
    renderTemplates();
  }

  // ─── Render templates ───
  function renderTemplates() {
    const grid = document.getElementById('templateGrid');
    const saved = getSavedTemplates();
    const basicTmpl = getBasicTemplate();

    let templates = [];
    if (currentCat === 'all') {
      templates = [basicTmpl, ...saved];
    } else if (currentCat === '__basic__') {
      templates = [basicTmpl];
    } else {
      templates = saved.filter(t => t.category === currentCat);
    }

    // Show/hide frame color picker
    const showPicker = currentCat === 'all' || currentCat === '__basic__';
    document.getElementById('frameColorPicker').classList.toggle('show', showPicker);
    if (showPicker) renderColorSwatches();

    if (templates.length === 0) {
      grid.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;color:#a0a0b0;padding:48px 24px;">
          <h3 style="color:white;margin-bottom:8px">Belum ada template di kategori ini</h3>
          <p>Admin perlu upload template dulu lewat menu ⚙️</p>
        </div>`;
      selectedTemplate = null;
      document.getElementById('infoBox').style.display = 'none';
      document.getElementById('btnLanjut').classList.remove('aktif');
      return;
    }

    grid.innerHTML = '';
    templates.forEach((tmpl, index) => {
      const card = document.createElement('div');
      card.className = 'template-card';
      const slotLen = Array.isArray(tmpl.slots) ? tmpl.slots.length : 0;
      const basicBadge = tmpl.isBasic ? '<span class="basic-badge">Built-in</span>' : '';
      card.innerHTML = `
        ${basicBadge}
        <span class="selected-badge">✓ Dipilih</span>
        <img src="${tmpl.src}" alt="${tmpl.name}" style="aspect-ratio:1/3;object-fit:cover;">
        <div class="template-name">
          ${tmpl.name}<br>
          <span style="color:#555;font-size:10px">${slotLen} foto</span>
        </div>
      `;
      card.onclick = () => selectTemplate(tmpl, card);
      grid.appendChild(card);
    });

    // Auto-select first
    setTimeout(() => {
      const firstCard = document.querySelector('.template-card');
      if (firstCard && templates[0]) selectTemplate(templates[0], firstCard);
    }, 0);
  }

  function selectTemplate(tmpl, card) {
    document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedTemplate = tmpl;

    // For basic template, regenerate with current color
    const t = tmpl.isBasic ? getBasicTemplate() : tmpl;
    selectedTemplate = t;

    localStorage.setItem('templateSrc', t.src);
    localStorage.setItem('templateSlots', JSON.stringify(t.slots || []));
    localStorage.setItem('templateName', t.name || 'Template');
    localStorage.setItem('slotCount', (t.slots || []).length);
    localStorage.setItem('templateW', t.w || 591);
    localStorage.setItem('templateH', t.h || 1772);
    localStorage.setItem('templateIsBasic', t.isBasic ? '1' : '0');
    if (t.isBasic) localStorage.setItem('basicFrameColor', JSON.stringify(t.frameColor));

    document.getElementById('slotCount').textContent = (t.slots || []).length;
    document.getElementById('infoBox').style.display = 'block';
    document.getElementById('btnLanjut').classList.add('aktif');
  }

  function lanjut() {
    if (!selectedTemplate) { alert('Pilih template dulu.'); return; }
    const slots = selectedTemplate.slots || [];
    if (slots.length === 0) { alert('Template ini belum punya slot foto.'); return; }

    localStorage.removeItem('photos');
    localStorage.removeItem('filteredPhotos');
    localStorage.removeItem('livePhotos');
    localStorage.removeItem('finalPhoto');
    window.location.href = 'camera.html';
  }

  function kembali() { window.location.href = 'index.html'; }

  function bukaAdmin() {
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('passwordInput').value = '';
    document.getElementById('modalError').textContent = '';
    setTimeout(() => document.getElementById('passwordInput').focus(), 100);
  }

  function tutupModal() { document.getElementById('modalOverlay').classList.remove('show'); }

  function cekPassword() {
    const pw = document.getElementById('passwordInput').value;
    if (pw === '123456') {
      tutupModal();
      window.location.href = 'admin.html';
    } else {
      document.getElementById('modalError').textContent = 'Password salah. Coba lagi.';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) tutupModal();
  });

  renderCatTabs();
  renderTemplates();
</script>
</body>
</html>
