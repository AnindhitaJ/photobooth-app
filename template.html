<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilih Template - Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    .paket-badge {
      display: inline-block;
      background: #e94560;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; text-align: center; }
    p.sub { font-size: 14px; color: #a0a0b0; margin-bottom: 28px; text-align: center; }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 14px;
      width: 100%;
      max-width: 860px;
      margin-bottom: 32px;
    }

    .template-card {
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #0f3460;
      transition: all 0.2s;
      background: #16213e;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .template-card:hover { border-color: #e94560; transform: translateY(-4px); }
    .template-card.selected { border-color: #e94560; box-shadow: 0 0 0 2px #e94560; }

    .template-card img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .template-name {
      font-size: 12px;
      font-weight: 600;
      color: #a0a0b0;
      padding: 8px 10px;
      text-align: center;
    }
    .template-card.selected .template-name { color: #e94560; }

    .selected-badge {
      display: none;
      font-size: 10px;
      background: #e94560;
      color: white;
      padding: 2px 8px;
      border-radius: 50px;
      margin: 6px 0 0;
      font-weight: 700;
    }
    .template-card.selected .selected-badge { display: inline-block; }

    .loading-state {
      text-align: center;
      color: #a0a0b0;
      font-size: 14px;
      padding: 40px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #e94560;
      color: white;
      min-width: 200px;
      opacity: 0.4;
      pointer-events: none;
    }
    .btn-primary.aktif { opacity: 1; pointer-events: all; }
    .btn-primary.aktif:hover { background: #c73652; transform: scale(1.03); }
    .btn-secondary {
      background: transparent;
      color: #a0a0b0;
      border: 2px solid #a0a0b0;
    }
    .btn-secondary:hover { color: white; border-color: white; }
  </style>
</head>
<body>

  <div style="text-align:center; margin-bottom: 20px;">
    <div class="paket-badge" id="paketBadge">Paket</div>
    <h2>Pilih Template</h2>
    <p class="sub" id="subText">Pilih template untuk hasil fotomu</p>
  </div>

  <div class="template-grid" id="templateGrid">
    <div class="loading-state">Memuat template...</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="kembali()">← Balik</button>
    <button class="btn btn-primary" id="btnLanjut" onclick="lanjut()">Lanjut ke Hasil →</button>
  </div>

<script>
  const paket = localStorage.getItem('paket') || '5k';
  document.getElementById('paketBadge').textContent = 'Paket ' + paket.toUpperCase();

  const specs = {
    '5k':  { folder: 'assets/templates/5k',  count: 10, label: '5 × 15 cm',  w: 591,  h: 1772 },
    '10k': { folder: 'assets/templates/10k', count: 10, label: '10 × 15 cm', w: 1181, h: 1772 }
  };

  const spec = specs[paket];
  document.getElementById('subText').textContent = `Template ukuran ${spec.label}`;

  let selectedTemplate = null;

  function renderTemplates() {
    const grid = document.getElementById('templateGrid');
    grid.innerHTML = '';

    for (let i = 1; i <= spec.count; i++) {
      const src = `${spec.folder}/${i}.png`;

      const card = document.createElement('div');
      card.className = 'template-card';
      card.innerHTML = `
        <span class="selected-badge">✓ Dipilih</span>
        <img src="${src}" alt="Template ${i}" loading="lazy" onerror="this.parentElement.style.display='none'">
        <div class="template-name">Template ${i}</div>
      `;

      card.onclick = () => {
        document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedTemplate = src;
        localStorage.setItem('templateSrc', src);
        localStorage.setItem('templateW', spec.w);
        localStorage.setItem('templateH', spec.h);
        document.getElementById('btnLanjut').classList.add('aktif');
      };

      grid.appendChild(card);
    }
  }

  renderTemplates();

  function lanjut() {
    if (!selectedTemplate) return;
    window.location.href = 'result.html';
  }

  function kembali() {
    window.location.href = 'filter.html';
  }
</script>

</body>
</html>
