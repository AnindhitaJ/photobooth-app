<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilih Template - Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    .top-bar {
      width: 100%;
      max-width: 860px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .paket-badge {
      display: inline-block;
      background: #e94560;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .admin-btn {
      background: transparent;
      border: none;
      color: #a0a0b0;
      font-size: 20px;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .admin-btn:hover { color: white; background: #16213e; }

    h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; text-align: center; }
    p.sub { font-size: 14px; color: #a0a0b0; margin-bottom: 28px; text-align: center; }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 14px;
      width: 100%;
      max-width: 860px;
      margin-bottom: 32px;
    }
    .template-card {
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #0f3460;
      transition: all 0.2s;
      background: #16213e;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .template-card:hover { border-color: #e94560; transform: translateY(-4px); }
    .template-card.selected { border-color: #e94560; box-shadow: 0 0 0 2px #e94560; }
    .template-card img { width: 100%; display: block; object-fit: cover; aspect-ratio: 1/2; }
    .template-name {
      font-size: 12px;
      font-weight: 600;
      color: #a0a0b0;
      padding: 8px 10px;
      text-align: center;
    }
    .template-card.selected .template-name { color: #e94560; }
    .selected-badge {
      display: none;
      font-size: 10px;
      background: #e94560;
      color: white;
      padding: 2px 8px;
      border-radius: 50px;
      margin: 6px 0 0;
      font-weight: 700;
    }
    .template-card.selected .selected-badge { display: inline-block; }

    .empty-state {
      text-align: center;
      color: #a0a0b0;
      padding: 48px 24px;
      width: 100%;
    }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: white; }
    .empty-state p { font-size: 14px; margin-bottom: 16px; }

    .info-box {
      background: #16213e;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      color: #a0a0b0;
      margin-bottom: 24px;
      text-align: center;
      display: none;
      max-width: 860px;
      width: 100%;
    }
    .info-box span { color: #e94560; font-weight: 700; }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: #e94560; color: white; min-width: 200px; opacity: 0.4; pointer-events: none; }
    .btn-primary.aktif { opacity: 1; pointer-events: all; }
    .btn-primary.aktif:hover { background: #c73652; transform: scale(1.03); }
    .btn-secondary { background: transparent; color: #a0a0b0; border: 2px solid #a0a0b0; }
    .btn-secondary:hover { color: white; border-color: white; }

    /* Password modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      display: none;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #16213e;
      border-radius: 20px;
      padding: 32px;
      width: 300px;
      text-align: center;
      border: 2px solid #0f3460;
    }
    .modal h3 { font-size: 18px; margin-bottom: 8px; }
    .modal p { font-size: 13px; color: #a0a0b0; margin-bottom: 20px; }
    .modal input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 2px solid #0f3460;
      background: #1a1a2e;
      color: white;
      font-size: 18px;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 12px;
      outline: none;
    }
    .modal input:focus { border-color: #e94560; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1;
      padding: 12px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .modal-confirm { background: #e94560; color: white; }
    .modal-confirm:hover { background: #c73652; }
    .modal-cancel { background: transparent; color: #a0a0b0; border: 2px solid #a0a0b0; }
    .modal-cancel:hover { color: white; border-color: white; }
    .modal-error { color: #e94560; font-size: 12px; margin-top: 8px; min-height: 16px; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="paket-badge" id="paketBadge">Paket</div>
    <button class="admin-btn" onclick="bukaAdmin()" title="Admin">⚙️</button>
  </div>

  <h2>Pilih Template</h2>
  <p class="sub">Pilih dulu, nanti kita foto sesuai jumlah slot-nya</p>

  <div class="template-grid" id="templateGrid"></div>

  <div class="info-box" id="infoBox">
    Template ini punya <span id="slotCount">-</span> slot foto —
    kamu akan ambil foto sebanyak itu
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="kembali()">← Balik</button>
    <button class="btn btn-primary" id="btnLanjut" onclick="lanjut()">Mulai Foto →</button>
  </div>

  <!-- Password Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>🔐 Admin Access</h3>
      <p>Masukkan password untuk masuk ke Template Manager</p>
      <input type="password" id="passwordInput" placeholder="••••••" maxlength="10"
        onkeydown="if(event.key==='Enter') cekPassword()">
      <div class="modal-btns">
        <button class="modal-cancel" onclick="tutupModal()">Batal</button>
        <button class="modal-confirm" onclick="cekPassword()">Masuk</button>
      </div>
      <p class="modal-error" id="modalError"></p>
    </div>
  </div>

<script>
  const paket = localStorage.getItem('paket') || '5k';
  document.getElementById('paketBadge').textContent = 'Paket ' + paket.toUpperCase();

  let selectedTemplate = null;

  function getSavedTemplates() {
    try { return JSON.parse(localStorage.getItem('pb_templates') || '[]'); }
    catch { return []; }
  }

  function renderTemplates() {
    const grid = document.getElementById('templateGrid');
    const templates = getSavedTemplates();

    if (templates.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <h3>Belum ada template</h3>
          <p>Admin perlu upload template dulu lewat menu ⚙️</p>
        </div>`;
      return;
    }

    grid.innerHTML = '';
    templates.forEach((tmpl) => {
      const card = document.createElement('div');
      card.className = 'template-card';
      card.innerHTML = `
        <span class="selected-badge">✓ Dipilih</span>
        <img src="${tmpl.src}" alt="${tmpl.name}">
        <div class="template-name">${tmpl.name}<br><span style="color:#555;font-size:10px">${tmpl.slots.length} foto</span></div>
      `;
      card.onclick = () => {
        document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedTemplate = tmpl;
        localStorage.setItem('templateSrc', tmpl.src);
        localStorage.setItem('templateSlots', JSON.stringify(tmpl.slots));
        localStorage.setItem('templateName', tmpl.name);
        localStorage.setItem('slotCount', tmpl.slots.length);
        document.getElementById('slotCount').textContent = tmpl.slots.length;
        document.getElementById('infoBox').style.display = 'block';
        document.getElementById('btnLanjut').classList.add('aktif');
      };
      grid.appendChild(card);
    });
  }

  function lanjut() {
    if (!selectedTemplate) return;
    localStorage.removeItem('photos');
    localStorage.removeItem('filteredPhotos');
    window.location.href = 'camera.html';
  }

  function kembali() {
    window.location.href = 'index.html';
  }

  // Admin modal
  function bukaAdmin() {
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('passwordInput').value = '';
    document.getElementById('modalError').textContent = '';
    setTimeout(() => document.getElementById('passwordInput').focus(), 100);
  }

  function tutupModal() {
    document.getElementById('modalOverlay').classList.remove('show');
  }

  function cekPassword() {
    const pw = document.getElementById('passwordInput').value;
    if (pw === '123456') {
      tutupModal();
      window.location.href = 'admin.html';
    } else {
      document.getElementById('modalError').textContent = 'Password salah. Coba lagi.';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }

  // Tutup modal klik luar
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) tutupModal();
  });

  renderTemplates();
</script>

</body>
</html>
