<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  
  <meta name="robots" content="noindex, nofollow, noarchive">
<title>Tutorial - Lux Photobooth</title>
  <script src="/config.js"></script>
  <script src="/auth.js"></script>
  <style>
    :root{--orange:#D84B7E;--yellow:#E5B842;--navy:#1D3557;--bg:#FFF8FC;--card:#fff;--border:#fad0e4;--text:#1D3557;--text2:#6b7fa3}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:22px}
    body:before{content:'';position:fixed;inset:0;z-index:-1;background-image:radial-gradient(circle,rgba(216,75,126,.08) 1px,transparent 1px);background-size:28px 28px}
    .wrap{max-width:1120px;margin:0 auto}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:10px}.brand img{width:42px;height:42px;border-radius:50%;object-fit:cover}
    h1{font-size:30px;font-weight:950;letter-spacing:-.8px}.sub{color:var(--text2);font-size:14px;font-weight:700;margin-top:3px;line-height:1.45}
    .btn{border:0;border-radius:999px;padding:12px 18px;font:inherit;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--orange),var(--yellow));color:white;box-shadow:0 8px 22px rgba(216,75,126,.18);text-decoration:none;display:inline-flex;gap:8px;align-items:center;justify-content:center}
    .btn.secondary{background:white;color:var(--text);border:2px solid var(--border);box-shadow:none}.btn.dark{background:var(--navy);color:var(--yellow)}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin:16px 0 22px}
    .tutorial-card{background:white;border:2px solid var(--border);border-radius:24px;padding:18px;box-shadow:0 8px 26px rgba(216,75,126,.08);cursor:pointer;transition:.18s;min-height:170px;display:flex;flex-direction:column;justify-content:space-between}
    .tutorial-card:hover{transform:translateY(-3px);border-color:var(--orange);box-shadow:0 12px 32px rgba(216,75,126,.15)}
    .icon{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--orange),var(--yellow));color:white;font-size:24px;box-shadow:0 8px 20px rgba(216,75,126,.15)}
    .tutorial-title{font-size:18px;font-weight:950;margin:12px 0 6px}.tutorial-desc{font-size:13px;color:var(--text2);font-weight:700;line-height:1.45}
    .panel{background:white;border:2px solid var(--border);border-radius:26px;padding:22px;box-shadow:0 8px 26px rgba(29,53,87,.06);display:none}.panel.active{display:block}
    .panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
    .progress{height:10px;background:#f8c9df;border-radius:999px;overflow:hidden;margin:14px 0}.progress span{display:block;height:100%;background:linear-gradient(135deg,var(--orange),var(--yellow));width:0%;transition:.25s}
    .stepbox{display:grid;grid-template-columns:54px 1fr;gap:14px;align-items:start;padding:18px;background:#fff8fc;border:2px solid var(--border);border-radius:20px;min-height:170px}
    .stepnum{width:54px;height:54px;border-radius:18px;background:var(--navy);color:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:950}
    .step-title{font-size:22px;font-weight:950;margin-bottom:8px}.step-desc{font-size:15px;color:var(--text2);font-weight:650;line-height:1.65}.step-desc b{color:var(--text)}
    .tip{margin-top:12px;padding:12px 14px;border-radius:16px;background:white;border:2px dashed var(--border);font-size:13px;color:var(--text2);font-weight:750;line-height:1.5}
    .actions{display:flex;gap:10px;justify-content:space-between;flex-wrap:wrap;margin-top:16px}.actions .left,.actions .right{display:flex;gap:10px;flex-wrap:wrap}
    .coach-overlay{display:none;position:fixed;inset:0;background:rgba(29,53,87,.55);z-index:9999;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(8px)}
    .coach{width:100%;max-width:560px;background:white;border:2px solid var(--border);border-radius:28px;padding:24px;box-shadow:0 28px 80px rgba(0,0,0,.25);animation:pop .18s ease}
    @keyframes pop{from{transform:scale(.96);opacity:.6}to{transform:scale(1);opacity:1}}
    .coach-kicker{font-size:12px;font-weight:950;letter-spacing:.9px;color:var(--orange);text-transform:uppercase;margin-bottom:8px}.coach h2{font-size:26px;letter-spacing:-.6px;margin-bottom:8px}.coach p{font-size:15px;color:var(--text2);font-weight:650;line-height:1.6;margin-bottom:14px}
    .coach-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}.pill{display:inline-flex;padding:5px 10px;border-radius:999px;background:#fff8fc;border:1.5px solid var(--border);font-size:12px;font-weight:900;color:var(--text2);margin-top:8px}
    @media(max-width:1100px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:820px){.grid{grid-template-columns:1fr}.stepbox{grid-template-columns:1fr}.actions{display:grid}.actions .left,.actions .right{display:grid}.btn{width:100%}}
  </style>

<script>
(function(){
  if (new URLSearchParams(location.search).get('embedded') === '1') {
    document.documentElement.classList.add('embedded-mode');
  }
})();
</script>


<style>
  html.embedded-mode body { padding: 16px !important; }
  html.embedded-mode .top a[href="/admin"],
  html.embedded-mode .top a[href="/app"],
  html.embedded-mode .top a[href="/analytics"],
  html.embedded-mode .top a[href="/content-sharing"],
  html.embedded-mode .top .btn.secondary { display: none !important; }
</style>

</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="brand"><img data-auth-logo src="/logo.png" alt="Lux"><div><h1>📚 Tutorial Lux Photobooth</h1><div class="sub">Pilih panduan sesuai kebutuhan. Tutorial ini dibuat step-by-step, ada tooltip/pop up, dan bisa langsung diarahkan ke halaman terkait.</div></div></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <a class="btn secondary" href="/admin">← Admin</a>
      <a class="btn secondary" href="/app">Beranda</a>
    </div>
  </div>

  <div class="grid" id="tutorialGrid"></div>

  <section class="panel" id="tutorialPanel">
    <div class="panel-head">
      <div>
        <h2 id="panelTitle" style="font-size:24px;font-weight:950">Tutorial</h2>
        <div class="sub" id="panelSub">Ikuti langkahnya satu per satu.</div>
      </div>
      <button class="btn secondary" onclick="closeTutorial()">Tutup</button>
    </div>
    <div class="progress"><span id="progressFill"></span></div>
    <div class="stepbox">
      <div class="stepnum" id="stepNum">1</div>
      <div>
        <div class="step-title" id="stepTitle">Judul Step</div>
        <div class="step-desc" id="stepDesc"></div>
        <div class="tip" id="stepTip"></div>
        <div id="stepTarget" class="pill"></div>
      </div>
    </div>
    <div class="actions">
      <div class="left">
        <button class="btn secondary" onclick="prevStep()">← Sebelumnya</button>
        <button class="btn secondary" onclick="restartStep()">↺ Ulang</button>
      </div>
      <div class="right">
        <button class="btn dark" onclick="openCoach()">💬 Pop up panduan</button>
        <button class="btn" onclick="nextStep()">Lanjut →</button>
        <button class="btn secondary" id="goTargetBtn" onclick="goTarget()">Buka halaman terkait</button>
      </div>
    </div>
  </section>
</div>

<div class="coach-overlay" id="coachOverlay">
  <div class="coach">
    <div class="coach-kicker" id="coachKicker">Step 1</div>
    <h2 id="coachTitle">Judul</h2>
    <p id="coachBody">Deskripsi</p>
    <div class="coach-actions">
      <button class="btn secondary" onclick="closeCoach()">Tutup</button>
      <button class="btn" onclick="closeCoach(); nextStep();">Saya mengerti →</button>
    </div>
  </div>
</div>

let currentKey = null;
let currentIdx = 0;

function renderCards(){
  tutorialGrid.innerHTML = Object.entries(tutorials).map(([key,t]) => `
    <button class="tutorial-card" onclick="startTutorial('${key}')">
      <div>
        <div class="icon">${t.icon}</div>
        <div class="tutorial-title">${t.title}</div>
        <div class="tutorial-desc">${t.desc}</div>
      </div>
      <span class="pill">${t.steps.length} langkah</span>
    </button>
  `).join('');
}

function startTutorial(key){
  currentKey = key; currentIdx = 0;
  tutorialPanel.classList.add('active');
  renderStep();
  tutorialPanel.scrollIntoView({behavior:'smooth', block:'start'});
  setTimeout(openCoach, 250);
}

function renderStep(){
  const t = tutorials[currentKey];
  const s = t.steps[currentIdx];
  panelTitle.textContent = t.title;
  panelSub.textContent = t.desc;
  stepNum.textContent = currentIdx + 1;
  stepTitle.textContent = s[0];
  stepDesc.innerHTML = s[1];
  stepTip.textContent = s[2] || '';
  stepTarget.textContent = 'Halaman terkait: ' + (s[3] || t.target || '-');
  progressFill.style.width = Math.round(((currentIdx+1)/t.steps.length)*100) + '%';
  goTargetBtn.textContent = 'Buka ' + (s[3] || t.target || 'halaman');
}

function nextStep(){
  const t = tutorials[currentKey];
  if (currentIdx < t.steps.length - 1) { currentIdx++; renderStep(); openCoach(); }
  else { closeCoach(); alert('Tutorial selesai ✓'); }
}
function prevStep(){ if(currentIdx>0){currentIdx--; renderStep(); openCoach();} }
function restartStep(){ currentIdx=0; renderStep(); openCoach(); }
function closeTutorial(){ tutorialPanel.classList.remove('active'); closeCoach(); currentKey=null; }
function openCoach(){
  if(!currentKey) return;
  const s = tutorials[currentKey].steps[currentIdx];
  coachKicker.textContent = `Step ${currentIdx+1} dari ${tutorials[currentKey].steps.length}`;
  coachTitle.textContent = s[0];
  coachBody.innerHTML = s[1] + (s[2] ? `<br><br><b>Tips:</b> ${s[2]}` : '');
  coachOverlay.style.display='flex';
}
function closeCoach(){ coachOverlay.style.display='none'; }
function goTarget(){
  const t = tutorials[currentKey];
  const s = t.steps[currentIdx];
  window.location.href = s[3] || t.target || '/app';
}
coachOverlay.addEventListener('click', e => { if(e.target === coachOverlay) closeCoach(); });

renderCards();
const q = new URLSearchParams(location.search);
if (q.get('start') && tutorials[q.get('start')]) startTutorial(q.get('start'));
</script>
